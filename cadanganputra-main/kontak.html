<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak | Pufutara Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: #ffffff;
            color: #111;
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            text-decoration: none;
            color: #666;
            font-weight: 500;
            transition: 0.2s;
        }
        .back-link:hover {
            color: #111;
            transform: translateX(-4px);
        }

        .card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .card p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        label .required {
            color: #e53e3e;
            margin-left: 4px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #eee;
            border-radius: 24px;
            font-size: 0.95rem;
            transition: 0.2s;
            background: #fefefe;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #111;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
        }

        button {
            background: #111;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #333;
        }

        .admin-panel {
            margin-top: 2rem;
            border-top: 2px solid #f0f0f0;
            padding-top: 2rem;
        }

        .admin-panel h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .message-list {
            background: #f9f9fb;
            border-radius: 24px;
            padding: 1rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .message-item {
            border-bottom: 1px solid #eee;
            margin-bottom: 12px;
            padding-bottom: 12px;
        }

        .message-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .message-name {
            font-weight: 700;
            color: #111;
        }

        .message-email {
            color: #666;
            font-size: 0.85rem;
        }

        .message-date {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 4px;
        }

        .message-text {
            margin-top: 8px;
            color: #444;
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 0.9rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 640px) {
            .card {
                padding: 1.5rem;
            }
            .toast {
                white-space: normal;
                max-width: 90%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Kembali ke Arsip</a>

    <div class="card">
        <h1>Kirim Saran & Kritik</h1>
        <p>Masukanmu sangat berarti untuk perkembangan Pufutara Archive. Isi form di bawah ya!</p>

        <form id="contactForm">
            <div class="form-group">
                <label>Nama <span class="required">*</span></label>
                <input type="text" id="name" required placeholder="Contoh: Putra Ajam">
            </div>
            <div class="form-group">
                <label>Email <span style="color:#aaa;">(opsional)</span></label>
                <input type="email" id="email" placeholder="putra@pufutara.com">
            </div>
            <div class="form-group">
                <label>Saran / Kritik <span class="required">*</span></label>
                <textarea id="message" rows="5" required placeholder="Ceritakan ide, kritik, atau saranmu..."></textarea>
            </div>
            <button type="submit" id="submitBtn">Kirim Pesan</button>
        </form>

        <!-- Admin panel (hidden by default, hanya tampilkan daftar pesan) -->
        <div id="adminPanel" style="display: none;" class="admin-panel">
            <h2>📋 Semua Pesan Masuk</h2>
            <div id="messagesList" class="message-list">Memuat data...</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    (function() {
        // ==================== KONFIGURASI SUPABASE ====================
        // GANTI DENGAN KREDENSIAL SUPABASE ANDA
        const SUPABASE_URL = "https://puywjdopumlzvmzbcudr.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc";

        // Inisialisasi Supabase
        let supabaseClient = null;
        if (typeof supabase !== 'undefined' && supabase.createClient) {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else if (window.supabase && window.supabase.createClient) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } else {
            console.error("Supabase library not loaded");
            alert("Gagal memuat Supabase. Periksa koneksi internet Anda.");
        }

        // Helper: show toast
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#d32f2f' : '#111';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        // ==================== FORM SUBMIT ====================
        const form = document.getElementById('contactForm');
        const nameInput = document.getElementById('name');
        const messageInput = document.getElementById('message');
        const adminPanel = document.getElementById('adminPanel');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!supabaseClient) {
                showToast('Supabase belum siap. Coba refresh halaman.', true);
                return;
            }

            const name = nameInput.value.trim();
            const email = document.getElementById('email').value.trim();
            const message = messageInput.value.trim();

            if (!name || !message) {
                showToast('Nama dan pesan harus diisi!', true);
                return;
            }

            // EASTER EGG: jika nama == "admin" DAN pesan == "admin"
            if (name.toLowerCase() === "admin" && message.toLowerCase() === "admin") {
                showToast('🔓 Easter egg aktif! Menampilkan semua pesan...');
                await loadAllMessages();
                adminPanel.style.display = 'block';
                return;
            }

            // Submit normal
            try {
                const { data, error } = await supabaseClient
                    .from('contact_messages')
                    .insert([{ name, email: email || null, message }]);

                if (error) throw error;

                showToast('✅ Pesan terkirim! Terima kasih atas masukannya.');
                form.reset();
            } catch (err) {
                console.error(err);
                showToast('Gagal mengirim: ' + err.message, true);
            }
        });

        // ==================== LOAD ALL MESSAGES (admin) ====================
        async function loadAllMessages() {
            if (!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient
                    .from('contact_messages')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('messagesList');
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="text-align:center;color:#888;">Belum ada pesan.</p>';
                    return;
                }

                container.innerHTML = data.map(msg => `
                    <div class="message-item">
                        <div class="message-name">${escapeHtml(msg.name)}</div>
                        ${msg.email ? `<div class="message-email">${escapeHtml(msg.email)}</div>` : ''}
                        <div class="message-date">${new Date(msg.created_at).toLocaleString()}</div>
                        <div class="message-text">${escapeHtml(msg.message)}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('messagesList').innerHTML = '<p style="color:red;">Gagal memuat data.</p>';
                showToast('Gagal mengambil data admin', true);
            }
        }

        // Helper escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
    })();
</script>
</body>
</html>
