<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terraria JS - Multiplayer Supabase</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 1px 1px 2px black; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <h2>Terraria Mini 2D</h2>
    <p>Gunakan WASD / Panah untuk Bergerak & Lompat</p>
    <p id="player-count">Pemain lain: 0</p>
</div>
<canvas id="gameCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/** * KONFIGURASI SUPABASE 
 * Ganti dengan URL dan KEY milikmu sendiri
 */
const SUPABASE_URL = 'https://puywjdopumlzvmzbcudr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- KONFIGURASI GAME ---
const TILE_SIZE = 32;
const GRAVITY = 0.5;
const PLAYER_SPEED = 5;
const JUMP_FORCE = -10;
const SEED = Math.random(); // Seed untuk dunia "tanpa batas"

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let myId = Math.random().toString(36).substring(7);
let players = {}; // Data pemain lain
let player = {
    x: 100, y: 0,
    vx: 0, vy: 0,
    width: TILE_SIZE, height: TILE_SIZE * 1.8,
    color: `hsl(${Math.random() * 360}, 70%, 50%)`,
    grounded: false
};

const keys = {};

// --- GENERASI DUNIA (PROCEDURAL) ---
// Membuat tanah berdasarkan koordinat X secara matematis
function getTerrainHeight(x) {
    let noise = Math.sin(x * 0.01) * 50 + Math.sin(x * 0.005) * 100;
    return canvas.height / 2 + noise;
}

// --- LOGIKA MULTIPLAYER (SUPABASE) ---
const channel = supabase.channel('room_1', {
    config: { broadcast: { self: false } }
});

channel
    .on('broadcast', { event: 'move' }, ({ payload }) => {
        players[payload.id] = payload;
    })
    .subscribe((status) => {
        if (status === 'SUBSCRIBED') {
            console.log("Terhubung ke server mabar!");
        }
    });

// Kirim posisi ke pemain lain setiap 30ms
setInterval(() => {
    channel.send({
        type: 'broadcast',
        event: 'move',
        payload: { id: myId, x: player.x, y: player.y, color: player.color }
    });
}, 30);

// --- UPDATE & RENDER ---
function update() {
    // Input
    if (keys['ArrowLeft'] || keys['a']) player.vx = -PLAYER_SPEED;
    else if (keys['ArrowRight'] || keys['d']) player.vx = PLAYER_SPEED;
    else player.vx = 0;

    if ((keys['ArrowUp'] || keys['w'] || keys[' ']) && player.grounded) {
        player.vy = JUMP_FORCE;
        player.grounded = false;
    }

    // Fisika
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    // Kolisi sederhana dengan tanah (Terrain)
    let groundY = getTerrainHeight(player.x + player.width / 2);
    if (player.y + player.height > groundY) {
        player.y = groundY - player.height;
        player.vy = 0;
        player.grounded = true;
    } else {
        player.grounded = false;
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Kamera mengikuti player
    const camX = player.x - canvas.width / 2;
    ctx.save();
    ctx.translate(-camX, 0);

    // Gambar Tanah (Infinite)
    ctx.fillStyle = "#4a7c44";
    for (let i = Math.floor(camX / TILE_SIZE); i < Math.floor((camX + canvas.width) / TILE_SIZE) + 1; i++) {
        let tx = i * TILE_SIZE;
        let ty = getTerrainHeight(tx);
        ctx.fillRect(tx, ty, TILE_SIZE + 1, canvas.height - ty); // +1 untuk menghilangkan celah
        
        // Detail blok atas
        ctx.fillStyle = "#3d6339";
        ctx.fillRect(tx, ty, TILE_SIZE + 1, 10);
        ctx.fillStyle = "#4a7c44";
    }

    // Gambar Pemain Lain
    for (let id in players) {
        let p = players[id];
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, TILE_SIZE, TILE_SIZE * 1.8);
    }

    // Gambar Player Kita
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    
    // Border Player (biar kelihatan)
    ctx.strokeStyle = "white";
    ctx.strokeRect(player.x, player.y, player.width, player.height);

    ctx.restore();
    
    document.getElementById('player-count').innerText = `Pemain lain: ${Object.keys(players).length}`;
}

// Event Listeners
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

update();
</script>
</body>
</html>
