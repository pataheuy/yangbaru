<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pufutara Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    
    <style>
        :root {
            --bg-color: #ffffff;
            --surface: #ffffff;
            --surface-container: #f9f9f9;
            --primary: #000000;
            --on-primary: #ffffff;
            --primary-container: #f0f0f0;
            --on-primary-container: #000000;
            --text-main: #000000;
            --text-muted: #666666;
            --border: #eaeaea;
            --hover-bg: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            color: var(--text-main);
            letter-spacing: -0.2px;
        }

        /* --- GALLERY SCREEN --- */
        #galleryScreen { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* --- TOP HEADER --- */
        .top-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 24px; min-height: 72px; background: var(--bg-color); border-bottom: 1px solid var(--border);
            z-index: 50;
        }
        .logo-area { display: flex; align-items: center; width: 238px; font-size: 20px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
        
        .hamburger-btn {
            display: none; background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--primary); 
            margin-right: 12px; align-items: center; justify-content: center; padding: 4px; border-radius: 8px;
        }

        .search-container {
            flex: 1; max-width: 600px; background: var(--surface-container); border-radius: 16px;
            border: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; height: 48px;
        }
        .search-container input { flex: 1; border: none; background: transparent; outline: none; padding: 0 12px; font-size: 0.95rem; }

        .profile-area { display: flex; align-items: center; gap: 16px; padding-left: 30px; position: relative; }
        .avatar {
            width: 36px; height: 36px; background: var(--primary); color: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
        }

        /* --- MAIN LAYOUT --- */
        .drive-body { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 280px; padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; 
            background: var(--bg-color); border-right: 1px solid var(--border); z-index: 95; transition: transform 0.3s;
        }
        .sidebar-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.4); z-index: 90; backdrop-filter: blur(2px);
        }

        .btn-new-folder {
            background: var(--primary); color: var(--on-primary); border: none; padding: 14px 24px;
            border-radius: 16px; display: inline-flex; align-items: center; gap: 12px; font-size: 0.95rem; 
            font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; justify-content: center; margin-bottom: 12px;
        }

        .nav-menu { list-style: none; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; flex: 1;}
        .section-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); padding: 12px 16px 4px; text-transform: uppercase; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px;
            cursor: pointer; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; transition: 0.2s;
        }
        .nav-item:hover { background: var(--hover-bg); color: var(--text-main); }
        .nav-item.active { background: var(--primary-container); color: var(--primary); font-weight: 600; }

        /* --- MAIN CONTENT --- */
        .main-content-wrapper { flex: 1; background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }
        .main-toolbar { padding: 24px 32px 16px; display: flex; justify-content: space-between; align-items: center; }
        .main-toolbar h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }

        /* --- GALLERY GRID --- */
        .file-grid {
            flex: 1; padding: 16px 32px 32px; overflow-y: auto; display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; align-content: start;
        }

        .gallery-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
            display: flex; flex-direction: column; transition: 0.3s; cursor: pointer; position: relative;
        }
        .gallery-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.06); border-color: #000; }
        
        .gallery-preview {
            height: 200px; width: 100%; background: var(--surface-container); display: flex; 
            align-items: center; justify-content: center; overflow: hidden; position: relative;
        }
        .gallery-preview img { width: 100%; height: 100%; object-fit: cover; }

        /* ACTIONS ON HOVER */
        .card-actions {
            position: absolute; top: 10px; right: 10px; opacity: 0; transition: 0.3s;
            display: flex; gap: 8px; z-index: 5;
        }
        .gallery-card:hover .card-actions { opacity: 1; }
        .action-btn {
            background: rgba(255,255,255,0.95); border: none; width: 36px; height: 36px; 
            border-radius: 10px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .action-btn:hover { background: #000; color: #fff; }
        .action-btn.delete:hover { background: #d93025; color: #fff; }

        /* --- LIGHTBOX --- */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 10000; display: none; 
            justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
        .lightbox img { max-width: 90%; max-height: 85vh; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .close-lightbox { position: absolute; top: 30px; right: 30px; cursor: pointer; font-size: 32px; }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger-btn { display: flex; }
            .sidebar { position: absolute; left: -280px; height: 100%; top: 0; }
            .sidebar.active { transform: translateX(280px); }
            .sidebar-overlay.active { display: block; }
            .search-container { display: none; }
            .main-toolbar { padding: 16px; }
            .file-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 16px; gap: 12px; }
            .card-actions { opacity: 1; } /* Tampil terus di mobile agar mudah diklik */
        }

        /* Loading */
        .loading-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.8); z-index: 10001; display: none; 
            flex-direction: column; justify-content: center; align-items: center; font-weight: bold; 
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; font-size: 40px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <span class="material-symbols-outlined spinner">sync</span>
        <p>Sedang memproses...</p>
    </div>

    <div id="galleryScreen">
        <header class="top-header">
            <div class="logo-area">
                <button class="hamburger-btn" onclick="toggleSidebar()"><span class="material-symbols-outlined">menu</span></button>
                GALLERY.
            </div>
            <div class="search-container">
                <span class="material-symbols-outlined">search</span>
                <input type="text" placeholder="Cari foto di album ini..." onkeyup="searchImages(this.value)">
            </div>
            <div class="profile-area">
                <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="uploadImages()">
                <button class="btn-black" onclick="document.getElementById('fileInput').click()" style="background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <span class="material-symbols-outlined" style="font-size: 18px;">upload</span> Upload
                </button>
                <div class="avatar" id="userAvatar">A</div>
            </div>
        </header>

        <div class="drive-body">
            <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
            
            <aside class="sidebar" id="appSidebar">
                <button class="btn-new-folder" onclick="addFolder()">
                    <span class="material-symbols-outlined">create_new_folder</span> Album Baru
                </button>
                
                <div class="section-label">Default</div>
                <div class="nav-item active" id="nav-semua" onclick="switchFolder('semua')">
                    <span class="material-symbols-outlined">grid_view</span> Semua Foto
                </div>

                <div class="section-label">Album Saya</div>
                <ul class="nav-menu" id="folderList">
                    </ul>

                <div style="margin-top:auto; padding: 16px; font-size: 0.7rem; color: #ccc; line-height: 1.5;">
                    Pufutara Gallery v3.0<br>
                    No Login Required
                </div>
            </aside>

            <main class="main-content-wrapper">
                <div class="main-toolbar">
                    <h2 id="currentFolderTitle">Semua Foto</h2>
                    <p id="fotoCount" style="color: var(--text-muted); font-size: 0.9rem;">0 Foto</p>
                </div>

                <div id="galleryGrid" class="file-grid">
                    </div>
            </main>
        </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="this.style.display='none'">
        <span class="material-symbols-outlined close-lightbox">close</span>
        <img id="lightboxImg" src="">
    </div>

    <script>
        // ==========================================
        // CONFIG & INITIALIZATION
        // ==========================================
        const SUPABASE_URL = 'https://yzxwlodobpdqukilmlly.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl6eHdsb2RvYnBkcXVraWxtbGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzE3NzIsImV4cCI6MjA4NzkwNzc3Mn0.ihwATIC0EdwdAXGL7RUKgigk-GsZ8O8xz5yJrh9PBts'; 

        const _client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const BUCKET_NAME = 'pufutara-gallery'; 

        let folders = JSON.parse(localStorage.getItem('pufutara_folders')) || [{ id: 'semua', name: 'Semua Foto Global' }];
        let activeFolderId = 'semua';
        let allImages = [];

        // --- APP START ---
        window.addEventListener('DOMContentLoaded', () => {
            renderFolders();
            fetchImages();
        });

        // --- UI LOGIC ---
        function toggleSidebar() {
            document.getElementById('appSidebar').classList.toggle('active');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }

        function renderFolders() {
            const list = document.getElementById('folderList');
            list.innerHTML = '';
            folders.forEach(f => {
                if(f.id === 'semua') return;
                const li = document.createElement('li');
                li.className = `nav-item ${f.id === activeFolderId ? 'active' : ''}`;
                li.innerHTML = `<span class="material-symbols-outlined">folder</span> ${f.name}`;
                li.onclick = () => switchFolder(f.id);
                list.appendChild(li);
            });
            localStorage.setItem('pufutara_folders', JSON.stringify(folders));
        }

        function switchFolder(id) {
            activeFolderId = id;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(id === 'semua') document.getElementById('nav-semua').classList.add('active');
            
            document.getElementById('currentFolderTitle').innerText = folders.find(f => f.id === id).name;
            if(window.innerWidth <= 768) {
                document.getElementById('appSidebar').classList.remove('active');
                document.getElementById('sidebarOverlay').classList.remove('active');
            }
            renderFolders();
            fetchImages();
        }

        async function fetchImages() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; padding:50px; color:#999;">Memuat gallery...</p>';
            
            let query = _client.from('gallery_images').select('*').order('created_at', { ascending: false });
            if (activeFolderId !== 'semua') query = query.eq('folder_id', activeFolderId);

            const { data, error } = await query;
            if (error) return console.error(error);

            allImages = data || [];
            renderGalleryUI(allImages);
        }

        function renderGalleryUI(data) {
            const grid = document.getElementById('galleryGrid');
            document.getElementById('fotoCount').innerText = `${data.length} Foto`;
            grid.innerHTML = '';

            if(data.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px; color:#ccc;"><span class="material-symbols-outlined" style="font-size:48px;">image_not_supported</span><p>Belum ada foto di sini</p></div>';
                return;
            }

            data.forEach(img => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                card.innerHTML = `
                    <div class="gallery-preview">
                        <img src="${img.image_url}" loading="lazy" onclick="openLightbox('${img.image_url}')">
                    </div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="downloadImage('${img.image_url}', event)" title="Download">
                            <span class="material-symbols-outlined" style="font-size:20px;">download</span>
                        </button>
                        <button class="action-btn delete" onclick="deleteImage('${img.id}', event)" title="Hapus">
                            <span class="material-symbols-outlined" style="font-size:20px;">delete</span>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- ACTIONS ---
        async function uploadImages() {
            const files = document.getElementById('fileInput').files;
            if(!files.length) return;

            // Folder ID untuk penyimpanan (jika 'semua', masukkan ke 'general')
            const targetFolder = activeFolderId === 'semua' ? 'general' : activeFolderId;

            document.getElementById('loadingOverlay').style.display = 'flex';

            for(let file of files) {
                const path = `${targetFolder}/${Date.now()}_${file.name}`;
                const { error: upErr } = await _client.storage.from(BUCKET_NAME).upload(path, file);
                
                if(!upErr) {
                    const { data } = _client.storage.from(BUCKET_NAME).getPublicUrl(path);
                    await _client.from('gallery_images').insert([{ folder_id: targetFolder, image_url: data.publicUrl }]);
                }
            }

            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('fileInput').value = '';
            fetchImages();
        }

        // FUNGSI DOWNLOAD BARU
        async function downloadImage(url, event) {
            event.stopPropagation();
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `pufutara_${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                a.remove();
            } catch (e) {
                alert("Gagal mendownload foto.");
            }
        }

        async function deleteImage(id, event) {
            event.stopPropagation();
            if(!confirm("Hapus foto ini secara permanen?")) return;
            await _client.from('gallery_images').delete().eq('id', id);
            fetchImages();
        }

        function addFolder() {
            const name = prompt("Nama Album Baru:");
            if(name && name.trim() !== "") {
                const newF = { id: 'f' + Date.now(), name: name.trim() };
                folders.push(newF);
                switchFolder(newF.id);
            }
        }

        function searchImages(val) {
            const filtered = allImages.filter(img => img.image_url.toLowerCase().includes(val.toLowerCase()));
            renderGalleryUI(filtered);
        }

        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
