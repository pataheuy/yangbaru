<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PufutaraTube Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f9f9f9; color: #111; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header Putih Bergaris */
        .navbar { background: #fff; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; z-index: 100; }
        .logo { font-size: 1.4rem; font-weight: bold; cursor: pointer; }
        .logo span { background: #111; color: #fff; padding: 2px 8px; border-radius: 4px; margin-left: 4px; }
        
        .search-bar { display: flex; flex: 1; max-width: 500px; margin: 0 20px; border: 1px solid #ccc; border-radius: 20px; overflow: hidden; }
        .search-bar input { flex: 1; padding: 8px 15px; border: none; outline: none; }
        .search-bar button { padding: 8px 20px; border: none; background: #f8f8f8; cursor: pointer; border-left: 1px solid #ccc; }

        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .account-box { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem; border-left: 1px solid #ddd; padding-left: 15px; }
        .avatar { width: 32px; height: 32px; background: #007bff; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* Main Area */
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .active { display: block; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .video-card { cursor: pointer; background: #fff; border-radius: 8px; overflow: hidden; transition: 0.2s; }
        .video-card:hover { transform: scale(1.02); }
        .thumb { width: 100%; height: 150px; background: #000; object-fit: cover; }
        .v-info { padding: 10px; }
        .v-title { font-weight: bold; font-size: 0.95rem; margin-bottom: 4px; }
        .v-meta { font-size: 0.8rem; color: #666; }

        /* Watch Page */
        .watch-grid { max-width: 1100px; margin: 0 auto; }
        video { width: 100%; border-radius: 12px; background: #000; max-height: 500px; }
        .video-details { margin-top: 15px; }
        .action-btns { display: flex; gap: 10px; margin: 10px 0; align-items: center; }
        .btn { padding: 8px 15px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .btn-sub { background: #111; color: #fff; }
        .btn-sub.unsub { background: #eee; color: #111; }
        .btn-delete { background: #ff4d4d; color: white; width: 100%; margin-top: 30px; }

        /* Tabs Upload */
        .tab-header { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; text-align: center; border-radius: 5px; }
        .tab-btn.active { background: #111; color: #fff; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; }

        .auth-card { max-width: 350px; margin: 100px auto; text-align: center; padding: 30px; background: white; border-radius: 10px; border: 1px solid #ddd; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo" onclick="location.reload()">Pufutara<span>Tube</span></div>
        <div class="search-bar" id="uiSearch" style="display:none;">
            <input type="text" id="keyword" placeholder="Cari di Pufutara...">
            <button onclick="loadFeed(document.getElementById('keyword').value)">Cari</button>
        </div>
        <div class="nav-actions" id="uiNav" style="display:none;">
            <button onclick="openUpload()" style="border:none; background:none; cursor:pointer; font-weight:bold;">➕ Upload</button>
            <div class="account-box">
                <div class="avatar" id="myInitial" onclick="openChannel(_userEmail)">P</div>
                <span id="myName" onclick="openChannel(_userEmail)" style="cursor:pointer">User</span>
                <button onclick="logout()" style="border:none; color:red; background:none; cursor:pointer; font-size:0.7rem;">Logout</button>
            </div>
        </div>
    </div>

    <div id="screenAuth" class="screen active">
        <div class="auth-card">
            <h2>PufutaraTube</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="auth()" style="width:100%; padding:10px; background:#111; color:#fff; border:none; border-radius:5px; cursor:pointer;">Masuk / Daftar</button>
        </div>
    </div>

    <div id="screenHome" class="screen">
        <h3 id="feedTitle" style="margin-bottom:15px">Video Terbaru</h3>
        <div class="video-grid" id="gridVideo"></div>
    </div>

    <div id="screenWatch" class="screen">
        <div class="watch-grid">
            <video id="player" controls autoplay></video>
            <div class="video-details">
                <h2 id="wTitle">Judul Video</h2>
                <div class="v-meta"><span id="wViews">0</span> views • <span id="wUploader">User</span></div>
                
                <div class="action-btns">
                    <button class="btn" onclick="vote('likes')">👍 <span id="wLikes">0</span></button>
                    <button class="btn" onclick="vote('unlikes')">👎 <span id="wUnlikes">0</span></button>
                    <button class="btn btn-sub" id="btnSub" onclick="toggleSub()">Subscribe</button>
                    <span id="subCount" style="font-size:0.8rem; color:#666;">0 subs</span>
                </div>

                <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                <h4>Komentar</h4>
                <div style="display:flex; gap:10px; margin:15px 0;">
                    <input type="text" id="commIn" placeholder="Tulis komentar..." style="margin:0">
                    <button onclick="sendComm()" style="padding:0 20px; background:#111; color:white; border:none; border-radius:5px; cursor:pointer">Kirim</button>
                </div>
                <div id="commList"></div>

                <button id="btnDelVideo" class="btn btn-delete" style="display:none;" onclick="deleteThisVideo()">Hapus Video Ini (Permanen)</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modalUpload">
        <div class="modal-content">
            <div class="tab-header">
                <div id="tab1" class="tab-btn active" onclick="setUploadType('file')">Upload File</div>
                <div id="tab2" class="tab-btn" onclick="setUploadType('link')">Tempel Link</div>
            </div>
            <input type="text" id="upTitle" placeholder="Judul Video">
            
            <div id="boxFile">
                <p style="font-size:0.7rem; color:red;">Maksimal 50MB</p>
                <input type="file" id="upFile" accept="video/*">
            </div>
            
            <div id="boxLink" style="display:none;">
                <input type="text" id="upUrl" placeholder="Link Video (mp4/direct link)">
            </div>

            <button onclick="startUpload()" id="btnGoUpload" style="width:100%; padding:12px; background:#111; color:white; border:none; border-radius:5px; margin-top:10px; cursor:pointer;">Publish Video</button>
            <button onclick="document.getElementById('modalUpload').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer">Batal</button>
            <p id="upStatus" style="font-size:0.8rem; text-align:center; margin-top:10px;"></p>
        </div>
    </div>

    <script>
        const _CONFIG = {
            URL: 'https://puywjdopumlzvmzbcudr.supabase.co',
            KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc'
        };
        const _client = window.supabase.createClient(_CONFIG.URL, _CONFIG.KEY);
        let _userEmail = '', _curVid = null, _upType = 'file';

        // --- AUTH ---
        async function auth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const { data, error } = await _client.auth.signInWithPassword({ email, password: pass });
            if (error) {
                await _client.auth.signUp({ email, password: pass });
                alert("Akun didaftarkan! Silakan klik masuk lagi.");
            } else {
                _userEmail = data.user.email;
                initApp();
            }
        }

        function logout() { _client.auth.signOut(); location.reload(); }

        function initApp() {
            document.getElementById('screenAuth').style.display = 'none';
            document.getElementById('uiSearch').style.display = 'flex';
            document.getElementById('uiNav').style.display = 'flex';
            document.getElementById('myName').innerText = _userEmail.split('@')[0];
            document.getElementById('myInitial').innerText = _userEmail[0].toUpperCase();
            showScreen('screenHome');
            loadFeed();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'screenWatch') document.getElementById('player').pause();
        }

        // --- FEED & CHANNEL ---
        async function loadFeed(key = '', uploader = '') {
            const grid = document.getElementById('gridVideo');
            grid.innerHTML = 'Memuat...';
            let q = _client.from('pufutaratube_videos').select('*').order('id', {ascending:false});
            
            if(key) q = q.ilike('title', `%${key}%`);
            if(uploader) {
                q = q.eq('uploader', uploader);
                document.getElementById('feedTitle').innerText = "Channel: " + uploader.split('@')[0];
            } else {
                document.getElementById('feedTitle').innerText = "Video Terbaru";
            }

            const { data } = await q;
            grid.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = 'video-card';
                div.onclick = () => openWatch(v);
                div.innerHTML = `
                    <video class="thumb" src="${v.video_url}#t=0.5"></video>
                    <div class="v-info">
                        <div class="v-title">${v.title}</div>
                        <div class="v-meta">${v.uploader.split('@')[0]} • ${v.views} views</div>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function openChannel(email) {
            showScreen('screenHome');
            loadFeed('', email);
        }

        // --- WATCH ---
        async function openWatch(v) {
            _curVid = v;
            showScreen('screenWatch');
            document.getElementById('player').src = v.video_url;
            document.getElementById('wTitle').innerText = v.title;
            document.getElementById('wUploader').innerText = v.uploader.split('@')[0];
            document.getElementById('wLikes').innerText = v.likes;
            document.getElementById('wUnlikes').innerText = v.unlikes || 0;
            document.getElementById('wViews').innerText = v.views + 1;

            // Cek Owner untuk tombol hapus
            document.getElementById('btnDelVideo').style.display = (_userEmail === v.uploader) ? 'block' : 'none';

            await _client.from('pufutaratube_videos').update({ views: v.views + 1 }).eq('id', v.id);
            loadComm();
            checkSub();
        }

        async function vote(type) {
            _curVid[type] += 1;
            document.getElementById(type === 'likes' ? 'wLikes' : 'wUnlikes').innerText = _curVid[type];
            await _client.from('pufutaratube_videos').update({ [type]: _curVid[type] }).eq('id', _curVid.id);
        }

        async function deleteThisVideo() {
            if(!confirm("Yakin mau hapus video ini? Tidak bisa dikembalikan!")) return;
            await _client.from('pufutaratube_videos').delete().eq('id', _curVid.id);
            alert("Video dihapus.");
            location.reload();
        }

        // --- SUBSCRIBER ---
        async function checkSub() {
            const { data } = await _client.from('pufutaratube_subs').select('*').eq('target_uploader', _curVid.uploader);
            const count = data.length;
            document.getElementById('subCount').innerText = `${count} subs`;
            
            const isSub = data.find(s => s.follower_email === _userEmail);
            const btn = document.getElementById('btnSub');
            btn.innerText = isSub ? "Unsubscribe" : "Subscribe";
            btn.className = isSub ? "btn btn-sub unsub" : "btn btn-sub";
        }

        async function toggleSub() {
            const btn = document.getElementById('btnSub');
            if(btn.innerText === "Subscribe") {
                await _client.from('pufutaratube_subs').insert({ follower_email: _userEmail, target_uploader: _curVid.uploader });
            } else {
                await _client.from('pufutaratube_subs').delete().match({ follower_email: _userEmail, target_uploader: _curVid.uploader });
            }
            checkSub();
        }

        // --- KOMENTAR ---
        async function loadComm() {
            const { data } = await _client.from('pufutaratube_comments').select('*').eq('video_id', _curVid.id).order('id',{ascending:false});
            const list = document.getElementById('commList');
            list.innerHTML = '';
            data.forEach(c => {
                list.innerHTML += `<div style="margin-bottom:10px; font-size:0.9rem;">
                    <b>${c.uploader.split('@')[0]}:</b> ${c.comment}
                </div>`;
            });
        }

        async function sendComm() {
            const txt = document.getElementById('commIn').value;
            if(!txt) return;
            await _client.from('pufutaratube_comments').insert({ video_id: _curVid.id, uploader: _userEmail, comment: txt });
            document.getElementById('commIn').value = '';
            loadComm();
        }

        // --- UPLOAD ---
        function openUpload() { document.getElementById('modalUpload').style.display='flex'; }
        
        function setUploadType(t) {
            _upType = t;
            document.getElementById('tab1').className = t === 'file' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab2').className = t === 'link' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('boxFile').style.display = t === 'file' ? 'block' : 'none';
            document.getElementById('boxLink').style.display = t === 'link' ? 'block' : 'none';
        }

        async function startUpload() {
            const title = document.getElementById('upTitle').value;
            const status = document.getElementById('upStatus');
            if(!title) return alert("Isi judul!");

            status.innerText = "Processing...";
            let finalUrl = "";

            if(_upType === 'file') {
                const file = document.getElementById('upFile').files[0];
                if(!file) return alert("Pilih file!");
                const fName = Date.now() + "_" + file.name;
                const { error } = await _client.storage.from('pufutaratube_videos').upload(fName, file);
                if(error) return alert(error.message);
                finalUrl = _client.storage.from('pufutaratube_videos').getPublicUrl(fName).data.publicUrl;
            } else {
                finalUrl = document.getElementById('upUrl').value;
                if(!finalUrl) return alert("Isi link!");
            }

            await _client.from('pufutaratube_videos').insert({
                title, video_url: finalUrl, uploader: _userEmail
            });

            status.innerText = "Berhasil!";
            setTimeout(() => location.reload(), 1000);
        }

        _client.auth.getSession().then(({data}) => { 
            if(data.session) { _userEmail = data.session.user.email; initApp(); } 
        });
    </script>
</body>
</html>
