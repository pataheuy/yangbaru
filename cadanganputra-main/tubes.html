<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PufutaraTube</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f9f9f9; color: #111; height: 100vh; display: flex; flex-direction: column; }

        /* HEADER (Style Gambar image_dae81e) */
        .navbar { background: #fff; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eeeeee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.4rem; font-weight: 800; cursor: pointer; color: #000; letter-spacing: -0.5px; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .btn-upload { background: #111; color: #fff; border: none; padding: 8px 18px; border-radius: 25px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 6px; font-size: 0.9rem; }
        
        .profile-section { display: flex; align-items: center; gap: 10px; padding-left: 20px; border-left: 1px solid #ddd; }
        .avatar-circle { width: 35px; height: 35px; background: #2b82fb; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .user-label { font-size: 0.95rem; font-weight: 500; color: #333; }
        .logout-link { color: #d32f2f; text-decoration: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; margin-left: 5px; }

        /* LOGIN SCREEN (Style Gambar image_dae800) */
        #screenAuth { display: flex; align-items: center; justify-content: center; height: 100vh; background: #f9f9f9; }
        .login-card { background: #fff; padding: 45px 35px; border-radius: 15px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .login-card h2 { font-size: 1.6rem; margin-bottom: 8px; font-weight: 700; }
        .login-card p { color: #777; font-size: 0.9rem; margin-bottom: 30px; }
        .login-card input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #e0e0e0; border-radius: 10px; outline: none; font-size: 1rem; background: #fafafa; }
        .btn-main { width: 100%; padding: 14px; background: #111; color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-main:hover { background: #333; }

        /* VIDEO CARDS (Style Gambar image_dadc40) */
        .screen { display: none; flex: 1; overflow-y: auto; padding: 25px; }
        .active { display: block; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .v-card { cursor: pointer; background: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.04); transition: transform 0.2s; }
        .v-card:hover { transform: translateY(-5px); }
        .v-thumb { width: 100%; height: 160px; object-fit: cover; background: #000; border-radius: 15px 15px 0 0; }
        .v-details { padding: 15px; }
        .v-title { font-weight: 700; font-size: 1.05rem; line-height: 1.3; color: #111; margin-bottom: 6px; }
        .v-meta { font-size: 0.85rem; color: #777; display: flex; align-items: center; gap: 5px; }

        /* WATCH PAGE */
        .watch-box { max-width: 1050px; margin: 0 auto; }
        #mainPlayer { width: 100%; border-radius: 18px; background: #000; aspect-ratio: 16/9; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .video-info-row { margin-top: 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .stats { color: #666; font-size: 0.9rem; margin-top: 5px; }
        
        .social-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-pill { padding: 8px 18px; border-radius: 30px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        .btn-sub { background: #111; color: #fff; border: none; }
        .btn-sub.active { background: #eee; color: #333; }
        
        /* COMMENTS */
        .comment-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .comm-item { margin-bottom: 15px; font-size: 0.9rem; }
        .btn-delete { background: #fff; color: #d32f2f; border: 1px solid #ffcdd2; width: 100%; padding: 12px; margin-top: 40px; border-radius: 10px; cursor: pointer; font-weight: 700; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 90%; max-width: 480px; }
    </style>
</head>
<body>

    <div class="navbar" id="uiNav" style="display:none;">
        <div class="logo" onclick="location.reload()">PufutaraTube</div>
        <div class="nav-right">
            <button class="btn-upload" onclick="openUploadModal()">+ Upload</button>
            <div class="profile-section">
                <div class="avatar-circle" id="userInitial">P</div>
                <span class="user-label" id="userName">User</span>
                <span class="logout-link" onclick="logout()">Keluar</span>
            </div>
        </div>
    </div>

    <div id="screenAuth">
        <div class="login-card">
            <h2>Masuk PufutaraTube</h2>
            <p>Gunakan akun Pufutara kamu</p>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-main" onclick="handleAuth()">Login / Daftar</button>
        </div>
    </div>

    <div id="screenHome" class="screen">
        <h3 id="feedHeader" style="margin-bottom:20px; font-weight:800;">Video Terbaru</h3>
        <div class="video-grid" id="videoGrid"></div>
    </div>

    <div id="screenWatch" class="screen">
        <div class="watch-box">
            <video id="mainPlayer" controls autoplay></video>
            <div class="video-info-row">
                <div>
                    <h2 id="vDisplayTitle">Judul Video</h2>
                    <div class="stats">
                        <span id="vDisplayViews">0</span> ditonton • 
                        <span id="vDisplayUploader" style="font-weight:700; color:#111; cursor:pointer;" onclick="openChannel(this.innerText)">User</span>
                    </div>
                </div>
                <div class="social-btns">
                    <button class="btn-pill" onclick="vote('likes')">👍 <span id="vLikes">0</span></button>
                    <button class="btn-pill" onclick="vote('unlikes')">👎 <span id="vUnlikes">0</span></button>
                    <button class="btn-pill btn-sub" id="btnSub" onclick="handleSubscribe()">Subscribe</button>
                </div>
            </div>
            
            <div class="comment-section">
                <h4>Komentar</h4>
                <div style="display:flex; gap:10px; margin:15px 0;">
                    <input type="text" id="commInput" placeholder="Tulis komentar..." style="flex:1; padding:12px; border:1px solid #ddd; border-radius:10px;">
                    <button onclick="postComment()" class="btn-main" style="width:auto; padding:0 25px;">Kirim</button>
                </div>
                <div id="commList"></div>
                <button id="btnDelete" class="btn-delete" style="display:none;" onclick="deleteVideo()">Hapus Video Ini</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modalUpload">
        <div class="modal-content">
            <h3 style="margin-bottom:20px">Upload Video</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="setUploadType('file')" id="btnTabFile" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; cursor:pointer; background:#eee;">File Lokal</button>
                <button onclick="setUploadType('link')" id="btnTabLink" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; cursor:pointer; background:#fff;">Link URL</button>
            </div>

            <input type="text" id="upTitle" placeholder="Judul Video">
            
            <div id="boxFile">
                <input type="file" id="upFile" accept="video/*">
                <p style="font-size:0.7rem; color:red; margin-top:5px;">Max 50MB</p>
            </div>
            <div id="boxLink" style="display:none;">
                <input type="text" id="upUrl" placeholder="Tempel link video .mp4">
            </div>

            <button class="btn-main" onclick="uploadAction()" id="btnUploadStatus" style="margin-top:20px;">Mulai Upload</button>
            <button onclick="closeUploadModal()" style="width:100%; border:none; background:none; margin-top:10px; cursor:pointer; color:#777;">Batal</button>
        </div>
    </div>

    <script>
        const _URL = 'https://puywjdopumlzvmzbcudr.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc';
        const _sb = supabase.createClient(_URL, _KEY);

        let _user = null, _curVid = null, _upMode = 'file';

        // --- AUTH ---
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
            if (error) {
                await _sb.auth.signUp({ email, password: pass });
                alert("Akun didaftarkan! Klik masuk sekali lagi.");
            } else { location.reload(); }
        }

        async function logout() { await _sb.auth.signOut(); location.reload(); }

        // --- CORE UI ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'screenWatch') document.getElementById('mainPlayer').pause();
        }

        async function loadVideos(search = '', uploader = '') {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = 'Memuat...';
            let q = _sb.from('pufutaratube_videos').select('*').order('id', {ascending:false});
            if(search) q = q.ilike('title', `%${search}%`);
            if(uploader) q = q.eq('uploader', uploader);

            const { data } = await q;
            grid.innerHTML = '';
            data?.forEach(v => {
                const div = document.createElement('div');
                div.className = 'v-card';
                div.onclick = () => openWatch(v);
                div.innerHTML = `
                    <video class="v-thumb" src="${v.video_url}#t=0.5"></video>
                    <div class="v-details">
                        <div class="v-title">${v.title}</div>
                        <div class="v-meta">${v.uploader.split('@')[0]} • ${v.views} kali ditonton</div>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        // --- WATCH & FEATURES ---
        async function openWatch(v) {
            _curVid = v;
            showScreen('screenWatch');
            document.getElementById('mainPlayer').src = v.video_url;
            document.getElementById('vDisplayTitle').innerText = v.title;
            document.getElementById('vDisplayUploader').innerText = v.uploader.split('@')[0];
            document.getElementById('vDisplayViews').innerText = v.views + 1;
            document.getElementById('vLikes').innerText = v.likes || 0;
            document.getElementById('vUnlikes').innerText = v.unlikes || 0;

            document.getElementById('btnDelete').style.display = (_user.email === v.uploader) ? 'block' : 'none';

            await _sb.from('pufutaratube_videos').update({ views: v.views + 1 }).eq('id', v.id);
            refreshSubs();
            loadComments();
        }

        async function refreshSubs() {
            const { data } = await _sb.from('pufutaratube_subs').select('*').eq('target_uploader', _curVid.uploader);
            const isSubbed = data.find(s => s.follower_email === _user.email);
            const btn = document.getElementById('btnSub');
            btn.innerText = isSubbed ? "Subscribed" : "Subscribe";
            if(isSubbed) btn.classList.add('active'); else btn.classList.remove('active');
        }

        async function handleSubscribe() {
            const btn = document.getElementById('btnSub');
            if(btn.innerText === "Subscribe") {
                await _sb.from('pufutaratube_subs').insert({ follower_email: _user.email, target_uploader: _curVid.uploader });
            } else {
                await _sb.from('pufutaratube_subs').delete().match({ follower_email: _user.email, target_uploader: _curVid.uploader });
            }
            refreshSubs();
        }

        async function vote(type) {
            const current = _curVid[type] || 0;
            _curVid[type] = current + 1;
            document.getElementById(type === 'likes' ? 'vLikes' : 'vUnlikes').innerText = _curVid[type];
            await _sb.from('pufutaratube_videos').update({ [type]: _curVid[type] }).eq('id', _curVid.id);
        }

        // --- UPLOAD ---
        function openUploadModal() { document.getElementById('modalUpload').style.display='flex'; }
        function closeUploadModal() { document.getElementById('modalUpload').style.display='none'; }
        
        function setUploadType(t) {
            _upMode = t;
            document.getElementById('btnTabFile').style.background = t === 'file' ? '#eee' : '#fff';
            document.getElementById('btnTabLink').style.background = t === 'link' ? '#eee' : '#fff';
            document.getElementById('boxFile').style.display = t === 'file' ? 'block' : 'none';
            document.getElementById('boxLink').style.display = t === 'link' ? 'block' : 'none';
        }

        async function uploadAction() {
            const title = document.getElementById('upTitle').value;
            const btn = document.getElementById('btnUploadStatus');
            if(!title) return alert("Judul wajib!");

            btn.innerText = "Memproses...";
            let url = "";

            if(_upMode === 'file') {
                const file = document.getElementById('upFile').files[0];
                if(!file) return alert("Pilih file!");
                const path = Date.now() + "_" + file.name;
                const { error } = await _sb.storage.from('pufutaratube_videos').upload(path, file);
                if(error) return alert(error.message);
                url = _sb.storage.from('pufutaratube_videos').getPublicUrl(path).data.publicUrl;
            } else {
                url = document.getElementById('upUrl').value;
                if(!url) return alert("Link wajib!");
            }

            await _sb.from('pufutaratube_videos').insert({ title, video_url: url, uploader: _user.email });
            location.reload();
        }

        async function deleteVideo() {
            if(confirm("Hapus permanen?")) {
                await _sb.from('pufutaratube_videos').delete().eq('id', _curVid.id);
                location.reload();
            }
        }

        // --- COMMENTS ---
        async function loadComments() {
            const { data } = await _sb.from('pufutaratube_comments').select('*').eq('video_id', _curVid.id).order('id',{ascending:false});
            const list = document.getElementById('commList');
            list.innerHTML = '';
            data?.forEach(c => {
                list.innerHTML += `<div class="comm-item"><b>${c.uploader.split('@')[0]}:</b> ${c.comment}</div>`;
            });
        }

        async function postComment() {
            const val = document.getElementById('commInput').value;
            if(!val) return;
            await _sb.from('pufutaratube_comments').insert({ video_id: _curVid.id, uploader: _user.email, comment: val });
            document.getElementById('commInput').value = '';
            loadComments();
        }

        // --- INIT ---
        _sb.auth.getSession().then(({data}) => {
            if(data.session) {
                _user = data.session.user;
                document.getElementById('screenAuth').style.display = 'none';
                document.getElementById('uiNav').style.display = 'flex';
                document.getElementById('userName').innerText = _user.email.split('@')[0];
                document.getElementById('userInitial').innerText = _user.email[0].toUpperCase();
                showScreen('screenHome');
                loadVideos();
            }
        });

        function openChannel(name) {
            showScreen('screenHome');
            document.getElementById('feedHeader').innerText = "Channel: " + name;
            loadVideos('', name + "@"); // Estimasi email uploader
        }
    </script>
</body>
</html>
