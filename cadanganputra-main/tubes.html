<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PufutaraTube</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- RESET & GLOBAL --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #ffffff; color: #111; }

        /* --- HEADER ORIGINAL (TETAP SAMA) --- */
        .navbar { 
            background: #fff; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #f2f2f2; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo { 
            font-size: 1.6rem; 
            font-weight: 900; 
            cursor: pointer; 
            letter-spacing: -1px;
            color: #000;
        }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        .btn-upload-head { 
            background: #111; 
            color: #fff; 
            border: none; 
            padding: 9px 20px; 
            border-radius: 30px; 
            cursor: pointer; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 0.9rem; 
        }
        
        .profile-area { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding-left: 20px; 
            border-left: 1px solid #eee; 
        }
        .avatar { 
            width: 38px; 
            height: 38px; 
            background: #2b82fb; 
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            font-size: 1rem;
        }
        .u-name { font-weight: 600; font-size: 1rem; color: #333; }
        .btn-logout { 
            color: #cc0000; 
            font-weight: 800; 
            cursor: pointer; 
            font-size: 1rem; 
            background: none; 
            border: none; 
            padding: 0;
        }

        /* --- VIDEO GRID & CARDS (TETAP SAMA) --- */
        .screen { display: none; padding: 30px; }
        .active { display: block; }
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; 
        }
        
        .v-card { 
            cursor: pointer; 
            background: #fff; 
            border-radius: 18px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.06); 
            transition: transform 0.2s ease;
            border: 1px solid #f9f9f9;
        }
        .v-card:hover { transform: translateY(-6px); }
        .v-thumb { width: 100%; height: 180px; object-fit: cover; background: #000; border-radius: 18px 18px 0 0; }
        .v-info { padding: 18px; }
        .v-title { font-weight: 700; font-size: 1.1rem; color: #111; margin-bottom: 6px; line-height: 1.2; }
        .v-meta { font-size: 0.9rem; color: #777; }

        /* --- WATCH PAGE (TETAP SAMA) --- */
        .watch-container { max-width: 1150px; margin: 0 auto; }
        #player { width: 100%; border-radius: 20px; background: #000; aspect-ratio: 16/9; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .v-header-row { margin-top: 25px; display: flex; justify-content: space-between; align-items: flex-start; }
        .btn-action { padding: 10px 20px; border-radius: 25px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
        .btn-sub { background: #111; color: #fff; border: none; }
        .btn-sub.is-sub { background: #eee; color: #555; }

        /* --- LOGIN SCREEN (SESUAI GAMBAR BARU) --- */
        #screenAuth {
            background-color: #f9f9f9; /* Background abu muda sesuai gambar */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 0;
        }
        .auth-card { 
            background: #fff; 
            padding: 50px 40px; 
            border-radius: 24px; 
            width: 100%;
            max-width: 420px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); 
            text-align: center; 
        }
        .auth-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .auth-card p { color: #777; font-size: 14px; margin-bottom: 35px; }
        
        /* Input khusus login agar melengkung seperti gambar */
        .auth-input { 
            width: 100%; 
            padding: 16px 20px; 
            margin-bottom: 15px; 
            border: 1px solid #efefef; 
            background: #fafafa;
            border-radius: 14px; 
            outline: none; 
            font-size: 15px; 
        }
        /* Tombol login hitam pekat melengkung */
        .btn-login-black { 
            width: 100%; 
            padding: 16px; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 15px; 
            margin-top: 10px;
        }

        /* --- MODALS & BUTTONS LAINNYA --- */
        .btn-primary { width: 100%; padding: 15px; background: #111; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #fff; padding: 35px; border-radius: 20px; width: 90%; max-width: 500px; }
        input { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #e0e0e0; border-radius: 12px; outline: none; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="navbar" id="uiHeader" style="display:none;">
        <div class="logo" onclick="location.reload()">PufutaraTube</div>
        <div class="nav-right">
            <button class="btn-upload-head" onclick="openModal()">+ Upload</button>
            <div class="profile-area">
                <div class="avatar" id="avaCircle">P</div>
                <span class="u-name" id="labelName">User</span>
                <button class="btn-logout" onclick="logout()">Keluar</button>
            </div>
        </div>
    </div>

    <div id="screenAuth" class="screen active">
        <div class="auth-card">
            <h1>Masuk PufutaraTube</h1>
            <p>Gunakan akun Pufutara kamu</p>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <button class="btn-login-black" onclick="handleAuth()">Login / Daftar</button>
        </div>
    </div>

    <div id="screenHome" class="screen">
        <h2 id="homeLabel" style="margin-bottom:30px; font-weight:800; font-size:1.8rem;">Video Terbaru</h2>
        <div class="video-grid" id="mainGrid"></div>
    </div>

    <div id="screenWatch" class="screen">
        <div class="watch-container">
            <video id="player" controls autoplay></video>
            <div class="v-header-row">
                <div>
                    <h2 id="vTitle" style="font-size:1.5rem;">Judul Video</h2>
                    <p style="color:#666; margin-top:8px;">
                        <span id="vViews">0</span> ditonton • 
                        <b id="vUser" style="color:#111; cursor:pointer;" onclick="goChannel(this.innerText)">User</b>
                    </p>
                </div>
                <div style="display:flex; gap:12px;">
                    <button class="btn-action" onclick="doVote('likes')">👍 <span id="vLikes">0</span></button>
                    <button class="btn-action" onclick="doVote('unlikes')">👎 <span id="vUnlikes">0</span></button>
                    <button class="btn-action btn-sub" id="subBtn" onclick="doSub()">Subscribe</button>
                </div>
            </div>
            <hr style="border:0; border-top:1px solid #eee; margin:30px 0;">
            <h3>Komentar</h3>
            <div style="display:flex; gap:15px; margin:20px 0;">
                <input type="text" id="commText" placeholder="Tulis komentar..." style="margin:0;">
                <button onclick="addComm()" class="btn-primary" style="width:auto; padding:0 30px;">Kirim</button>
            </div>
            <div id="commBox"></div>
            <button id="delBtn" class="btn-primary" style="display:none; background:#cc0000; margin-top:50px;" onclick="delVideo()">Hapus Video Ini</button>
        </div>
    </div>

    <div class="modal-overlay" id="uploadModal">
        <div class="modal-box">
            <h2 style="margin-bottom:25px">Upload Video</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button id="tFile" class="btn-primary" onclick="upMode('file')" style="flex:1;">File Lokal</button>
                <button id="tLink" class="btn-primary" onclick="upMode('link')" style="flex:1; background:#eee; color:#111;">Link URL</button>
            </div>
            <input type="text" id="inTitle" placeholder="Judul Video">
            <div id="areaFile"><input type="file" id="inFile" accept="video/*"></div>
            <div id="areaLink" style="display:none;"><input type="text" id="inUrl" placeholder="Link video (.mp4)"></div>
            <button class="btn-primary" id="btnRunUpload" onclick="runUpload()" style="margin-top:20px;">Mulai Upload</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; cursor:pointer; color:#999; font-weight:600;">Batal</button>
        </div>
    </div>

    <script>
        const _URL = 'https://puywjdopumlzvmzbcudr.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc';
        const _sb = supabase.createClient(_URL, _KEY);

        let _me = null, _vid = null, _uType = 'file';

        // AUTH
        async function handleAuth() {
            const email = document.getElementById('email').value, pass = document.getElementById('password').value;
            const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
            if (error) { await _sb.auth.signUp({ email, password: pass }); alert("Daftar berhasil! Silakan klik Login lagi."); }
            else { location.reload(); }
        }
        async function logout() { await _sb.auth.signOut(); location.reload(); }

        // NAVIGATION
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'screenWatch') document.getElementById('player').pause();
        }

        async function getFeed(uploader = '') {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = 'Memuat video...';
            let q = _sb.from('pufutaratube_videos').select('*').order('id', {ascending:false});
            if(uploader) q = q.eq('uploader', uploader);
            const { data } = await q;
            grid.innerHTML = '';
            data?.forEach(v => {
                const c = document.createElement('div');
                c.className = 'v-card';
                c.onclick = () => openWatch(v);
                c.innerHTML = `
                    <video class="v-thumb" src="${v.video_url}#t=0.5"></video>
                    <div class="v-info">
                        <div class="v-title">${v.title}</div>
                        <div class="v-meta">${v.uploader.split('@')[0]} • ${v.views} ditonton</div>
                    </div>
                `;
                grid.appendChild(c);
            });
        }

        // WATCH
        async function openWatch(v) {
            _vid = v; nav('screenWatch');
            document.getElementById('player').src = v.video_url;
            document.getElementById('vTitle').innerText = v.title;
            document.getElementById('vUser').innerText = v.uploader.split('@')[0];
            document.getElementById('vViews').innerText = v.views + 1;
            document.getElementById('vLikes').innerText = v.likes || 0;
            document.getElementById('vUnlikes').innerText = v.unlikes || 0;
            document.getElementById('delBtn').style.display = (_me.email === v.uploader) ? 'block' : 'none';
            await _sb.from('pufutaratube_videos').update({ views: v.views + 1 }).eq('id', v.id);
            syncSub(); loadComments();
        }

        async function syncSub() {
            const { data } = await _sb.from('pufutaratube_subs').select('*').eq('target_uploader', _vid.uploader);
            const isSub = data.find(s => s.follower_email === _me.email);
            const btn = document.getElementById('subBtn');
            btn.innerText = isSub ? "Subscribed" : "Subscribe";
            if(isSub) btn.classList.add('is-sub'); else btn.classList.remove('is-sub');
        }

        async function doSub() {
            const btn = document.getElementById('subBtn');
            if(btn.innerText === "Subscribe") {
                await _sb.from('pufutaratube_subs').insert({ follower_email: _me.email, target_uploader: _vid.uploader });
            } else {
                await _sb.from('pufutaratube_subs').delete().match({ follower_email: _me.email, target_uploader: _vid.uploader });
            }
            syncSub();
        }

        async function doVote(t) {
            _vid[t] = (_vid[t] || 0) + 1;
            document.getElementById(t === 'likes' ? 'vLikes' : 'vUnlikes').innerText = _vid[t];
            await _sb.from('pufutaratube_videos').update({ [t]: _vid[t] }).eq('id', _vid.id);
        }

        // UPLOAD
        function openModal() { document.getElementById('uploadModal').style.display='flex'; }
        function closeModal() { document.getElementById('uploadModal').style.display='none'; }
        function upMode(m) {
            _uType = m;
            document.getElementById('tFile').style.background = m === 'file' ? '#111' : '#eee';
            document.getElementById('tFile').style.color = m === 'file' ? '#fff' : '#111';
            document.getElementById('tLink').style.background = m === 'link' ? '#111' : '#eee';
            document.getElementById('tLink').style.color = m === 'link' ? '#fff' : '#111';
            document.getElementById('areaFile').style.display = m === 'file' ? 'block' : 'none';
            document.getElementById('areaLink').style.display = m === 'link' ? 'block' : 'none';
        }

        async function runUpload() {
            const title = document.getElementById('inTitle').value;
            if(!title) return alert("Judul wajib diisi!");
            document.getElementById('btnRunUpload').innerText = "Sedang Memproses...";
            let url = "";
            if(_uType === 'file') {
                const f = document.getElementById('inFile').files[0];
                const path = Date.now() + "_" + f.name;
                await _sb.storage.from('pufutaratube_videos').upload(path, f);
                url = _sb.storage.from('pufutaratube_videos').getPublicUrl(path).data.publicUrl;
            } else { url = document.getElementById('inUrl').value; }
            await _sb.from('pufutaratube_videos').insert({ title, video_url: url, uploader: _me.email });
            location.reload();
        }

        async function delVideo() {
            if(confirm("Hapus video ini selamanya?")) {
                await _sb.from('pufutaratube_videos').delete().eq('id', _vid.id);
                location.reload();
            }
        }

        async function addComm() {
            const val = document.getElementById('commText').value;
            await _sb.from('pufutaratube_comments').insert({ video_id: _vid.id, comment: val, uploader: _me.email });
            document.getElementById('commText').value = ''; loadComments();
        }

        async function loadComments() {
            const { data } = await _sb.from('pufutaratube_comments').select('*').eq('video_id', _vid.id).order('id',{ascending:false});
            document.getElementById('commBox').innerHTML = data.map(c => `<p style="margin-bottom:12px; font-size:1rem;"><b>${c.uploader.split('@')[0]}:</b> ${c.comment}</p>`).join('');
        }

        function goChannel(name) { nav('screenHome'); document.getElementById('homeLabel').innerText = "Channel: " + name; getFeed(name + "@"); }

        // INIT
        _sb.auth.getSession().then(({data}) => {
            if(data.session) {
                _me = data.session.user;
                document.getElementById('screenAuth').style.display = 'none';
                document.getElementById('uiHeader').style.display = 'flex';
                document.getElementById('labelName').innerText = _me.email.split('@')[0];
                document.getElementById('avaCircle').innerText = _me.email[0].toUpperCase();
                nav('screenHome'); getFeed();
            }
        });
    </script>
</body>
</html>
