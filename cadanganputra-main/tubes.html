<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PufutaraTube</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f9f9f9; color: #111; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Navbar Baru: Putih & Bergaris */
        .navbar { background: #fff; color: #111; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid #e0e0e0; }
        .logo { font-size: 1.5rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; color: #111; }
        .logo span { background: #111; color: #fff; padding: 2px 8px; border-radius: 6px; font-size: 1.2rem; }
        
        /* Search Bar Tanpa Emoji */
        .search-bar { display: flex; flex: 1; max-width: 500px; margin: 0 20px; border: 1px solid #ccc; border-radius: 25px; overflow: hidden; background: #fff; }
        .search-bar input { flex: 1; padding: 10px 18px; border: none; outline: none; font-size: 0.95rem; }
        .search-bar button { padding: 10px 25px; border: none; background: #f0f0f0; color: #333; cursor: pointer; font-weight: bold; border-left: 1px solid #ccc; transition: 0.2s; font-size: 0.95rem; }
        .search-bar button:hover { background: #e0e0e0; }
        
        /* Akun & Nav Actions */
        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .btn-upload-nav { background: #111; color: #fff; border: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn-upload-nav:hover { background: #333; }
        
        .account-info { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 600; color: #333; border-left: 1px solid #e0e0e0; padding-left: 15px; }
        .account-avatar { width: 32px; height: 32px; background: #1a73e8; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; text-transform: uppercase; }
        .logout { background: transparent; color: #d32f2f; border: none; cursor: pointer; font-weight: bold; font-size: 0.85rem; padding-left: 5px; }
        .logout:hover { text-decoration: underline; }

        /* Screens */
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .active { display: block; }

        /* Auth */
        .auth-container { max-width: 400px; margin: 100px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); text-align: center; border: 1px solid #e0e0e0; }
        .auth-container input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .auth-container input:focus { border-color: #111; }
        .auth-container button { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .auth-container button:hover { background: #333; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .video-card { background: #fff; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #f0f0f0; }
        .video-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .video-thumbnail { width: 100%; height: 160px; object-fit: cover; background: #000; }
        .video-info { padding: 12px; }
        .video-title { font-weight: 600; font-size: 1rem; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #111; }
        .video-meta { font-size: 0.8rem; color: #666; }

        /* Watch Screen */
        .watch-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .player-wrapper { width: 100%; background: #000; border-radius: 12px; overflow: hidden; }
        .player-wrapper video { width: 100%; max-height: 550px; outline: none; }
        .watch-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
        .watch-stats { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .btn-like { background: #f0f0f0; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-like:hover { background: #e0e0e0; }
        
        /* Comments */
        .comment-section { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .comment-input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .comment-input-area button { padding: 10px 20px; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .comment-list { display: flex; flex-direction: column; gap: 15px; }
        .comment-item { border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .comment-user { font-weight: bold; font-size: 0.85rem; color: #444; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .comment-user-avatar { width: 24px; height: 24px; background: #ccc; color: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 0.7rem; }

        /* Upload Modal */
        .upload-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .upload-box { background: #fff; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .upload-box h2 { font-size: 1.3rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .upload-box input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .btn-close { background: #fff; color: #d32f2f; border: 1px solid #d32f2f; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-close:hover { background: #ffebee; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo" onclick="showScreen('homeScreen')">Pufutara<span>Tube</span></div>
        
        <div class="search-bar" id="searchBar" style="display:none;">
            <input type="text" id="searchInput" placeholder="Cari video..." onkeypress="if(event.key==='Enter') searchVideos()">
            <button onclick="searchVideos()">Cari</button>
        </div>
        
        <div class="nav-actions" id="navActions" style="display:none;">
            <button class="btn-upload-nav" onclick="openUploadModal()">➕ Upload</button>
            <div class="account-info">
                <div class="account-avatar" id="userAvatar">U</div>
                <span id="userNameDisplay">User</span>
                <button class="logout" onclick="logout()">Keluar</button>
            </div>
        </div>
    </div>

    <div id="authScreen" class="screen active">
        <div class="auth-container">
            <h2 style="margin-bottom: 10px;">Masuk PufutaraTube</h2>
            <p style="margin-bottom: 25px; color: #666; font-size:0.9rem;">Gunakan akun Pufutara kamu</p>
            <input type="email" id="emailIn" placeholder="Email">
            <input type="password" id="passIn" placeholder="Password">
            <button onclick="handleAuth()">Login / Daftar</button>
            <p id="authErr" style="color:red; font-size:0.85rem; margin-top: 15px;"></p>
        </div>
    </div>

    <div id="homeScreen" class="screen">
        <h3 id="homeTitle" style="margin-bottom: 20px; color: #333;">Video Terbaru</h3>
        <div class="video-grid" id="videoGrid">
            </div>
    </div>

    <div id="watchScreen" class="screen">
        <div class="watch-container">
            <div class="player-wrapper">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div>
                <h2 class="watch-title" id="watchTitle">Judul Video</h2>
                <div class="watch-stats">
                    <div class="video-meta">
                        <span id="watchViews">0</span> kali ditonton • Diupload oleh <b id="watchUploader" style="color:#111;">User</b>
                    </div>
                    <button class="btn-like" onclick="likeVideo()" id="btnLike">👍 <span id="watchLikes">0</span></button>
                </div>
            </div>

            <div class="comment-section">
                <h3 style="margin-bottom: 15px;">Komentar</h3>
                <div class="comment-input-area">
                    <input type="text" id="commentInput" placeholder="Tulis komentar..." onkeypress="if(event.key==='Enter') postComment()">
                    <button onclick="postComment()">Kirim</button>
                </div>
                <div class="comment-list" id="commentList">
                    </div>
            </div>
        </div>
    </div>

    <div class="upload-modal" id="uploadModal">
        <div class="upload-box">
            <h2>Upload Video</h2>
            <input type="text" id="upTitle" placeholder="Judul Video (Wajib)" required>
            <input type="file" id="upFile" accept="video/mp4,video/webm,video/ogg" required>
            <button onclick="submitVideo()" style="background:#111; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Mulai Upload</button>
            <button class="btn-close" onclick="closeUploadModal()">Batal</button>
            <p id="upStatus" style="font-size:0.9rem; text-align:center; font-weight:bold;"></p>
        </div>
    </div>

    <script>
        // PASTIKAN URL DAN KEY INI BENAR (Sesuai dengan screenshot error kamu sebelumnya)
        const _CONFIG = {
            URL: 'https://puywjdopumlzvmzbcudr.supabase.co',
            KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc'
        };
        const _client = window.supabase.createClient(_CONFIG.URL, _CONFIG.KEY);
        
        let _userEmail = '';
        let _currentVideoId = null;
        let _currentLikes = 0;

        // --- AUTH ---
        async function handleAuth() {
            const email = document.getElementById('emailIn').value;
            const password = document.getElementById('passIn').value;
            const errBox = document.getElementById('authErr');
            errBox.innerText = "Loading...";

            const { data, error } = await _client.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: upErr } = await _client.auth.signUp({ email, password });
                if (upErr) errBox.innerText = upErr.message;
                else errBox.innerText = "Akun dibuat, silakan klik Login sekali lagi.";
            } else {
                _userEmail = data.user.email;
                enterApp();
            }
        }

        async function logout() { await _client.auth.signOut(); location.reload(); }

        function enterApp() {
            document.getElementById('searchBar').style.display = 'flex';
            document.getElementById('navActions').style.display = 'flex';
            
            // Set data profil di pojok kanan atas
            const name = _userEmail.split('@')[0];
            document.getElementById('userNameDisplay').innerText = name;
            document.getElementById('userAvatar').innerText = name.charAt(0); // Ambil huruf pertama

            showScreen('homeScreen');
            loadVideos();
        }

        // --- NAVIGATION ---
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if(screenId !== 'watchScreen') {
                document.getElementById('videoPlayer').pause();
            }
        }

        // --- LOAD VIDEOS ---
        async function loadVideos(searchQuery = '') {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p style="color:#666;">Memuat video...</p>';
            
            let query = _client.from('pufutaratube_videos').select('*').order('id', { ascending: false });
            
            if (searchQuery) {
                query = query.ilike('title', `%${searchQuery}%`);
                document.getElementById('homeTitle').innerText = `Hasil pencarian: "${searchQuery}"`;
            } else {
                document.getElementById('homeTitle').innerText = `Video Terbaru`;
            }

            const { data, error } = await query;

            if (error) {
                grid.innerHTML = `<p style="color:red;">Gagal memuat: Pastikan RLS di tabel pufutaratube_videos sudah di-Disable.</p>`;
                return;
            }

            if (data.length === 0) {
                grid.innerHTML = '<p style="color:#666;">Belum ada video yang ditemukan.</p>';
                return;
            }

            grid.innerHTML = '';
            data.forEach(v => {
                const uploaderName = v.uploader.split('@')[0];
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => watchVideo(v);
                
                card.innerHTML = `
                    <video class="video-thumbnail" src="${v.video_url}#t=1" muted preload="metadata"></video>
                    <div class="video-info">
                        <div class="video-title" title="${v.title}">${v.title}</div>
                        <div class="video-meta">${uploaderName} • ${v.views} kali ditonton</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function searchVideos() {
            const val = document.getElementById('searchInput').value.trim();
            showScreen('homeScreen');
            loadVideos(val);
        }

        // --- UPLOAD VIDEO ---
        function openUploadModal() { document.getElementById('uploadModal').style.display = 'flex'; }
        function closeUploadModal() { document.getElementById('uploadModal').style.display = 'none'; document.getElementById('upStatus').innerText = ''; }

        async function submitVideo() {
            const title = document.getElementById('upTitle').value.trim();
            const fileInput = document.getElementById('upFile');
            const file = fileInput.files[0];
            const statusBox = document.getElementById('upStatus');

            if (!title || !file) { alert("Judul dan File wajib diisi!"); return; }
            if (file.size > 50 * 1024 * 1024) { alert("Maksimal ukuran video 50MB ya!"); return; }

            statusBox.innerText = "⏳ Sedang mengunggah... jangan tutup halaman ini.";
            statusBox.style.color = "#1a73e8";

            try {
                const safeName = file.name.replace(/\s+/g, '_');
                const fileName = `${Date.now()}_${safeName}`;
                
                const { error: uploadError } = await _client.storage.from('pufutaratube_videos').upload(fileName, file);
                if (uploadError) throw uploadError;

                const { data: publicData } = _client.storage.from('pufutaratube_videos').getPublicUrl(fileName);
                const videoUrl = publicData.publicUrl;

                const { error: dbError } = await _client.from('pufutaratube_videos').insert([{
                    title: title,
                    video_url: videoUrl,
                    uploader: _userEmail
                }]);
                
                if (dbError) throw dbError;

                statusBox.innerText = "✅ Video berhasil dipublikasikan!";
                statusBox.style.color = "green";
                
                setTimeout(() => {
                    closeUploadModal();
                    document.getElementById('upTitle').value = '';
                    fileInput.value = '';
                    loadVideos();
                }, 1500);

            } catch (err) {
                console.error(err);
                statusBox.innerText = "❌ Gagal: " + err.message;
                statusBox.style.color = "red";
            }
        }

        // --- WATCH VIDEO ---
        async function watchVideo(v) {
            _currentVideoId = v.id;
            _currentLikes = v.likes;
            
            document.getElementById('watchTitle').innerText = v.title;
            document.getElementById('watchUploader').innerText = v.uploader.split('@')[0];
            document.getElementById('watchLikes').innerText = v.likes;
            
            const player = document.getElementById('videoPlayer');
            player.src = v.video_url;
            
            showScreen('watchScreen');
            loadComments(v.id);

            const newViews = v.views + 1;
            document.getElementById('watchViews').innerText = newViews;
            
            await _client.from('pufutaratube_videos').update({ views: newViews }).eq('id', v.id);
        }

        async function likeVideo() {
            if (!_currentVideoId) return;
            const btnLike = document.getElementById('btnLike');
            btnLike.disabled = true; 
            
            _currentLikes += 1;
            document.getElementById('watchLikes').innerText = _currentLikes;

            await _client.from('pufutaratube_videos').update({ likes: _currentLikes }).eq('id', _currentVideoId);
            btnLike.disabled = false;
        }

        // --- KOMENTAR ---
        async function loadComments(videoId) {
            const list = document.getElementById('commentList');
            list.innerHTML = '<i style="color:#666;">Memuat komentar...</i>';

            const { data, error } = await _client.from('pufutaratube_comments')
                .select('*')
                .eq('video_id', videoId)
                .order('id', { ascending: false });

            if (error) { list.innerHTML = 'Gagal memuat komentar.'; return; }
            if (data.length === 0) { list.innerHTML = '<div style="color:#888; font-size:0.9rem;">Belum ada komentar. Jadilah yang pertama!</div>'; return; }

            list.innerHTML = '';
            data.forEach(c => {
                const username = c.uploader.split('@')[0];
                const initial = username.charAt(0).toUpperCase();
                
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `
                    <div class="comment-user">
                        <div class="comment-user-avatar">${initial}</div>
                        ${username}
                    </div>
                    <div style="font-size: 0.95rem; margin-left: 32px; color: #222;">${c.comment}</div>
                `;
                list.appendChild(div);
            });
        }

        async function postComment() {
            const inp = document.getElementById('commentInput');
            const text = inp.value.trim();
            if (!text || !_currentVideoId) return;

            inp.value = ''; 
            
            await _client.from('pufutaratube_comments').insert([{
                video_id: _currentVideoId,
                uploader: _userEmail,
                comment: text
            }]);

            loadComments(_currentVideoId); 
        }

        // Auto Login
        _client.auth.getSession().then(({data}) => {
            if(data.session) { _userEmail = data.session.user.email; enterApp(); }
        });
    </script>
</body>
</html>
