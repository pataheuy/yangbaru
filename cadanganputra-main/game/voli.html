<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLLI 2D · BULAT + MATA · WARNA CERAH</title>
    <!-- ========== LOADING SCREEN ========== -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fff9e6 0%, #ffffff 50%, #fff9e6 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: opacity 0.5s ease;
        }

        .loading-container {
            text-align: center;
            padding: 2rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            animation: containerPulse 2s ease-in-out infinite;
        }

        @keyframes containerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .sun {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
            animation: sunGlow 3s ease-in-out infinite;
        }

        .sun-core {
            width: 60px;
            height: 60px;
            background: #FFD700;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px #FFD700, 0 0 60px #FFA500, 0 0 90px #FFD700;
            animation: sunPulse 2s ease-in-out infinite;
        }

        .sun-ray {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .sun-ray::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 30px;
            background: linear-gradient(to bottom, #FFD700, #FFA500);
            left: 50%;
            transform: translateX(-50%);
            border-radius: 4px;
            animation: rayGlow 1.5s ease-in-out infinite;
        }

        .sun-ray::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 8px;
            background: linear-gradient(to right, #FFD700, #FFA500);
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            border-radius: 4px;
            animation: rayGlow 1.5s ease-in-out infinite 0.3s;
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }

        .circle {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #FFD700;
            animation: bounce 1.4s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .circle:nth-child(1) { animation-delay: -0.32s; background: #FFD700; }
        .circle:nth-child(2) { animation-delay: -0.16s; background: #FFF8E7; border: 2px solid #FFD700; }
        .circle:nth-child(3) { animation-delay: 0; background: #FFD700; }
        .circle:nth-child(4) { animation-delay: 0.16s; background: #FFF8E7; border: 2px solid #FFD700; }
        .circle:nth-child(5) { animation-delay: 0.32s; background: #FFD700; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.6; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        .progress-bar {
            width: 300px;
            height: 8px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFF8E7, #FFD700);
            border-radius: 10px;
            animation: progress 2.5s ease-in-out infinite;
            box-shadow: 0 0 20px #FFD700;
        }

        @keyframes progress {
            0% { width: 0%; margin-left: 0; }
            50% { width: 100%; margin-left: 0; }
            100% { width: 0%; margin-left: 100%; }
        }

        .loading-text {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #FFD700, #FFF8E7, #FFD700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: textShine 3s linear infinite;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 20px 0;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .percentage {
            font-size: 1.5rem;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: percentagePulse 1s ease-in-out infinite;
        }

        @keyframes percentagePulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10001;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #FFD700;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 8s infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .glow-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at center, rgba(255,215,0,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 10001;
        }

        .shine-effect {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.3) 50%, transparent 70%);
            animation: shine 6s infinite;
            pointer-events: none;
            z-index: 10001;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        @keyframes sunPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes sunGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        @keyframes rayGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>

    <!-- ========== GAME STYLES ========== -->
    <style>
        .game-container {
            display: none;
            width: 100%;
            height: 100vh;
            background: #0a1117;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .volley-arena {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 40px;
            background: rgba(10, 25, 30, 0.5);
            backdrop-filter: blur(5px);
            padding: 25px 25px 30px;
            border: 1px solid #ffecb3;
            box-shadow: 0 20px 40px #00000080;
        }

        canvas {
            display: block;
            width: 800px;
            height: 500px;
            border-radius: 28px;
            box-shadow: 0 0 0 3px #ffe3aa, 0 20px 40px black;
            cursor: none;
            background: #0a1a22;
            touch-action: none;
        }

        .info-panel {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            background: #0f1f28ee;
            padding: 10px 25px;
            border-radius: 60px;
            border: 1px solid #ffd89c;
            backdrop-filter: blur(8px);
            color: #f0ffe0;
            font-weight: 600;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key-hint {
            display: flex;
            gap: 15px;
            font-size: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .key-hint span {
            background: #273e4a;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #ffdb9f;
            white-space: nowrap;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .action-btn {
            background: #1e4b5a;
            border: none;
            color: #fffeca;
            font-size: 24px;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b2c35;
            transition: 0.05s linear;
            font-weight: bold;
            border: 1px solid #b0f0ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #0b2c35;
        }

        .lobby-btn {
            background: #5f4a2f;
            border-color: #ffcc88;
        }

        .score-board {
            display: flex;
            gap: 60px;
            color: #ffefcf;
            font-size: 32px;
            font-weight: 700;
            background: #041014d0;
            padding: 8px 45px;
            border-radius: 50px;
            border: 1px solid #ffd78c;
            letter-spacing: 4px;
            margin-top: 10px;
        }

        .menu-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a1219e0;
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: 'Segoe UI', sans-serif;
        }

        .menu-card {
            background: #1f3a44;
            padding: 40px 60px;
            border-radius: 70px;
            border: 3px solid #ffdd99;
            box-shadow: 0 30px 60px black;
            text-align: center;
            color: #fff0cc;
        }

        .menu-card h1 {
            font-size: 56px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #aaddff;
        }

        .menu-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .menu-btn {
            background: #2f6f7f;
            border: none;
            color: white;
            font-size: 32px;
            font-weight: bold;
            padding: 18px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #14303a, 0 10px 30px black;
            transition: 0.05s linear;
            border: 2px solid #ffecb3;
            text-transform: uppercase;
            letter-spacing: 3px;
            min-width: 200px;
        }

        .menu-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #14303a, 0 10px 30px black;
        }

        .menu-btn.bot {
            background: #7f5f2f;
        }

        .menu-btn.level {
            font-size: 26px;
            padding: 12px 25px;
            background: #3f5f6f;
        }

        .level-selector {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <!-- ========== LOADING SCREEN ========== -->
    <div class="loading-screen" id="loadingScreen">
        <div class="particles" id="particles"></div>
        <div class="glow-effect"></div>
        <div class="shine-effect"></div>
        <div class="loading-container">
            <div class="sun">
                <div class="sun-core"></div>
                <div class="sun-ray"></div>
            </div>
            <div class="loading-text">Loading</div>
            <div class="loader">
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
                <div class="circle"></div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="percentage" id="percentage">0%</div>
        </div>
    </div>

    <!-- ========== GAME CONTAINER ========== -->
    <div class="game-container" id="gameContainer"></div>

    <script>
        // ========== LOADING SCREEN LOGIC ==========
        const loadingScreen = document.getElementById('loadingScreen');
        const gameContainer = document.getElementById('gameContainer');
        const percentageElement = document.getElementById('percentage');
        let percentage = 0;
        let loadingComplete = false;

        const particlesDiv = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.width = Math.random() * 15 + 5 + 'px';
            particle.style.height = particle.style.width;
            particlesDiv.appendChild(particle);
        }

        const sunRay = document.querySelector('.sun-ray');
        for (let i = 0; i < 8; i++) {
            const ray = document.createElement('div');
            ray.style.position = 'absolute';
            ray.style.width = '100%';
            ray.style.height = '100%';
            ray.style.transform = `rotate(${i * 45}deg)`;
            ray.innerHTML = '<div style="position: absolute; width: 4px; height: 40px; background: linear-gradient(to bottom, #FFD700, #FFA500); left: 50%; transform: translateX(-50%); border-radius: 2px; animation: rayGlow 1.5s ease-in-out infinite;"></div>';
            sunRay.parentElement.appendChild(ray);
        }

        const interval = setInterval(() => {
            percentage = (percentage + 1) % 101;
            percentageElement.textContent = percentage + '%';
            if (percentage === 100 && !loadingComplete) {
                loadingComplete = true;
                clearInterval(interval);
                setTimeout(() => {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        gameContainer.style.display = 'flex';
                        initGame();
                    }, 500);
                }, 800);
            }
        }, 30);

        // ========== GAME VOLLI dengan KARAKTER BULAT & MATA ==========
        function initGame() {
            gameContainer.innerHTML = `
                <div class="volley-arena" id="volleyArena">
                    <canvas id="volleyCanvas" width="800" height="500"></canvas>
                    <div class="score-board">
                        <span>🏐 KIRI: <span id="leftScoreEl">0</span></span>
                        <span>🔥 KANAN: <span id="rightScoreEl">0</span></span>
                    </div>
                    <div class="info-panel">
                        <div class="key-hint" id="keyHint"></div>
                        <div class="action-buttons">
                            <button class="action-btn lobby-btn" id="lobbyBtn">🏠 LOBBY</button>
                            <button class="action-btn" id="fullscreenBtn">⛶ FULL</button>
                        </div>
                    </div>
                </div>
                <div class="menu-overlay" id="menuOverlay">
                    <div class="menu-card" id="mainMenu">
                        <h1>🏐 VOLLI 2D</h1>
                        <div class="menu-buttons">
                            <button class="menu-btn" id="modeBotBtn">VS BOT</button>
                            <button class="menu-btn bot" id="modeMabarBtn">VS PLAYER</button>
                        </div>
                    </div>
                    <div class="menu-card" id="levelMenu" style="display: none;">
                        <h1>🎚️ PILIH LEVEL BOT</h1>
                        <div class="level-selector">
                            <button class="menu-btn level" id="levelEasy">MUDAH</button>
                            <button class="menu-btn level" id="levelMedium">SEDANG</button>
                            <button class="menu-btn level" id="levelHard">SUSAH</button>
                        </div>
                    </div>
                </div>
            `;

            const canvas = document.getElementById('volleyCanvas');
            const ctx = canvas.getContext('2d');
            const leftScoreEl = document.getElementById('leftScoreEl');
            const rightScoreEl = document.getElementById('rightScoreEl');
            const arena = document.getElementById('volleyArena');
            const menuOverlay = document.getElementById('menuOverlay');
            const mainMenu = document.getElementById('mainMenu');
            const levelMenu = document.getElementById('levelMenu');
            const modeBotBtn = document.getElementById('modeBotBtn');
            const modeMabarBtn = document.getElementById('modeMabarBtn');
            const levelEasy = document.getElementById('levelEasy');
            const levelMedium = document.getElementById('levelMedium');
            const levelHard = document.getElementById('levelHard');
            const keyHint = document.getElementById('keyHint');
            const lobbyBtn = document.getElementById('lobbyBtn');

            let gameMode = null;
            let botLevel = 'medium';
            let gameStarted = false;

            const GROUND_Y = 430;
            const NET_X = 400;
            const PLAYER_HEIGHT = 48;
            const NET_HEIGHT = PLAYER_HEIGHT * 2;
            const NET_BOTTOM = GROUND_Y - 6;
            const NET_TOP = NET_BOTTOM - NET_HEIGHT;

            let leftScore = 0, rightScore = 0;

            let ball = {
                x: 300, y: 300,
                vx: 3.5, vy: -3.0,
                r: 12,
                gravity: 0.22,
                friction: 0.992,
                trail: []
            };

            const BOUNCE_FACTOR = 0.8;
            const NET_BOUNCE = 0.85;

            let scorePauseTimer = 0;
            const PAUSE_DURATION = 80;
            let waitingForReady = false;

            // ========== PEMAIN BULAT DENGAN MATA (WARNA SANGAT CERAH) ==========
            let playerLeft = {
                baseY: GROUND_Y - 28, y: GROUND_Y - 28, x: 150, r: 24,
                color: '#FFEE22', // kuning neon
                glow: '#FFFF88',
                jumpOffset: 0, jumpVy: 0, isJumping: false,
                leftPressed: false, rightPressed: false, jumpPressed: false,
                direction: 1 // 1 = kanan, -1 = kiri
            };

            let playerRight = {
                baseY: GROUND_Y - 28, y: GROUND_Y - 28, x: 620, r: 24,
                color: '#FFAA33', // oranye terang
                glow: '#FFBB66',
                jumpOffset: 0, jumpVy: 0, isJumping: false,
                leftPressed: false, rightPressed: false, jumpPressed: false,
                direction: -1
            };

            const PLAYER_LEFT_MIN = 70;
            const PLAYER_LEFT_MAX = 340;
            const PLAYER_RIGHT_MIN = 460;
            const PLAYER_RIGHT_MAX = 730;
            const KEY_SPEED = 9;

            const joystick = {
                active: false,
                centerX: 120, centerY: 440,
                knobX: 120, knobY: 440,
                radius: 40, maxRadius: 40,
                dirX: 0, dirY: 0, strength: 0
            };
            const JOYSTICK_MAX_SPEED = 9;
            const JUMP_THRESHOLD = 0.6;
            let canJumpJoystick = true;

            let sparks = [];
            let mouseX = 300, mouseY = 300;

            document.getElementById('fullscreenBtn').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    arena.requestFullscreen().catch(err => alert('fullscreen tidak bisa'));
                } else {
                    document.exitFullscreen();
                }
            });

            function resetGameToLobby() {
                gameStarted = false;
                leftScore = 0; rightScore = 0;
                updateScoreUI();
                playerLeft.x = 150; playerLeft.y = playerLeft.baseY; playerLeft.isJumping = false; playerLeft.jumpOffset = 0;
                playerRight.x = 620; playerRight.y = playerRight.baseY; playerRight.isJumping = false; playerRight.jumpOffset = 0;
                ball.x = 300; ball.y = 300; ball.vx = 3.5; ball.vy = -3.0; ball.trail = [];
                scorePauseTimer = 0; waitingForReady = false;
                playerLeft.leftPressed = false; playerLeft.rightPressed = false; playerLeft.jumpPressed = false;
                playerRight.leftPressed = false; playerRight.rightPressed = false; playerRight.jumpPressed = false;
                mainMenu.style.display = 'block';
                levelMenu.style.display = 'none';
                menuOverlay.style.display = 'flex';
            }

            lobbyBtn.addEventListener('click', resetGameToLobby);

            function updateScoreUI() {
                leftScoreEl.innerText = leftScore;
                rightScoreEl.innerText = rightScore;
            }

            function resetBallWithPause() {
                scorePauseTimer = PAUSE_DURATION;
                waitingForReady = true;
                ball.vx = 0; ball.vy = 0;
                ball.x = 400; ball.y = 300;
            }

            function releaseBall() {
                ball.vx = (Math.random() * 4 + 2.5) * (Math.random() > 0.5 ? 1 : -1);
                ball.vy = -3.5 - Math.random() * 1.5;
                waitingForReady = false;
            }

            function jump(playerObj) {
                if (!playerObj.isJumping) {
                    playerObj.isJumping = true;
                    playerObj.jumpVy = -7.5;
                }
            }

            function updateJump(playerObj) {
                if (playerObj.isJumping) {
                    playerObj.jumpOffset += playerObj.jumpVy;
                    playerObj.jumpVy += 0.45;
                    if (playerObj.jumpOffset >= 0) {
                        playerObj.jumpOffset = 0;
                        playerObj.isJumping = false;
                        playerObj.jumpVy = 0;
                    }
                } else {
                    playerObj.jumpOffset = 0;
                }
                playerObj.y = playerObj.baseY + playerObj.jumpOffset;
            }

            function autoHit(attacker, isLeftPlayer) {
                const dx = ball.x - attacker.x;
                const dy = ball.y - attacker.y;
                const dist = Math.hypot(dx, dy);
                const reach = attacker.r + ball.r + 42;

                if (dist <= reach) {
                    let targetX, targetY;
                    if (isLeftPlayer) {
                        targetX = playerRight.x + (Math.random() * 60 - 30);
                        targetY = playerRight.y - 20 + (Math.random() * 40 - 20);
                    } else {
                        targetX = playerLeft.x + (Math.random() * 60 - 30);
                        targetY = playerLeft.y - 20 + (Math.random() * 40 - 20);
                    }
                    targetX = Math.min(Math.max(targetX, 50), 750);
                    targetY = Math.min(Math.max(targetY, 80), GROUND_Y - 50);

                    let dirX = targetX - attacker.x;
                    let dirY = targetY - attacker.y;
                    const len = Math.hypot(dirX, dirY);
                    if (len > 0.1) { dirX /= len; dirY /= len; }
                    else { dirX = (NET_X - attacker.x) * 0.6; dirY = -4; }

                    let isSpike = Math.random() > 0.3;
                    let power;
                    if (isLeftPlayer) {
                        power = isSpike ? 9.5 + Math.random() * 2.0 : 6.5 + Math.random() * 1.5;
                    } else {
                        // BOT JAGO
                        switch(botLevel) {
                            case 'easy': 
                                power = isSpike ? 7.5 + Math.random() * 1.5 : 5.5 + Math.random() * 1.0; 
                                break;
                            case 'medium': 
                                power = isSpike ? 9.5 + Math.random() * 2.0 : 7.0 + Math.random() * 1.5; 
                                break;
                            case 'hard': 
                                power = isSpike ? 12.5 + Math.random() * 2.0 : 9.5 + Math.random() * 1.5; 
                                break;
                            default: power = 7.5;
                        }
                    }

                    ball.vy = dirY * power * 0.9 - (isLeftPlayer ? 3.0 : 2.5);
                    ball.vx = dirX * power * 0.9;
                    ball.vx = Math.min(Math.max(ball.vx, -16), 16);
                    ball.vy = Math.min(Math.max(ball.vy, -16), 14);

                    for (let i = 0; i < 8; i++) {
                        sparks.push({
                            x: ball.x, y: ball.y,
                            vx: (Math.random() - 0.5) * 6,
                            vy: (Math.random() - 0.8) * 5,
                            life: 0.4,
                            size: 3,
                            color: isLeftPlayer ? (isSpike ? '#FFEE22' : '#FFAA33') : '#FFAA33'
                        });
                    }
                }
            }

            function aiMove() {
                let moveSpeed, hitChance;
                switch(botLevel) {
                    case 'easy': 
                        moveSpeed = 0.025; 
                        hitChance = 0.25; 
                        break;
                    case 'medium': 
                        moveSpeed = 0.04; 
                        hitChance = 0.4; 
                        break;
                    case 'hard': 
                        moveSpeed = 0.06; 
                        hitChance = 0.6; 
                        break;
                    default: 
                        moveSpeed = 0.04; 
                        hitChance = 0.4;
                }

                if (ball.x > NET_X - 30) {
                    let targetX = ball.x + 20;
                    if (targetX > PLAYER_RIGHT_MAX) targetX = PLAYER_RIGHT_MAX;
                    if (targetX < PLAYER_RIGHT_MIN) targetX = PLAYER_RIGHT_MIN;
                    playerRight.x += (targetX - playerRight.x) * moveSpeed;
                } else {
                    playerRight.x += (600 - playerRight.x) * (moveSpeed * 0.3);
                }
                playerRight.x = Math.min(Math.max(playerRight.x, PLAYER_RIGHT_MIN), PLAYER_RIGHT_MAX);

                const dx = ball.x - playerRight.x;
                const dy = ball.y - playerRight.y;
                const dist = Math.hypot(dx, dy);
                if (dist < playerRight.r + ball.r + 40 && Math.random() < hitChance) {
                    autoHit(playerRight, false);
                }
            }

            function updateGame() {
                if (scorePauseTimer > 0) {
                    scorePauseTimer--;
                    if (scorePauseTimer === 0 && waitingForReady) releaseBall();
                }

                // Update arah pemain berdasarkan tombol yang ditekan
                if (playerLeft.leftPressed) playerLeft.direction = -1;
                if (playerLeft.rightPressed) playerLeft.direction = 1;

                // Gerak pemain kiri
                if (playerLeft.leftPressed) playerLeft.x -= KEY_SPEED;
                if (playerLeft.rightPressed) playerLeft.x += KEY_SPEED;

                if (joystick.active && joystick.strength > 0.05) {
                    playerLeft.x += joystick.dirX * JOYSTICK_MAX_SPEED * joystick.strength;
                    if (joystick.dirY < -0.5 && joystick.strength > JUMP_THRESHOLD && canJumpJoystick) {
                        jump(playerLeft);
                        canJumpJoystick = false;
                    }
                } else {
                    canJumpJoystick = true;
                }

                if (playerLeft.jumpPressed) {
                    jump(playerLeft);
                    playerLeft.jumpPressed = false;
                }

                playerLeft.x = Math.min(Math.max(playerLeft.x, PLAYER_LEFT_MIN), PLAYER_LEFT_MAX);

                if (gameMode === 'mabar') {
                    if (playerRight.leftPressed) playerRight.direction = -1;
                    if (playerRight.rightPressed) playerRight.direction = 1;
                    
                    if (playerRight.leftPressed) playerRight.x -= KEY_SPEED;
                    if (playerRight.rightPressed) playerRight.x += KEY_SPEED;
                    if (playerRight.jumpPressed) {
                        jump(playerRight);
                        playerRight.jumpPressed = false;
                    }
                    playerRight.x = Math.min(Math.max(playerRight.x, PLAYER_RIGHT_MIN), PLAYER_RIGHT_MAX);
                } else if (gameMode === 'bot') {
                    // Update arah bot berdasarkan posisi bola
                    if (ball.x > playerRight.x) playerRight.direction = 1;
                    else playerRight.direction = -1;
                    aiMove();
                }

                updateJump(playerLeft);
                updateJump(playerRight);

                if (scorePauseTimer === 0) {
                    ball.vy += ball.gravity;
                    ball.vx *= ball.friction;
                    ball.vy *= ball.friction;
                    ball.x += ball.vx;
                    ball.y += ball.vy;

                    ball.trail.push({ x: ball.x, y: ball.y, life: 0.8 });
                    if (ball.trail.length > 10) ball.trail.shift();

                    if (ball.x < ball.r) { ball.x = ball.r; ball.vx *= -0.6; }
                    if (ball.x > 800 - ball.r) { ball.x = 800 - ball.r; ball.vx *= -0.6; }
                    if (ball.y > GROUND_Y - ball.r) {
                        ball.y = GROUND_Y - ball.r;
                        ball.vy *= -BOUNCE_FACTOR;
                        if (ball.x < NET_X) rightScore++;
                        else leftScore++;
                        resetBallWithPause();
                        updateScoreUI();
                    }
                    if (ball.y < ball.r) { ball.y = ball.r; ball.vy *= -0.6; }

                    const netLeft = NET_X - 12;
                    const netRight = NET_X + 12;
                    if (ball.x + ball.r > netLeft && ball.x - ball.r < netRight && ball.y < NET_BOTTOM && ball.y > NET_TOP - 8) {
                        ball.vx *= -NET_BOUNCE;
                        if (ball.x < NET_X) ball.x = NET_X - ball.r - 2;
                        else ball.x = NET_X + ball.r + 2;
                        for (let i=0;i<4;i++) sparks.push({
                            x: NET_X, y: ball.y,
                            vx: (Math.random()-0.5)*4, vy: (Math.random()-1)*2,
                            life:0.3, size:3, color:'#ccaa66'
                        });
                    }

                    autoHit(playerLeft, true);
                    autoHit(playerRight, false);
                }

                for (let i = sparks.length - 1; i >= 0; i--) {
                    let s = sparks[i];
                    s.x += s.vx;
                    s.y += s.vy;
                    s.life -= 0.012;
                    s.vy += 0.06;
                    if (s.life <= 0 || s.y > GROUND_Y + 20) sparks.splice(i, 1);
                }
            }

            // Fungsi menggambar karakter bulat dengan mata
            function drawCircleWithEyes(player) {
                ctx.save();
                ctx.translate(player.x, player.y);
                
                // Gambar badan bulat
                ctx.shadowBlur = 20;
                ctx.shadowColor = player.glow;
                ctx.beginPath();
                ctx.arc(0, 0, player.r, 0, 2 * Math.PI);
                ctx.fillStyle = player.color;
                ctx.fill();
                
                // Mata putih (selalu menghadap sesuai arah)
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(player.direction === 1 ? 8 : -8, -6, 6, 0, 2 * Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
                
                // Pupil hitam
                ctx.beginPath();
                ctx.arc(player.direction === 1 ? 10 : -10, -8, 2.5, 0, 2 * Math.PI);
                ctx.fillStyle = '#000';
                ctx.fill();
                
                ctx.restore();
            }

            function drawJoystick() {
                ctx.shadowBlur = 4; ctx.shadowColor = '#ffffff20';
                ctx.beginPath(); ctx.arc(joystick.centerX, joystick.centerY, joystick.radius, 0, 2*Math.PI);
                ctx.fillStyle = '#2f4f5f'; ctx.fill();
                ctx.strokeStyle = '#ccaa66'; ctx.lineWidth = 2; ctx.stroke();

                ctx.shadowBlur = 6; ctx.shadowColor = '#aa8866';
                ctx.beginPath(); ctx.arc(joystick.knobX, joystick.knobY, joystick.radius*0.6, 0, 2*Math.PI);
                ctx.fillStyle = '#a0c0d0'; ctx.fill();
                ctx.strokeStyle = '#ffeecc'; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.shadowBlur = 0;
            }

            function drawReadyText() {
                if (scorePauseTimer > 0 && waitingForReady) {
                    ctx.font = 'bold 48px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ffffaa';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText('READY...', 400, 200);
                    if (scorePauseTimer < PAUSE_DURATION - 20) {
                        ctx.fillText('NOW!', 400, 280);
                    }
                    ctx.shadowBlur = 0;
                }
            }

            function draw() {
                ctx.clearRect(0, 0, 800, 500);
                const grad = ctx.createLinearGradient(0, 0, 0, 500);
                grad.addColorStop(0, '#03171f'); grad.addColorStop(0.7, '#1f4a5c');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, 800, 500);

                ctx.fillStyle = '#b89a7a'; ctx.shadowBlur = 3; ctx.shadowColor = '#00000040';
                ctx.fillRect(0, GROUND_Y-8, 800, 80); ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.strokeStyle = '#ccbbaa'; ctx.lineWidth = 2;
                ctx.setLineDash([12,20]); ctx.strokeRect(20, GROUND_Y-8, 760, 10); ctx.setLineDash([]);

                ctx.shadowBlur = 3; ctx.shadowColor = '#88aabb';
                for (let i=0; i<10; i++) {
                    ctx.beginPath(); ctx.moveTo(NET_X, NET_TOP + i*11); ctx.lineTo(NET_X, NET_BOTTOM-5);
                    ctx.strokeStyle = i%2===0 ? '#ccbbaa' : '#bbaabb'; ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.shadowBlur = 0;

                for (let i=0; i<ball.trail.length; i++) {
                    let t = ball.trail[i];
                    let alpha = (i/ball.trail.length)*0.2;
                    ctx.beginPath(); ctx.arc(t.x, t.y, ball.r*(i/ball.trail.length)*0.8+2, 0, 2*Math.PI);
                    ctx.fillStyle = `rgba(160,130,70,${alpha*0.5})`;
                    ctx.shadowBlur = 6; ctx.shadowColor = '#aa8844'; ctx.fill();
                }
                ctx.shadowBlur = 0;

                ctx.shadowBlur = 8; ctx.shadowColor = '#aa7733';
                ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, 2*Math.PI);
                ctx.fillStyle = '#ccaa66'; ctx.fill();
                ctx.strokeStyle = '#eeddbb'; ctx.lineWidth = 2; ctx.stroke();
                ctx.beginPath(); ctx.moveTo(ball.x-6, ball.y-5); ctx.lineTo(ball.x+7, ball.y+6);
                ctx.moveTo(ball.x+5, ball.y-7); ctx.lineTo(ball.x-6, ball.y+6);
                ctx.strokeStyle = '#ffeecc'; ctx.lineWidth = 1.2; ctx.stroke();
                ctx.shadowBlur = 0;

                // Gambar karakter bulat dengan mata
                drawCircleWithEyes(playerLeft);
                drawCircleWithEyes(playerRight);

                for (let s of sparks) {
                    ctx.globalAlpha = s.life * 0.7;
                    ctx.shadowBlur = 3; ctx.shadowColor = '#886644';
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size*0.5, 0, 2*Math.PI);
                    ctx.fillStyle = s.color; ctx.fill();
                }
                ctx.globalAlpha = 1; ctx.shadowBlur = 0;

                ctx.beginPath(); ctx.strokeStyle = '#ddccaa'; ctx.lineWidth = 1.2; ctx.setLineDash([5,6]);
                ctx.moveTo(mouseX-16, mouseY); ctx.lineTo(mouseX-6, mouseY);
                ctx.moveTo(mouseX+6, mouseY); ctx.lineTo(mouseX+16, mouseY);
                ctx.moveTo(mouseX, mouseY-16); ctx.lineTo(mouseX, mouseY-6);
                ctx.moveTo(mouseX, mouseY+6); ctx.lineTo(mouseX, mouseY+16);
                ctx.stroke(); ctx.setLineDash([]);

                drawJoystick();
                drawReadyText();
            }

            function gameLoop() {
                if (gameStarted) {
                    updateGame();
                    draw();
                }
                requestAnimationFrame(gameLoop);
            }

            function startGame(mode, level = 'medium') {
                gameMode = mode;
                botLevel = level;
                gameStarted = true;
                menuOverlay.style.display = 'none';

                leftScore = 0; rightScore = 0;
                updateScoreUI();
                resetBallWithPause();

                if (mode === 'bot') {
                    let levelText = { easy: 'MUDAH', medium: 'SEDANG', hard: 'SUSAH' }[level];
                    keyHint.innerHTML = `<span>P1: A/D, SPASI</span><span>🕹️ ↑ lompat</span><span>BOT: ${levelText}</span>`;
                } else {
                    keyHint.innerHTML = '<span>P1: A/D, SPASI</span><span>P2: ←/→, ↑ lompat</span>';
                }
            }

            modeBotBtn.addEventListener('click', () => {
                mainMenu.style.display = 'none';
                levelMenu.style.display = 'block';
            });

            modeMabarBtn.addEventListener('click', () => {
                startGame('mabar');
            });

            levelEasy.addEventListener('click', () => startGame('bot', 'easy'));
            levelMedium.addEventListener('click', () => startGame('bot', 'medium'));
            levelHard.addEventListener('click', () => startGame('bot', 'hard'));

            // Keyboard events
            window.addEventListener('keydown', (e) => {
                if (!gameStarted) return;
                const key = e.key;
                if (key === ' ' || key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight' || key === 'a' || key === 'd' || key === 'A' || key === 'D') e.preventDefault();

                if (key === 'a' || key === 'A') playerLeft.leftPressed = true;
                if (key === 'd' || key === 'D') playerLeft.rightPressed = true;
                if (key === ' ') playerLeft.jumpPressed = true;

                if (gameMode === 'mabar') {
                    if (key === 'ArrowLeft') playerRight.leftPressed = true;
                    if (key === 'ArrowRight') playerRight.rightPressed = true;
                    if (key === 'ArrowUp') playerRight.jumpPressed = true;
                } else if (gameMode === 'bot') {
                    if (key === 'ArrowLeft') playerLeft.leftPressed = true;
                    if (key === 'ArrowRight') playerLeft.rightPressed = true;
                }
            });

            window.addEventListener('keyup', (e) => {
                if (!gameStarted) return;
                const key = e.key;
                if (key === 'a' || key === 'A') playerLeft.leftPressed = false;
                if (key === 'd' || key === 'D') playerLeft.rightPressed = false;
                if (key === ' ') playerLeft.jumpPressed = false;
                if (gameMode === 'mabar') {
                    if (key === 'ArrowLeft') playerRight.leftPressed = false;
                    if (key === 'ArrowRight') playerRight.rightPressed = false;
                    if (key === 'ArrowUp') playerRight.jumpPressed = false;
                } else if (gameMode === 'bot') {
                    if (key === 'ArrowLeft') playerLeft.leftPressed = false;
                    if (key === 'ArrowRight') playerLeft.rightPressed = false;
                }
            });

            // Joystick events
            function handleJoystickStart(clientX, clientY) {
                if (!gameStarted) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let canvasX = (clientX - rect.left) * scaleX;
                let canvasY = (clientY - rect.top) * scaleY;
                const dx = canvasX - joystick.centerX;
                const dy = canvasY - joystick.centerY;
                const dist = Math.hypot(dx, dy);
                if (dist <= joystick.radius * 1.5) {
                    joystick.active = true;
                    updateJoystickKnob(clientX, clientY);
                }
            }

            function updateJoystickKnob(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let canvasX = (clientX - rect.left) * scaleX;
                let canvasY = (clientY - rect.top) * scaleY;
                let dx = canvasX - joystick.centerX;
                let dy = canvasY - joystick.centerY;
                const dist = Math.hypot(dx, dy);
                if (dist > joystick.maxRadius) {
                    dx = (dx / dist) * joystick.maxRadius;
                    dy = (dy / dist) * joystick.maxRadius;
                }
                joystick.knobX = joystick.centerX + dx;
                joystick.knobY = joystick.centerY + dy;
                const norm = Math.hypot(dx, dy);
                if (norm > 0.1) {
                    joystick.dirX = dx / joystick.maxRadius;
                    joystick.dirY = dy / joystick.maxRadius;
                    joystick.strength = Math.min(norm / joystick.maxRadius, 1);
                } else {
                    joystick.dirX = 0; joystick.dirY = 0; joystick.strength = 0;
                }
            }

            function handleJoystickMove(clientX, clientY) {
                if (!gameStarted || !joystick.active) return;
                updateJoystickKnob(clientX, clientY);
            }

            function handleJoystickEnd() {
                joystick.active = false;
                joystick.knobX = joystick.centerX;
                joystick.knobY = joystick.centerY;
                joystick.dirX = 0; joystick.dirY = 0; joystick.strength = 0;
                canJumpJoystick = true;
            }

            canvas.addEventListener('mousedown', (e) => { e.preventDefault(); handleJoystickStart(e.clientX, e.clientY); });
            canvas.addEventListener('mousemove', (e) => {
                e.preventDefault();
                if (!gameStarted) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                mouseX = (e.clientX - rect.left) * scaleX;
                mouseY = (e.clientY - rect.top) * scaleY;
                mouseX = Math.min(Math.max(mouseX, 0), 800);
                mouseY = Math.min(Math.max(mouseY, 0), 500);
                handleJoystickMove(e.clientX, e.clientY);
            });
            canvas.addEventListener('mouseup', (e) => { e.preventDefault(); handleJoystickEnd(); });
            canvas.addEventListener('mouseleave', (e) => { handleJoystickEnd(); });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; handleJoystickStart(touch.clientX, touch.clientY); });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                mouseX = (touch.clientX - rect.left) * scaleX;
                mouseY = (touch.clientY - rect.top) * scaleY;
                mouseX = Math.min(Math.max(mouseX, 0), 800);
                mouseY = Math.min(Math.max(mouseY, 0), 500);
                handleJoystickMove(touch.clientX, touch.clientY);
            });
            canvas.addEventListener('touchend', (e) => { e.preventDefault(); handleJoystickEnd(); });
            canvas.addEventListener('touchcancel', (e) => { e.preventDefault(); handleJoystickEnd(); });

            gameLoop();
        }
    </script>
</body>
</html>
