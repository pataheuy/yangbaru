<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pufutara Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- Modern Minimalist Tokens --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-body: #f4f5f7;
            --bg-panel: #ffffff;
            --bg-chat: #fafafa;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --accent: #0f172a;
            --accent-hover: #1e293b;
            --accent-light: #f1f5f9;
            --bubble-me: #0f172a;
            --bubble-me-text: #ffffff;
            --bubble-other: #ffffff;
            --bubble-other-text: #0f172a;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* --- Header (Glassmorphism) --- */
        header { 
            /* Perbaikan Lebar Header */
            width: 100%; max-width: 1600px; margin: 0 auto;
            height: 68px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6); z-index: 200; position: relative;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        
        .mobile-menu-btn {
            display: none; background: none; border: none; cursor: pointer; color: var(--text-main);
            align-items: center; justify-content: center; padding: 8px; border-radius: 8px; transition: 0.2s;
        }
        .mobile-menu-btn:hover { background: var(--accent-light); }
        
        .logo { font-size: 1.25rem; font-weight: 800; color: var(--text-main); text-decoration: none; letter-spacing: -0.5px; }
        .greeting { font-size: 0.9rem; font-weight: 500; color: var(--text-muted); display: none; background: var(--accent-light); padding: 4px 12px; border-radius: 20px; }
        
        .header-right { display: flex; align-items: center; gap: 16px; }
        .btn-outline { 
            border: 1px solid var(--border-light); background: transparent; color: var(--text-main); 
            padding: 8px 18px; border-radius: 12px; font-weight: 600; font-size: 0.85rem; 
            cursor: pointer; transition: all 0.2s ease; 
        }
        .btn-outline:hover { background: var(--bg-body); border-color: #cbd5e1; }

        /* --- Main Layout --- */
        .main-container { flex: 1; display: flex; overflow: hidden; position: relative; width: 100%; max-width: 1600px; margin: 0 auto; }

        /* --- Sidebar --- */
        .sidebar { 
            width: 320px; display: flex; flex-direction: column; background: var(--bg-panel); 
            border-right: 1px solid var(--border-light); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 100; flex-shrink: 0; 
        }
        .sidebar-header { padding: 24px 20px 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-icon-small { 
            background: var(--accent-light); border: none; width: 28px; height: 28px; border-radius: 8px;
            cursor: pointer; color: var(--text-main); display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-icon-small:hover { background: #e2e8f0; }

        .sidebar-scroll { flex: 1; overflow-y: auto; padding-bottom: 24px; }
        
        .chat-item { 
            margin: 4px 12px; padding: 12px; border-radius: 12px;
            display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s ease; position: relative;
        }
        .chat-item:hover { background-color: var(--accent-light); }
        .chat-item.active-chat { background-color: var(--accent); color: var(--bg-panel); box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15); }
        
        .delete-chat-btn {
            position: absolute; right: 12px; opacity: 0;
            background: var(--bg-panel); color: var(--text-muted);
            border: 1px solid var(--border-light); border-radius: 8px;
            cursor: pointer; font-size: 1rem; width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .chat-item:hover .delete-chat-btn { opacity: 1; }
        .delete-chat-btn:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-bg); transform: scale(1.05); }
        .active-chat .delete-chat-btn { background: var(--accent-hover); color: #cbd5e1; border: none; }
        .active-chat .delete-chat-btn:hover { color: #fca5a5; background: rgba(255,255,255,0.1); }

        .avatar-circle { 
            width: 44px; height: 44px; border-radius: 14px; background: var(--accent-light); 
            display: flex; align-items: center; justify-content: center; font-size: 1rem; 
            font-weight: 700; color: var(--text-main); flex-shrink: 0; 
        }
        .chat-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 4px; }
        .chat-name { font-size: 0.95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: inherit; }
        .chat-preview { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .active-chat .chat-name, .active-chat .chat-preview { color: var(--bg-panel); opacity: 0.9; }

        /* --- Chat Area --- */
        .chat-view { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); position: relative; width: 100%; overflow: hidden; }
        .chat-view-header { 
            height: 76px; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; 
            background: transparent;
        }
        .chat-view-name { font-weight: 700; font-size: 1.25rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.3px;}
        .chat-status-text { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        .chat-messages { flex: 1; padding: 24px 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }

        /* --- BUBBLE STYLING --- */
        .msg-group { display: flex; flex-direction: column; width: 100%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-wrapper { max-width: 80%; display: flex; flex-direction: column; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }

        .msg-row { display: flex; gap: 10px; align-items: flex-end; width: 100%; }
        .msg-wrapper.me .msg-row { justify-content: flex-end; }

        .msg-name { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; margin-left: 46px; line-height: 1;}
        .msg-time { font-size: 0.65rem; color: var(--text-muted); font-weight: 500; opacity: 0.8; margin-top: 4px; line-height: 1; padding: 0 4px; }
        .msg-wrapper.other .msg-time { margin-left: 46px; padding: 0; }

        .msg-bubble {
            padding: 12px 16px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; position: relative;
            cursor: pointer; transition: transform 0.1s, opacity 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .msg-bubble:active { transform: scale(0.98); }
        .msg-wrapper.other .msg-bubble { background-color: var(--bubble-other); color: var(--bubble-other-text); border: 1px solid var(--border-light); border-radius: 18px 18px 18px 4px; }
        .msg-wrapper.me .msg-bubble { background-color: var(--bubble-me); color: var(--bubble-me-text); border-radius: 18px 18px 4px 18px; }

        .msg-img { width: 100%; max-width: 280px; border-radius: 12px; cursor: zoom-in; display: block; object-fit: cover; }
        .msg-quote { 
            background: rgba(255,255,255,0.1); padding: 10px 14px; border-radius: 10px; 
            font-size: 0.85rem; margin-bottom: 10px; border-left: 3px solid rgba(255,255,255,0.5); 
        }
        .msg-wrapper.other .msg-quote { background: var(--bg-body); border-left-color: #cbd5e1; }

        /* --- Floating Input Area --- */
        .input-container { padding: 0 32px 32px 32px; background: transparent; flex-shrink: 0; }
        .input-wrapper { 
            background: var(--bg-panel); border-radius: 24px; padding: 10px 14px 10px 20px; 
            display: flex; align-items: center; gap: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border: 1px solid var(--border-light); transition: all 0.3s ease; 
        }
        .input-wrapper:focus-within { box-shadow: 0 8px 30px rgba(15, 23, 42, 0.1); border-color: #cbd5e1; transform: translateY(-2px); }
        .input-field { flex: 1; border: none; background: transparent; padding: 10px 0; font-size: 0.95rem; outline: none; color: var(--text-main); font-weight: 500; min-width: 0; }
        .input-field::placeholder { color: #94a3b8; }
        
        .btn-action { background: transparent; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: 0.2s; flex-shrink: 0;}
        .btn-action:hover { background: var(--bg-body); color: var(--text-main); }
        .btn-send { background: var(--accent); color: var(--bg-panel); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: 0.2s; flex-shrink: 0; box-shadow: 0 4px 10px rgba(15,23,42,0.2); }
        .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }

        /* Context Menu Popover */
        .action-menu { 
            position: absolute; background: var(--bg-panel); border: 1px solid var(--border-light); 
            border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); display: none; flex-direction: column; 
            z-index: 500; overflow: hidden; min-width: 160px; padding: 6px; 
            animation: popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .action-menu button { padding: 12px 16px; border: none; background: none; text-align: left; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--text-main); border-radius: 10px; transition: 0.2s;}
        .action-menu button:hover { background: var(--accent-light); }
        .action-menu button.danger { color: var(--danger); }
        .action-menu button.danger:hover { background: var(--danger-bg); }

        /* Modals & Screens */
        .auth-screen { position: fixed; inset: 0; background: var(--bg-body); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { 
            width: 100%; max-width: 420px; padding: 48px; text-align: center; 
            background: var(--bg-panel); border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .auth-input { 
            width: 100%; padding: 16px 20px; margin-bottom: 16px; border: 1px solid var(--border-light); 
            border-radius: 16px; font-size: 1rem; outline: none; background: #f8fafc; transition: 0.2s;
        }
        .auth-input:focus { border-color: var(--accent); background: var(--bg-panel); box-shadow: 0 0 0 4px var(--accent-light); }
        .btn-login { width: 100%; padding: 18px; background: var(--accent); color: var(--bg-panel); border: none; border-radius: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 8px;}
        .btn-login:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(15,23,42,0.15); }
        
        .reply-bar { 
            background: var(--bg-panel); color: var(--text-main); padding: 14px 24px; font-size: 0.85rem; 
            display: none; justify-content: space-between; align-items: center; 
            margin: 0 32px 16px 32px; border-radius: 16px; border: 1px solid var(--border-light);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-left: 4px solid var(--accent);
        }
        .reply-bar button { background: var(--accent-light); width: 28px; height: 28px; border-radius: 50%; border: none; color: var(--text-main); cursor: pointer; font-size: 0.9rem; transition: 0.2s; display: flex; align-items: center; justify-content: center;}
        .reply-bar button:hover { background: #e2e8f0; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); z-index: 550; display: none; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        .new-chat-modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-panel); 
            padding: 36px; border-radius: 28px; z-index: 600; display: none; flex-direction: column; gap: 24px; 
            width: 90%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-actions { display: flex; gap: 12px; }
        .modal-actions button { flex: 1; padding: 16px; border-radius: 14px; font-size: 0.95rem; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-cancel { background: var(--accent-light); color: var(--text-main); }
        .btn-cancel:hover { background: #e2e8f0; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }

        .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (max-width: 768px) {
            header { padding: 0 20px; height: 60px; }
            .mobile-menu-btn { display: flex; }
            .logo { font-size: 1.1rem; }
            .greeting { display: none !important; }
            
            .sidebar {
                position: absolute; left: 0; top: 0; bottom: 0;
                transform: translateX(-100%);
                width: 85%; max-width: 320px;
                box-shadow: 10px 0 30px rgba(0,0,0,0.1);
                z-index: 300; 
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay {
                display: none; position: absolute; inset: 0;
                background: rgba(15, 23, 42, 0.4); z-index: 250; backdrop-filter: blur(2px);
            }
            .sidebar-overlay.open { display: block; }

            .chat-view-header { padding: 0 20px; height: 64px; }
            .chat-messages { padding: 20px; gap: 20px; }
            .input-container { padding: 0 16px 20px 16px; }
            .reply-bar { padding: 12px 16px; margin: 0 16px 12px 16px; }
            
            .msg-wrapper { max-width: 90%; }
            .msg-img { max-width: 220px; }
            
            .auth-card { padding: 32px 24px; border-radius: 24px; box-shadow: none; border: none; background: transparent;}
            .auth-screen { background: var(--bg-panel); }
            .input-field, .auth-input { font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- Layar Login/Register -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <div style="width: 60px; height: 60px; background: var(--accent); border-radius: 20px; margin: 0 auto 24px auto; display: flex; align-items: center; justify-content: center; color: white;">
                <svg class="icon" viewBox="0 0 24 24" style="width: 32px; height: 32px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <h1 style="font-weight:800; letter-spacing:-1px; margin-bottom:8px; font-size: 1.8rem;">Pufutara</h1>
            <p style="color:var(--text-muted); margin-bottom:40px; font-size: 0.95rem;">Ngobrol lebih simpel, cepat, dan elegan.</p>
            <input type="email" id="emailIn" class="auth-input" placeholder="Alamat Email">
            <input type="password" id="passIn" class="auth-input" placeholder="Kata Sandi">
            <button class="btn-login" onclick="handleAuth()">Masuk / Daftar</button>
            <p id="authErr" style="color:var(--danger); font-size:0.85rem; margin-top: 20px; font-weight: 500;"></p>
        </div>
    </div>

    <!-- Context Menu Pesan -->
    <div id="actionMenu" class="action-menu">
        <button onclick="actionReply()">
            <svg class="icon" style="width:16px; height:16px; display:inline; margin-right:8px; vertical-align:middle;" viewBox="0 0 24 24"><polyline points="9 17 4 12 9 7"></polyline><path d="M20 18v-2a4 4 0 0 0-4-4H4"></path></svg>
            Balas Pesan
        </button>
        <button id="btnDel" class="danger" onclick="actionDelete()">
            <svg class="icon" style="width:16px; height:16px; display:inline; margin-right:8px; vertical-align:middle;" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Hapus Pesan
        </button>
    </div>

    <!-- Modal Chat Baru -->
    <div id="modalOverlay" class="modal-overlay" onclick="closeModals()"></div>
    <div id="newChatModal" class="new-chat-modal">
        <div>
            <h3 style="font-weight:700; font-size: 1.4rem; letter-spacing: -0.5px; margin-bottom: 6px;">Mulai Chat Baru</h3>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Masukkan email teman Anda untuk memulai percakapan pribadi.</p>
        </div>
        <input type="email" id="newChatTarget" class="auth-input" style="margin-bottom:0;" placeholder="contoh: teman@email.com">
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModals()">Batal</button>
            <button class="btn-primary" onclick="startPrivateChatFromInput()">Mulai Obrolan</button>
        </div>
    </div>

    <!-- Header Aplikasi -->
    <header>
        <div class="header-left">
            <button class="mobile-menu-btn" onclick="toggleSidebar()">
                <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <a href="#" class="logo">Pufutara CHat.</a>
            <span class="greeting" id="headerGreeting"></span>
        </div>
        <div class="header-right">
            <button onclick="logout()" id="logoutBtn" class="btn-outline" style="display:none;">Keluar</button>
        </div>
    </header>

    <!-- Layout Utama -->
    <div class="main-container">
        <!-- Overlay Sidebar Mobile -->
        <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
        
        <!-- Sidebar Menu -->
        <aside class="sidebar" id="appSidebar">
            <div class="sidebar-header"><span class="sidebar-title">Eksplorasi</span></div>
            <div class="sidebar-scroll">
                <div class="chat-item active-chat" id="globalChatLink" onclick="switchChat('global')">
                    <div class="avatar-circle" style="background: rgba(255,255,255,0.2); color: white;">
                        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    </div>
                    <div class="chat-info">
                        <span class="chat-name">Ruang Publik</span>
                        <span class="chat-preview">Ngobrol bersama semua orang</span>
                    </div>
                </div>

                <div class="sidebar-header" style="margin-top: 16px;">
                    <span class="sidebar-title">Pesan Langsung</span>
                    <button class="btn-icon-small" onclick="openNewChatModal()">
                        <svg class="icon" viewBox="0 0 24 24" style="width:16px; height:16px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
                <div id="sidebarChatList"></div>
            </div>
        </aside>

        <!-- Area Obrolan -->
        <main class="chat-view">
            <div class="chat-view-header">
                <div style="min-width: 0;">
                    <div class="chat-view-name" id="chatTitle">Ruang Publik</div>
                    <div class="chat-status-text" id="chatStatus">Terhubung ke jaringan publik</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages"></div>
            
            <div id="replyBar" class="reply-bar">
                <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;">
                    <span style="font-weight:700; opacity:0.8;">Membalas:</span> <span id="replyTxt" style="font-weight: 500; margin-left: 6px;"></span>
                </div>
                <button onclick="cancelReply()">✕</button>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="file" id="imgUpload" accept="image/*" style="display:none;" onchange="handleImageUpload()">
                    <button class="btn-action" onclick="document.getElementById('imgUpload').click()">
                        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </button>
                    <input type="text" id="msgIn" class="input-field" placeholder="Ketik pesan Anda..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button class="btn-send" onclick="sendMessage()">
                        <svg class="icon" viewBox="0 0 24 24" style="width: 18px; height: 18px;"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const _CONFIG = {
            URL: 'https://puywjdopumlzvmzbcudr.supabase.co',
            KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc'
        };

        const _client = window.supabase.createClient(_CONFIG.URL, _CONFIG.KEY);
        let _userEmail = '';
        let currentChatType = 'global'; 
        let currentTargetEmail = null;  
        let privateContacts = {}; 
        let selectedMsg = null;
        let replyingTo = null;

        const userColors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#6366f1', '#f97316', '#14b8a6', '#84cc16'];
        function getColorForUser(email) {
            let hash = 0;
            for (let i = 0; i < email.length; i++) hash = email.charCodeAt(i) + ((hash << 5) - hash);
            return userColors[Math.abs(hash) % userColors.length];
        }

        function toggleSidebar() {
            document.getElementById('appSidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        async function handleAuth() {
            const email = document.getElementById('emailIn').value;
            const password = document.getElementById('passIn').value;
            const btn = document.querySelector('.btn-login');
            
            btn.innerText = "Memproses...";
            const { data, error } = await _client.auth.signInWithPassword({ email, password });
            
            if (error) {
                const { error: upErr } = await _client.auth.signUp({ email, password });
                if (upErr) {
                    document.getElementById('authErr').innerText = upErr.message;
                    btn.innerText = "Masuk / Daftar";
                }
                else {
                    document.getElementById('authErr').style.color = "#10b981"; 
                    document.getElementById('authErr').innerText = "Akun berhasil dibuat! Silakan klik masuk lagi.";
                    btn.innerText = "Masuk / Daftar";
                }
            } else { _userEmail = data.user.email; enterDashboard(); }
        }

        function enterDashboard() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('headerGreeting').innerText = `👋 ${_userEmail.split('@')[0]}`;
            document.getElementById('headerGreeting').style.display = 'inline-block';
            loadSidebarList(); switchChat('global'); listenRealtime();
        }

        async function logout() { await _client.auth.signOut(); location.reload(); }
        
        function openNewChatModal() { 
            document.getElementById('modalOverlay').style.display = 'block'; 
            document.getElementById('newChatModal').style.display = 'flex';
            document.getElementById('newChatTarget').focus();
            if(window.innerWidth <= 768) toggleSidebar(); 
        }
        
        function closeModals() { 
            document.getElementById('modalOverlay').style.display = 'none'; 
            document.getElementById('newChatModal').style.display = 'none'; 
            document.getElementById('newChatTarget').value = '';
        }

        function startPrivateChatFromInput() {
            const target = document.getElementById('newChatTarget').value.trim();
            if(!target || target === _userEmail) return;
            closeModals();
            if(!privateContacts[target]) privateContacts[target] = { lastMsg: "...", time: new Date().toISOString() };
            renderSidebar(); switchChat('private', target);
        }

        async function loadSidebarList() {
            const { data } = await _client.from('private_chat').select('*').or(`sender.eq.${_userEmail},receiver.eq.${_userEmail}`).order('created_at', { ascending: false });
            privateContacts = {};
            if (data) data.forEach(msg => {
                const partner = msg.sender === _userEmail ? msg.receiver : msg.sender;
                if(!privateContacts[partner]) privateContacts[partner] = { lastMsg: msg.message, time: msg.created_at };
            });
            renderSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('sidebarChatList');
            list.innerHTML = '';
            
            const globalLink = document.getElementById('globalChatLink');
            globalLink.className = `chat-item ${currentChatType === 'global' ? 'active-chat' : ''}`;
            globalLink.querySelector('.avatar-circle').style.background = currentChatType === 'global' ? 'rgba(255,255,255,0.2)' : 'var(--accent-light)';
            globalLink.querySelector('.avatar-circle').style.color = currentChatType === 'global' ? 'white' : 'var(--text-main)';
            
            Object.entries(privateContacts).sort((a, b) => new Date(b[1].time) - new Date(a[1].time)).forEach(([email, data]) => {
                const item = document.createElement('div');
                const isActive = (currentChatType === 'private' && currentTargetEmail === email);
                item.className = `chat-item ${isActive ? 'active-chat' : ''}`;
                item.onclick = () => switchChat('private', email);
                
                let preview = data.lastMsg;
                if(preview.startsWith('|URLIMG|')) preview = "📷 Gambar";
                else if(preview.startsWith('|RPLY|')) preview = preview.split('|').pop();

                const avatarBg = isActive ? 'rgba(255,255,255,0.2)' : `${getColorForUser(email)}20`;
                const avatarColor = isActive ? 'white' : getColorForUser(email);

                item.innerHTML = `
                    <div class="avatar-circle" style="background:${avatarBg}; color:${avatarColor};">${email[0].toUpperCase()}</div>
                    <div class="chat-info">
                        <span class="chat-name">${email.split('@')[0]}</span>
                        <span class="chat-preview">${preview}</span>
                    </div>
                    <button class="delete-chat-btn" onclick="event.stopPropagation(); deleteFullConversation('${email}')">
                        <svg class="icon" viewBox="0 0 24 24" style="width:14px;height:14px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                `;
                list.appendChild(item);
            });
        }

        async function deleteFullConversation(targetEmail) {
            if(!confirm(`Apakah Anda yakin ingin menghapus seluruh percakapan dengan ${targetEmail}?`)) return;
            const { error } = await _client.from('private_chat').delete()
                .or(`and(sender.eq.${_userEmail},receiver.eq.${targetEmail}),and(sender.eq.${targetEmail},receiver.eq.${_userEmail})`);
            
            if(!error) {
                delete privateContacts[targetEmail];
                if(currentTargetEmail === targetEmail) switchChat('global');
                renderSidebar();
            } else {
                alert("Gagal menghapus riwayat: " + error.message);
            }
        }

        function switchChat(type, targetEmail = null) {
            currentChatType = type; currentTargetEmail = targetEmail;
            document.getElementById('chatTitle').innerText = type === 'global' ? "Ruang Publik" : targetEmail.split('@')[0];
            document.getElementById('chatStatus').innerText = type === 'global' ? "Terhubung ke jaringan publik" : targetEmail;
            cancelReply(); renderSidebar(); loadMessages();
            
            if(window.innerWidth <= 768) {
                document.getElementById('appSidebar').classList.remove('open');
                document.getElementById('sidebarOverlay').classList.remove('open');
            }
        }

        async function loadMessages() {
            const box = document.getElementById('chatMessages'); 
            box.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:20px;">Memuat pesan...</div>';
            let query = currentChatType === 'global' 
                ? _client.from('global_chat').select('*').order('created_at', { ascending: false }).limit(50)
                : _client.from('private_chat').select('*').or(`and(sender.eq.${_userEmail},receiver.eq.${currentTargetEmail}),and(sender.eq.${currentTargetEmail},receiver.eq.${_userEmail})`).order('created_at', { ascending: false }).limit(50);
            const { data } = await query;
            box.innerHTML = '';
            if (data && data.length > 0) {
                data.reverse().forEach(m => renderMessage(m));
            } else {
                box.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-top:40px;">Belum ada pesan. Jadilah yang pertama menyapa!</div>';
            }
            box.scrollTop = box.scrollHeight;
        }

        function renderMessage(m) {
            const box = document.getElementById('chatMessages');
            if(box.innerHTML.includes("Belum ada pesan") || box.innerHTML.includes("Memuat pesan")) box.innerHTML = '';

            if (document.getElementById(`msg-${currentChatType}-${m.id}`)) return;
            const isMe = m.sender === _userEmail;
            const group = document.createElement('div');
            group.id = `msg-${currentChatType}-${m.id}`;
            group.className = 'msg-group';
            let displayTxt = m.message, quoteHtml = '', rawText = m.message;

            if (displayTxt.startsWith('|URLIMG|')) {
                const url = displayTxt.replace('|URLIMG|', '');
                displayTxt = `<img src="${url}" class="msg-img" onclick="window.open('${url}', 'pufutarachat')">`;
                rawText = "[Gambar]";
            } else if (displayTxt.startsWith('|RPLY|')) {
                const parts = displayTxt.split('|');
                const senderName = parts[2] === _userEmail ? "Anda" : parts[2].split('@')[0];
                quoteHtml = `<div class="msg-quote"><strong>${senderName}</strong>: ${parts[3]}</div>`;
                displayTxt = parts.slice(4).join('|'); rawText = displayTxt;
            }
            
            const timeDate = new Date(m.created_at);
            const time = timeDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            if (isMe) {
                group.innerHTML = `
                <div class="msg-wrapper me">
                    <div class="msg-row">
                        <div class="msg-bubble" onclick="showActionMenu(event, '${m.id}', '${m.sender}', \`${rawText.replace(/`/g, '\\`')}\`, true)">${quoteHtml}${displayTxt}</div>
                    </div>
                    <div class="msg-time">${time}</div>
                </div>`;
            } else {
                const userColor = getColorForUser(m.sender);
                group.innerHTML = `
                <div class="msg-wrapper other">
                    <div class="msg-name" style="color:${userColor}">${m.sender.split('@')[0]}</div>
                    <div class="msg-row">
                        <div class="avatar-circle" style="width:36px; height:36px; background:${userColor}20; color:${userColor}; font-size:0.85rem; border-radius:12px; flex-shrink:0;">${m.sender[0].toUpperCase()}</div>
                        <div class="msg-bubble" onclick="showActionMenu(event, '${m.id}', '${m.sender}', \`${rawText.replace(/`/g, '\\`')}\`, false)">${quoteHtml}${displayTxt}</div>
                    </div>
                    <div class="msg-time">${time}</div>
                </div>`;
            }
            box.appendChild(group); box.scrollTop = box.scrollHeight;
        }

        function showActionMenu(e, id, sender, text, isMe) {
            e.stopPropagation(); selectedMsg = { id, sender, text };
            const menu = document.getElementById('actionMenu'); 
            menu.style.display = 'flex';
            
            let posX = e.pageX; let posY = e.pageY;
            if (posX + 180 > window.innerWidth) posX = window.innerWidth - 180;
            if (posY + 120 > window.innerHeight) posY = window.innerHeight - 120;

            menu.style.left = posX + 'px'; menu.style.top = posY + 'px';
            document.getElementById('btnDel').style.display = isMe ? 'block' : 'none';
        }

        function actionReply() { 
            replyingTo = selectedMsg; 
            document.getElementById('replyBar').style.display = 'flex'; 
            document.getElementById('replyTxt').innerText = selectedMsg.text; 
            document.getElementById('msgIn').focus(); 
        }

        async function actionDelete() { 
            if(!confirm("Yakin ingin menghapus pesan ini?")) return;
            const table = currentChatType === 'global' ? 'global_chat' : 'private_chat'; 
            const { error } = await _client.from(table).delete().eq('id', selectedMsg.id); 
            if (error) alert("Gagal menghapus pesan: " + error.message);
            else {
                const el = document.getElementById(`msg-${currentChatType}-${selectedMsg.id}`);
                if(el) el.remove();
            }
            document.getElementById('actionMenu').style.display = 'none';
        }

        async function sendMessage() {
            const inp = document.getElementById('msgIn'); const txt = inp.value.trim();
            if (!txt) return;
            let finalMsg = replyingTo ? `|RPLY|${replyingTo.sender}|${replyingTo.text}|${txt}` : txt;
            cancelReply(); inp.value = '';
            
            const box = document.getElementById('chatMessages');
            setTimeout(() => { box.scrollTop = box.scrollHeight; }, 100);

            const payload = { sender: _userEmail, message: finalMsg };
            if (currentChatType === 'global') await _client.from('global_chat').insert([payload]);
            else { payload.receiver = currentTargetEmail; await _client.from('private_chat').insert([payload]); }
        }

        async function handleImageUpload() {
            const file = document.getElementById('imgUpload').files[0]; if (!file) return;
            const inp = document.getElementById('msgIn');
            const originalPlaceholder = inp.placeholder;
            inp.placeholder = "Mengunggah gambar..."; inp.disabled = true;

            const path = `public/${Date.now()}_${file.name}`;
            await _client.storage.from('chat_images').upload(path, file);
            const { data } = _client.storage.from('chat_images').getPublicUrl(path);
            const payload = { sender: _userEmail, message: `|URLIMG|${data.publicUrl}` };
            
            if (currentChatType === 'global') await _client.from('global_chat').insert([payload]);
            else { payload.receiver = currentTargetEmail; await _client.from('private_chat').insert([payload]); }

            inp.placeholder = originalPlaceholder; inp.disabled = false;
            document.getElementById('imgUpload').value = '';
        }

        function cancelReply() { replyingTo = null; document.getElementById('replyBar').style.display = 'none'; }

        function listenRealtime() {
            _client.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, payload => {
                if (payload.eventType === 'INSERT') {
                    if (payload.table === 'global_chat' && currentChatType === 'global') renderMessage(payload.new);
                    if (payload.table === 'private_chat') {
                        const partner = payload.new.sender === _userEmail ? payload.new.receiver : payload.new.sender;
                        if (payload.new.sender === _userEmail || payload.new.receiver === _userEmail) {
                            privateContacts[partner] = { lastMsg: payload.new.message, time: payload.new.created_at };
                            renderSidebar();
                            if (currentChatType === 'private' && currentTargetEmail === partner) renderMessage(payload.new);
                        }
                    }
                } else if (payload.eventType === 'DELETE') {
                    const tableKey = payload.table === 'global_chat' ? 'global' : 'private';
                    const el = document.getElementById(`msg-${tableKey}-${payload.old.id}`);
                    if(el) el.remove();
                    if(payload.table === 'private_chat') loadSidebarList();
                }
            }).subscribe();
        }

        document.addEventListener('click', () => { document.getElementById('actionMenu').style.display = 'none'; });
        _client.auth.getSession().then(({data}) => { 
            if(data.session) { _userEmail = data.session.user.email; enterDashboard(); } 
        });
    </script>
</body>
</html>
