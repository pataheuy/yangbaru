<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pufutara Chat - Secure Comms</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Global Styles - Pufutara Theme */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        body { 
            background-color: #ffffff; 
            color: #000000; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        /* --- Header --- */
        header {
            padding: 20px 0;
            border-bottom: 1px solid #f0f0f0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left { display: flex; flex-direction: column; }
        
        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: -1px;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
        }

        #userSubtitle {
            font-size: 0.7rem;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-link {
            font-size: 0.8rem;
            color: #666;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav-link:hover { color: #000; }
        
        #logoutBtn { color: #ff4444; }
        #logoutBtn:hover { color: #cc0000; }

        /* --- Main Layout --- */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            background: #fafafa;
        }

        .app-wrapper {
            width: 100%;
            max-width: 800px;
            height: 80vh; /* Tinggi dikurangi 20% (menjadi 80% dari tinggi layar) */
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Screen Controller */
        .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .active { display: flex; }

        /* --- Auth Screen --- */
        .auth-screen { 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 40px;
        }

        .auth-box {
            width: 100%;
            max-width: 320px;
        }

        .auth-box h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .auth-box p.desc {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 25px;
        }

        .auth-input { 
            width: 100%; 
            padding: 14px 15px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        .auth-input:focus { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }

        .btn-black { 
            width: 100%;
            background: #000; 
            color: #fff; 
            padding: 15px;
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-black:hover { background: #333; transform: translateY(-1px); }

        /* --- Chat Area --- */
        .chat-messages { 
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: #ffffff; 
        }

        /* Custom Scrollbar for Chat */
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .msg { 
            max-width: 75%; 
            padding: 12px 16px; 
            border-radius: 16px; 
            font-size: 0.9rem; 
            line-height: 1.5; 
            cursor: pointer; 
            transition: transform 0.2s; 
            word-wrap: break-word; 
            position: relative;
        }
        
        .msg:active { transform: scale(0.98); }

        .msg-me { 
            background: #000; 
            color: #fff; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
        }

        .msg-other { 
            background: #f8f8f8; 
            color: #000; 
            border: 1px solid #eee;
            align-self: flex-start; 
            border-bottom-left-radius: 4px; 
        }

        /* Meta/Sender Info */
        .msg-sender {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: block;
        }
        .msg-me .msg-sender { color: #888; }
        .msg-other .msg-sender { color: #555; }

        /* Image Upload Styles */
        .msg img { 
            max-width: 100%; 
            max-height: 250px; 
            border-radius: 8px; 
            margin-top: 8px; 
            display: block; 
            object-fit: cover; 
            border: 1px solid rgba(255,255,255,0.2); 
            cursor: zoom-in;
        }
        .msg-other img { border-color: rgba(0,0,0,0.1); }

        /* Quote / Reply Style */
        .msg-quote { 
            background: rgba(0,0,0,0.05); 
            border-left: 3px solid #000; 
            padding: 8px 12px; 
            margin-bottom: 10px; 
            border-radius: 6px; 
            font-size: 0.8rem; 
        }
        .msg-me .msg-quote { 
            background: rgba(255,255,255,0.15); 
            border-left-color: #fff; 
        }
        .msg-quote strong { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- Input Area & Banners --- */
        .reply-banner { 
            padding: 12px 20px; 
            background: #f5f5f5; 
            font-size: 0.8rem; 
            display: none; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 1px solid #eee; 
            border-left: 4px solid #000;
        }
        
        .reply-banner span { font-weight: 700; color: #000; }

        .input-area { 
            padding: 15px 20px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #eee; 
            background: #fff; 
            align-items: center; 
        }

        .input-area input[type="text"] { 
            flex: 1; 
            padding: 14px 20px; 
            border-radius: 30px; 
            border: 1px solid #ddd; 
            outline: none; 
            font-size: 0.95rem;
            background: #fafafa;
            transition: 0.3s;
        }
        
        .input-area input[type="text"]:focus {
            background: #fff;
            border-color: #000;
        }

        .btn-icon { 
            background: none; 
            color: #000; 
            border: 1px solid #ddd; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 1.1rem; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: 0.2s; 
        }
        .btn-icon:hover { background: #f0f0f0; border-color: #ccc; }

        .btn-send { 
            background: #000; 
            color: #fff; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 1rem; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            transition: 0.2s;
        }
        .btn-send:hover { background: #333; transform: scale(1.05); }

        /* --- Action Menu (Popup) --- */
        .action-menu { 
            position: absolute; 
            background: #fff; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            display: none; 
            flex-direction: column; 
            z-index: 200; 
            border: 1px solid #eee; 
            overflow: hidden; 
            width: 140px; 
        }
        .action-menu button { 
            padding: 12px 15px; 
            border: none; 
            background: none; 
            text-align: left; 
            cursor: pointer; 
            font-size: 0.85rem;
            font-weight: 600;
            border-bottom: 1px solid #f9f9f9; 
            color: #333;
        }
        .action-menu button:hover { background: #f0f0f0; color: #000; }
        .action-menu button:last-child { border-bottom: none; }

        @media (max-width: 600px) {
            .app-wrapper { border-radius: 0; border: none; box-shadow: none; height: 100vh; }
            .main-content { padding: 0; }
            .msg { max-width: 85%; }
        }
    </style>
</head>
<body>

    <!-- Action Menu Popup -->
    <div id="actionMenu" class="action-menu">
        <button id="btnReply" onclick="actionReply()">Balas Pesan</button>
        <button id="btnDel" onclick="actionDelete()" style="color:#ff4444;">Hapus Pesan</button>
    </div>

    <header>
        <div class="container nav">
            <nav>
                <div class="header-left">
                    <a href="#" class="logo">PUFUTARACHAT</a>
                    <span id="userSubtitle" style="display:none;"></span>
                </div>
                <div class="header-right">
                    <button onclick="logout()" id="logoutBtn" class="nav-link" style="display:none;">Keluar</button>
                    <a href="../index.html" class="nav-link">← Archive</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="app-wrapper">
            
            <!-- Auth Screen -->
            <div id="authScreen" class="screen active auth-screen">
                <div class="auth-box">
                    <h1>Akses Chat</h1>
                    <p class="desc">Gunakan kredensial Labkom untuk masuk.</p>
                    <input type="email" id="emailIn" class="auth-input" placeholder="Alamat Email">
                    <input type="password" id="passIn" class="auth-input" placeholder="Kata Sandi">
                    <button class="btn-black" onclick="handleAuth()">MASUK / DAFTAR</button>
                    <p id="authErr" style="color:#ff4444; font-size:0.8rem; margin-top: 15px; font-weight: 600;"></p>
                </div>
            </div>

            <!-- Chat Screen -->
            <div id="chatScreen" class="screen">
                <div id="chatMessages" class="chat-messages">
                    <!-- Pesan akan muncul di sini -->
                </div>
                
                <div id="replyBanner" class="reply-banner">
                    <div style="flex: 1; overflow: hidden;">
                        <span>Membalas:</span> <span id="replyTxt" style="font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; max-width: 80%; vertical-align: bottom;"></span>
                    </div>
                    <div onclick="cancelReply()" style="cursor:pointer; font-weight:bold; font-size: 1.2rem; color: #888;">×</div>
                </div>

                <div class="input-area">
                    <input type="file" id="imgUpload" accept="image/*" style="display:none;" onchange="handleImageUpload()">
                    <button id="btnImg" class="btn-icon" onclick="document.getElementById('imgUpload').click()" title="Kirim Gambar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </button>
                    
                    <input type="text" id="msgIn" placeholder="Ketik pesan di sini..." onkeypress="if(event.key==='Enter')sendMessage()">
                    
                    <button class="btn-send" onclick="sendMessage()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <script>
        const _CONFIG = {
            URL: 'https://puywjdopumlzvmzbcudr.supabase.co',
            KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc'
        };

        const _client = window.supabase.createClient(_CONFIG.URL, _CONFIG.KEY);
        let _userEmail = '';
        let selectedMsg = null;
        let replyingTo = null;

        // --- AUTH ---
        async function handleAuth() {
            const email = document.getElementById('emailIn').value;
            const password = document.getElementById('passIn').value;
            const errBox = document.getElementById('authErr');
            errBox.style.color = "#000";
            errBox.innerText = "Mengautentikasi...";

            const { data, error } = await _client.auth.signInWithPassword({ email, password });
            
            if (error) {
                const { error: upErr } = await _client.auth.signUp({ email, password });
                if (upErr) {
                    errBox.style.color = "#ff4444";
                    errBox.innerText = upErr.message;
                }
                else { 
                    errBox.style.color = "#4ade80"; 
                    errBox.innerText = "Akun dibuat! Silakan klik Masuk lagi."; 
                }
            } else {
                _userEmail = data.user.email;
                enterChat();
            }
        }

        async function logout() { await _client.auth.signOut(); location.reload(); }

        function enterChat() {
            document.getElementById('authScreen').classList.remove('active');
            document.getElementById('chatScreen').classList.add('active');
            document.getElementById('logoutBtn').style.display = 'block';
            
            const namaUser = _userEmail.split('@')[0];
            const subtitleEl = document.getElementById('userSubtitle');
            subtitleEl.innerText = `ID: ${namaUser}`;
            subtitleEl.style.display = 'block';
            
            loadMessages();
            listenRealtime();
        }

        // --- CORE CHAT ---
        async function loadMessages() {
            const { data } = await _client.from('global_chat')
                .select('id, sender, message')
                .order('id', { ascending: false })
                .limit(50);
            
            if (data) {
                document.getElementById('chatMessages').innerHTML = '';
                data.reverse().forEach(m => renderMessage(m));
            }
        }

        async function sendMessage() {
            const inp = document.getElementById('msgIn');
            const txt = inp.value.trim();
            if (!txt) return;
            inp.value = '';

            let finalMessage = txt;
            if (replyingTo) {
                finalMessage = `|RPLY|${replyingTo.sender}|${replyingTo.text}|${txt}`;
                cancelReply(); 
            }

            await _client.from('global_chat').insert([{ sender: _userEmail, message: finalMessage }]);
        }

        // --- UPLOAD GAMBAR VIA STORAGE ---
        async function handleImageUpload() {
            const fileInput = document.getElementById('imgUpload');
            const file = fileInput.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                alert("Ukuran gambar maksimal 5MB.");
                fileInput.value = '';
                return;
            }

            const btnImg = document.getElementById('btnImg');
            btnImg.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>`;
            btnImg.disabled = true;

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                const filePath = `public/${fileName}`;

                const { error: uploadError } = await _client.storage
                    .from('chat_images')
                    .upload(filePath, file);

                if (uploadError) throw uploadError;

                const { data: publicUrlData } = _client.storage
                    .from('chat_images')
                    .getPublicUrl(filePath);

                const imgUrl = publicUrlData.publicUrl;
                const payload = `|URLIMG|${imgUrl}`;
                await _client.from('global_chat').insert([{ sender: _userEmail, message: payload }]);

            } catch (err) {
                console.error("Error upload:", err);
                alert("Gagal kirim gambar.");
            } finally {
                btnImg.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>`;
                btnImg.disabled = false;
                fileInput.value = ''; 
            }
        }

        function renderMessage(m) {
            if (document.getElementById(`msg-${m.id}`)) return;

            const box = document.getElementById('chatMessages');
            const isMe = m.sender === _userEmail;
            const div = document.createElement('div');
            
            div.id = `msg-${m.id}`;
            div.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;

            let displayTxt = m.message;
            let quoteHtml = '';
            let rawTextForReply = m.message; 

            if (displayTxt.startsWith('|URLIMG|')) {
                const imgUrl = displayTxt.replace('|URLIMG|', '');
                displayTxt = `<img src="${imgUrl}" alt="Attachment" onclick="window.open('${imgUrl}', '_blank')">`;
                rawTextForReply = "[Gambar]"; 
            }
            else if (displayTxt.startsWith('|RPLY|')) {
                const parts = displayTxt.split('|');
                if (parts.length >= 4) {
                    const rSender = parts[2].split('@')[0];
                    const rText = parts[3];
                    quoteHtml = `<div class="msg-quote"><strong>${rSender}</strong><br>${rText}</div>`;
                    displayTxt = parts.slice(4).join('|'); 
                    rawTextForReply = displayTxt;
                }
            }

            const senderName = m.sender.split('@')[0];
            div.innerHTML = `${quoteHtml}<span class="msg-sender">${senderName}</span>${displayTxt}`;
            
            div.onclick = (e) => {
                e.stopPropagation();
                selectedMsg = { id: m.id, sender: m.sender, text: rawTextForReply, isMe };
                
                const menu = document.getElementById('actionMenu');
                menu.style.display = 'flex';
                
                // Kalkulasi posisi menu agar tidak keluar layar
                let menuLeft = e.pageX;
                let menuTop = e.pageY;
                if (menuLeft + 140 > window.innerWidth) menuLeft = window.innerWidth - 150;
                if (menuTop + 100 > window.innerHeight) menuTop = window.innerHeight - 110;
                
                menu.style.left = menuLeft + 'px';
                menu.style.top = menuTop + 'px';
                
                document.getElementById('btnDel').style.display = isMe ? 'block' : 'none';
            };

            box.appendChild(div);
            box.scrollTop = box.scrollHeight; 
        }

        function actionReply() {
            replyingTo = selectedMsg;
            document.getElementById('replyBanner').style.display = 'flex';
            document.getElementById('replyTxt').innerText = `${selectedMsg.text}`;
            document.getElementById('msgIn').focus();
        }

        function cancelReply() { replyingTo = null; document.getElementById('replyBanner').style.display = 'none'; }

        async function actionDelete() {
            if(confirm("Hapus pesan ini secara permanen?")) {
                await _client.from('global_chat').delete().eq('id', selectedMsg.id);
                document.getElementById(`msg-${selectedMsg.id}`).remove(); 
            }
        }

        document.addEventListener('click', () => { document.getElementById('actionMenu').style.display = 'none'; });

        function listenRealtime() {
            _client.channel('public_chat')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'global_chat' }, payload => {
                    if (payload.eventType === 'INSERT') renderMessage(payload.new);
                    else if (payload.eventType === 'DELETE') {
                        const el = document.getElementById(`msg-${payload.old.id}`);
                        if(el) el.remove();
                    }
                }).subscribe();
        }

        // Tambahan keyframes untuk icon loading di CSS via JS agar rapi
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);

        // Auto Login Check
        _client.auth.getSession().then(({data}) => {
            if(data.session) { _userEmail = data.session.user.email; enterChat(); }
        });
    </script>
</body>
</html>
