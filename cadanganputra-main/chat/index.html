<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pufutara Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Global Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Perubahan 1: Mengizinkan body untuk scroll saat di-zoom agar tidak memotong konten */
        body { 
            background-color: #ffffff; 
            color: #000000; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-y: auto; 
        }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; width: 100%; }

        /* --- Header --- */
        header { padding: 15px 0; border-bottom: 1px solid #f0f0f0; background: rgba(255, 255, 255, 0.95); z-index: 100; flex-shrink: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; flex-direction: column; }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: -1px; text-transform: uppercase; text-decoration: none; color: #000; }
        #userSubtitle { font-size: 0.7rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .nav-link { font-size: 0.8rem; color: #666; text-decoration: none; font-weight: 600; cursor: pointer; background: none; border: none; }
        .nav-link:hover { color: #000; }
        #logoutBtn { color: #ff4444; }

        /* --- Main Layout --- */
        /* Perubahan 2: Memberikan padding agar tampilan tidak menempel ke pinggir saat zoom */
        .main-content { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 20px; 
            background: #fafafa; 
        }
        
        /* Perubahan 3: Menggunakan tinggi tetap (px) agar proporsi tetap sama meskipun di-zoom */
        .app-wrapper {
            width: 100%;
            max-width: 1000px;
            height: 750px; /* Tinggi tetap untuk desktop */
            background: #fff;
            border: 1px solid #eee;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Screen Controller */
        .screen { display: none; width: 100%; height: 100%; }
        .screen.active { display: flex; }

        /* --- Auth Screen --- */
        .auth-screen { justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 40px; }
        .auth-box { width: 100%; max-width: 320px; }
        .auth-box h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .auth-box p.desc { font-size: 0.85rem; color: #666; margin-bottom: 25px; }
        .auth-input { width: 100%; padding: 14px 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 0.9rem; outline: none; }
        .auth-input:focus { border-color: #000; }
        .btn-black { width: 100%; background: #000; color: #fff; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: 0.3s; }
        .btn-black:hover { background: #333; }

        /* --- Dashboard Layout (Sidebar + Chat) --- */
        .dashboard { flex-direction: row; width: 100%; }
        
        .sidebar {
            width: 320px;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            background: #fff;
            z-index: 10;
        }

        .sidebar-header { padding: 20px; border-bottom: 1px solid #eee; background: #fafafa; }
        .btn-new-chat { width: 100%; padding: 10px; background: #f0f0f0; border: 1px dashed #ccc; border-radius: 8px; font-weight: 600; cursor: pointer; color: #333; transition: 0.2s; }
        .btn-new-chat:hover { background: #e0e0e0; border-color: #888; color: #000; }

        .new-chat-box { display: none; margin-top: 10px; flex-direction: column; gap: 8px; }
        .new-chat-box input { padding: 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 0.85rem; outline: none; }
        .new-chat-box button { padding: 10px; background: #000; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; transition: background 0.2s; display: flex; flex-direction: column; }
        .chat-item:hover { background: #fafafa; }
        .chat-item.active-chat { background: #f0f0f0; border-left: 4px solid #000; padding-left: 16px; }
        .chat-item-name { font-weight: 700; font-size: 0.9rem; color: #000; margin-bottom: 4px; }
        .chat-item-msg { font-size: 0.8rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chat-main { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        .chat-header { padding: 15px 20px; border-bottom: 1px solid #eee; background: #fff; display: flex; align-items: center; gap: 15px; }
        .btn-back-mobile { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #000; padding-right: 10px; }
        .chat-title-info { display: flex; flex-direction: column; }
        .chat-title-name { font-weight: 800; font-size: 1.1rem; }
        .chat-title-status { font-size: 0.75rem; color: #4ade80; font-weight: 600; }

        .private-notice { display: none; background-color: #f5f5f5; color: #666; text-align: center; padding: 10px 15px; font-size: 0.75rem; border-bottom: 1px solid #e0e0e0; line-height: 1.4; }
        .chat-messages { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Pesan Styling */
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; line-height: 1.5; cursor: pointer; position: relative; word-wrap: break-word; }
        .msg-me { background: #000; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-other { background: #f8f8f8; color: #000; border: 1px solid #eee; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-sender { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; display: block; }
        .msg img { max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 8px; display: block; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); cursor: zoom-in; }

        .reply-banner { padding: 12px 20px; background: #f5f5f5; font-size: 0.8rem; display: none; justify-content: space-between; align-items: center; border-top: 1px solid #eee; border-left: 4px solid #000; }
        .input-area { padding: 15px 20px; display: flex; gap: 10px; border-top: 1px solid #eee; background: #fff; align-items: center; }
        .input-area input[type="text"] { flex: 1; padding: 14px 20px; border-radius: 30px; border: 1px solid #ddd; outline: none; font-size: 0.95rem; background: #fafafa; }
        .btn-icon, .btn-send { background: none; border: 1px solid #ddd; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; color: #000;}
        .btn-send { background: #000; color: #fff; border: none; }

        .action-menu { position: absolute; background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: none; flex-direction: column; z-index: 200; border: 1px solid #eee; width: 140px; overflow: hidden;}
        .action-menu button { padding: 12px 15px; border: none; background: none; text-align: left; cursor: pointer; font-size: 0.85rem; font-weight: 600; border-bottom: 1px solid #f9f9f9; color: #333;}
        .action-menu button:hover { background: #f0f0f0; }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 768px) {
            /* Perubahan 4: Menyesuaikan body mobile agar tidak ada scrollbar ganda */
            body { overflow: hidden; height: 100dvh; }
            
            .app-wrapper { 
                height: 100dvh; /* Selalu penuh satu layar di mobile */
                border-radius: 0; 
                border: none; 
                box-shadow: none; 
            }
            .main-content { padding: 0; height: 100%; }
            .sidebar { width: 100%; border-right: none; }
            .chat-main { display: none; width: 100%; position: absolute; top: 0; left: 0; height: 100%; z-index: 20; }
            .mobile-chat-active .sidebar { display: none; }
            .mobile-chat-active .chat-main { display: flex; }
            .btn-back-mobile { display: block; }
            .msg { max-width: 85%; }
        }
    </style>
</head>
<body>

    <div id="actionMenu" class="action-menu">
        <button id="btnReply" onclick="actionReply()">Balas Pesan</button>
        <button id="btnDel" onclick="actionDelete()" style="color:#ff4444;">Hapus Pesan</button>
    </div>

    <header>
        <div class="container nav">
            <nav>
                <div class="header-left">
                    <a href="#" class="logo">PUFUTARACHAT</a>
                    <span id="userSubtitle" style="display:none;"></span>
                </div>
                <div class="header-right">
                    <button onclick="logout()" id="logoutBtn" class="nav-link" style="display:none;">Keluar</button>
                    <a href="../index.html" class="nav-link">← Archive</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="app-wrapper" id="appWrapper">
            <div id="authScreen" class="screen active auth-screen">
                <div class="auth-box">
                    <h1>Akses Chat</h1>
                    <p class="desc">Gunakan akun pufutara untuk masuk!.</p>
                    <input type="email" id="emailIn" class="auth-input" placeholder="Alamat Email">
                    <input type="password" id="passIn" class="auth-input" placeholder="Kata Sandi">
                    <button class="btn-black" onclick="handleAuth()">MASUK / DAFTAR</button>
                    <p id="authErr" style="color:#ff4444; font-size:0.8rem; margin-top: 15px; font-weight: 600;"></p>
                </div>
            </div>

            <div id="dashboardScreen" class="screen dashboard">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <button class="btn-new-chat" onclick="toggleNewChat()">+ Obrolan Baru</button>
                        <div class="new-chat-box" id="newChatBox">
                            <input type="email" id="newChatTarget" placeholder="Email tujuan...">
                            <button onclick="startPrivateChatFromInput()">Mulai Obrolan</button>
                        </div>
                    </div>
                    <div class="chat-list" id="sidebarChatList"></div>
                </div>

                <div class="chat-main">
                    <div class="chat-header">
                        <button class="btn-back-mobile" onclick="closeChatMobile()">←</button>
                        <div class="chat-title-info">
                            <span class="chat-title-name" id="chatTitle">Global Chat</span>
                            <span class="chat-title-status" id="chatStatus">Publik</span>
                        </div>
                    </div>
                    <div id="privateNotice" class="private-notice">
                        ⚠️ Fitur Private Chat masih dalam tahap pengembangan. <strong>Refresh</strong> jika balasan belum muncul.
                    </div>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div id="replyBanner" class="reply-banner">
                        <div style="flex: 1; overflow: hidden;">
                            <span>Membalas:</span> <span id="replyTxt" style="font-weight: normal;"></span>
                        </div>
                        <div onclick="cancelReply()" style="cursor:pointer; font-weight:bold;">×</div>
                    </div>
                    <div class="input-area">
                        <input type="file" id="imgUpload" accept="image/*" style="display:none;" onchange="handleImageUpload()">
                        <button id="btnImg" class="btn-icon" onclick="document.getElementById('imgUpload').click()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </button>
                        <input type="text" id="msgIn" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter')sendMessage()">
                        <button class="btn-send" onclick="sendMessage()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Konfigurasi dan Logika Tetap Sama ---
        const _CONFIG = {
            URL: 'https://puywjdopumlzvmzbcudr.supabase.co',
            KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc'
        };
        const _client = window.supabase.createClient(_CONFIG.URL, _CONFIG.KEY);
        let _userEmail = '';
        let currentChatType = 'global'; 
        let currentTargetEmail = null;  
        let privateContacts = {}; 
        let selectedMsg = null;
        let replyingTo = null;
        const userColors = ['#e11d48', '#2563eb', '#16a34a', '#9333ea', '#ea580c', '#0d9488', '#c026d3', '#4f46e5', '#b45309', '#059669'];

        function getColorForUser(email) {
            let hash = 0;
            for (let i = 0; i < email.length; i++) hash = email.charCodeAt(i) + ((hash << 5) - hash);
            return userColors[Math.abs(hash) % userColors.length];
        }

        async function handleAuth() {
            const email = document.getElementById('emailIn').value;
            const password = document.getElementById('passIn').value;
            const errBox = document.getElementById('authErr');
            errBox.innerText = "Mengautentikasi...";
            const { data, error } = await _client.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: upErr } = await _client.auth.signUp({ email, password });
                if (upErr) errBox.innerText = upErr.message;
                else errBox.innerText = "Akun dibuat! Klik Masuk lagi.";
            } else { _userEmail = data.user.email; enterDashboard(); }
        }

        async function logout() { await _client.auth.signOut(); location.reload(); }

        function enterDashboard() {
            document.getElementById('authScreen').classList.remove('active');
            document.getElementById('dashboardScreen').classList.add('active');
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('userSubtitle').innerText = `Halo, ${_userEmail.split('@')[0]}`;
            document.getElementById('userSubtitle').style.display = 'block';
            loadSidebarList();
            switchChat('global'); 
            listenRealtime();
        }

        function toggleNewChat() { const box = document.getElementById('newChatBox'); box.style.display = box.style.display === 'flex' ? 'none' : 'flex'; }

        function startPrivateChatFromInput() {
            const target = document.getElementById('newChatTarget').value.trim();
            if(!target || target === _userEmail) return alert('Email tidak valid');
            toggleNewChat();
            if(!privateContacts[target]) privateContacts[target] = { lastMsg: "...", time: new Date().toISOString() };
            switchChat('private', target);
        }

        async function loadSidebarList() {
            const { data } = await _client.from('private_chat').select('*').or(`sender.eq.${_userEmail},receiver.eq.${_userEmail}`).order('created_at', { ascending: false });
            privateContacts = {};
            if (data) data.forEach(msg => {
                const contactEmail = msg.sender === _userEmail ? msg.receiver : msg.sender;
                if(!privateContacts[contactEmail]) privateContacts[contactEmail] = { lastMsg: msg.message, time: msg.created_at };
            });
            renderSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('sidebarChatList');
            list.innerHTML = `<div class="chat-item ${currentChatType === 'global' ? 'active-chat' : ''}" onclick="switchChat('global')"><div class="chat-item-name">🌍 Global Chat</div><div class="chat-item-msg">Obrolan publik</div></div>`;
            Object.entries(privateContacts).forEach(([email, data]) => {
                const isActive = (currentChatType === 'private' && currentTargetEmail === email);
                list.innerHTML += `<div class="chat-item ${isActive ? 'active-chat' : ''}" onclick="switchChat('private', '${email}')"><div class="chat-item-name">👤 ${email.split('@')[0]}</div><div class="chat-item-msg">${data.lastMsg}</div></div>`;
            });
        }

        function switchChat(type, targetEmail = null) {
            currentChatType = type; currentTargetEmail = targetEmail;
            document.getElementById('chatTitle').innerText = type === 'global' ? "Global Chat" : targetEmail.split('@')[0];
            document.getElementById('privateNotice').style.display = type === 'global' ? "none" : "block";
            document.getElementById('appWrapper').classList.add('mobile-chat-active');
            renderSidebar(); loadMessages();
        }

        function closeChatMobile() { document.getElementById('appWrapper').classList.remove('mobile-chat-active'); }

        async function loadMessages() {
            const box = document.getElementById('chatMessages');
            box.innerHTML = '';
            let query = currentChatType === 'global' ? _client.from('global_chat').select('*') : _client.from('private_chat').select('*').or(`and(sender.eq.${_userEmail},receiver.eq.${currentTargetEmail}),and(sender.eq.${currentTargetEmail},receiver.eq.${_userEmail})`);
            const { data } = await query.order('created_at', { ascending: false }).limit(50);
            if (data) data.reverse().forEach(renderMessage);
        }

        async function sendMessage() {
            const inp = document.getElementById('msgIn');
            const txt = inp.value.trim();
            if (!txt) return; inp.value = '';
            let finalMsg = replyingTo ? `|RPLY|${replyingTo.sender}|${replyingTo.text}|${txt}` : txt;
            cancelReply();
            const payload = { sender: _userEmail, message: finalMsg };
            if (currentChatType === 'global') await _client.from('global_chat').insert([payload]);
            else { payload.receiver = currentTargetEmail; await _client.from('private_chat').insert([payload]); }
        }

        async function handleImageUpload() {
            const file = document.getElementById('imgUpload').files[0];
            if (!file) return;
            const fileName = `${Date.now()}.${file.name.split('.').pop()}`;
            await _client.storage.from('chat_images').upload(`public/${fileName}`, file);
            const { data } = _client.storage.from('chat_images').getPublicUrl(`public/${fileName}`);
            const payload = { sender: _userEmail, message: `|URLIMG|${data.publicUrl}` };
            if (currentChatType === 'global') await _client.from('global_chat').insert([payload]);
            else { payload.receiver = currentTargetEmail; await _client.from('private_chat').insert([payload]); }
        }

        function renderMessage(m) {
            const box = document.getElementById('chatMessages');
            if (document.getElementById(`msg-${m.id}`)) return;
            const isMe = m.sender === _userEmail;
            const div = document.createElement('div');
            div.id = `msg-${m.id}`;
            div.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;
            let content = m.message;
            if (content.startsWith('|URLIMG|')) content = `<img src="${content.replace('|URLIMG|', '')}">`;
            else if (content.startsWith('|RPLY|')) {
                const p = content.split('|');
                content = `<div style="font-size:0.7rem; opacity:0.7; border-left:2px solid; padding-left:5px; margin-bottom:5px;">${p[2].split('@')[0]}: ${p[3]}</div>${p.slice(4).join('|')}`;
            }
            const nameHtml = (!isMe && currentChatType === 'global') ? `<span class="msg-sender" style="color:${getColorForUser(m.sender)}">${m.sender.split('@')[0]}</span>` : '';
            div.innerHTML = nameHtml + content;
            div.onclick = (e) => {
                e.stopPropagation();
                selectedMsg = { id: m.id, sender: m.sender, text: m.message, isMe };
                const menu = document.getElementById('actionMenu');
                menu.style.display = 'flex';
                menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                document.getElementById('btnDel').style.display = isMe ? 'block' : 'none';
            };
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function actionReply() { replyingTo = selectedMsg; document.getElementById('replyBanner').style.display = 'flex'; document.getElementById('replyTxt').innerText = selectedMsg.text; }
        function cancelReply() { replyingTo = null; document.getElementById('replyBanner').style.display = 'none'; }
        async function actionDelete() { if(confirm("Hapus?")) { await _client.from(currentChatType === 'global' ? 'global_chat' : 'private_chat').delete().eq('id', selectedMsg.id); document.getElementById(`msg-${selectedMsg.id}`).remove(); } }
        document.addEventListener('click', () => document.getElementById('actionMenu').style.display = 'none');

        function listenRealtime() {
            _client.channel('chat').on('postgres_changes', { event: '*', schema: 'public' }, payload => {
                if (payload.eventType === 'INSERT') {
                    const m = payload.new;
                    if (currentChatType === 'global' || m.receiver === _userEmail || m.sender === _userEmail) renderMessage(m);
                }
            }).subscribe();
        }

        _client.auth.getSession().then(({data}) => { if(data.session) { _userEmail = data.session.user.email; enterDashboard(); } });
    </script>
</body>
</html>
