<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pufutara Cloud</title>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: #fafafa; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            color: #111;
        }

        /* --- AUTH SCREEN --- */
        .auth-screen { 
            background: #fff;
            width: 100%; 
            max-width: 420px; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            border: 1px solid #eaeaea;
            display: flex; 
            flex-direction: column; 
            text-align: center;
        }
        .auth-screen h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .auth-screen p.subtitle { color: #666; font-size: 0.95rem; margin-bottom: 24px; }
        
        .auth-screen input { 
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 12px; 
            border: 1px solid #eaeaea; 
            border-radius: 10px; 
            font-size: 0.95rem; 
            outline: none; 
            transition: 0.2s; 
            background: #fafafa;
        }
        .auth-screen input:focus { border-color: #111; background: #fff; }
        
        .btn-black { 
            background: #111; 
            color: #fff; 
            border: none; 
            padding: 14px; 
            border-radius: 10px; 
            font-size: 0.95rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.2s; 
            width: 100%; 
            margin-top: 8px;
        }
        .btn-black:hover { background: #333; }

        /* --- DRIVE SCREEN --- */
        #driveScreen { 
            width: 100vw; 
            height: 100vh; 
            display: none; /* Sembunyikan default */
            flex-direction: column; 
            background: #fafafa; 
        }

        /* Header Pufutara Chat Style */
        .header { 
            background: #111; 
            color: #fff; 
            padding: 0 24px; 
            height: 64px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-shrink: 0; 
        }
        .header h2 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.3px; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        
        #userSubtitle { color: #aaa; font-size: 0.85rem; font-weight: 500; }
        #logoutBtn { 
            color: #fff; 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 0.85rem; 
            font-weight: 500; 
            opacity: 0.8; 
            transition: 0.2s; 
            padding: 6px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }
        #logoutBtn:hover { opacity: 1; background: rgba(255,255,255,0.2); }

        /* Toolbar / Actions */
        .drive-toolbar { 
            padding: 20px 32px; 
            background: #fff; 
            border-bottom: 1px solid #eaeaea; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            gap: 15px;
        }
        .drive-title { font-size: 1.15rem; font-weight: 600; color: #111; }
        
        .toolbar-actions { display: flex; gap: 12px; align-items: center; }
        
        /* Search Box */
        .search-box {
            display: flex;
            align-items: center;
            background: #fafafa;
            border: 1px solid #eaeaea;
            border-radius: 8px;
            padding: 8px 14px;
            gap: 8px;
            transition: 0.2s;
        }
        .search-box:focus-within { border-color: #111; background: #fff; }
        .search-box input {
            border: none;
            background: none;
            outline: none;
            font-size: 0.9rem;
            width: 200px;
        }
        .search-box input::placeholder { color: #aaa; }

        .btn-upload { 
            background: #111; 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 500; 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            font-size: 0.9rem; 
            transition: 0.2s; 
        }
        .btn-upload:hover { background: #333; transform: translateY(-1px); }
        .btn-upload svg { width: 18px; height: 18px; }

        /* File Grid & Cards */
        .file-grid { 
            flex: 1; 
            padding: 32px; 
            overflow-y: auto; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 24px; 
            align-content: start; 
        }
        
        .file-card { 
            background: #fff; 
            border: 1px solid #eaeaea; 
            border-radius: 12px; 
            padding: 16px; 
            transition: 0.2s; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .file-card:hover { 
            border-color: #d1d1d1; 
            box-shadow: 0 6px 16px rgba(0,0,0,0.06); 
            transform: translateY(-2px); 
        }
        
        .file-click-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer;
            width: 100%;
        }

        .file-preview { 
            width: 100%; 
            height: 120px; 
            object-fit: cover; 
            border-radius: 8px; 
            border: 1px solid #f0f0f0;
        }
        .file-icon { 
            height: 120px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            background: #fafafa; 
            border-radius: 8px; 
            border: 1px solid #f0f0f0;
        }
        
        .file-info { width: 100%; text-align: left; }
        .file-name { font-size: 0.9rem; color: #111; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
        .file-size { font-size: 0.8rem; color: #888; margin-top: 2px; }

        /* Action Buttons on Card */
        .card-actions { 
            display: flex; 
            gap: 6px; 
            width: 100%; 
            margin-top: auto; 
            border-top: 1px solid #eaeaea; 
            padding-top: 12px; 
        }
        .action-btn { 
            background: #fafafa; 
            border: 1px solid #eaeaea;
            padding: 8px; 
            border-radius: 6px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1; 
            transition: 0.2s; 
            color: #555; 
        }
        .action-btn:hover { background: #f0f0f0; color: #111; }
        .action-btn.del:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
        
        .empty-state { grid-column: 1 / -1; text-align: center; color: #666; padding-top: 80px; font-size: 1rem; }

        /* --- RESPONSIVE MOBILE --- */
        @media (max-width: 600px) {
            .drive-toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-actions { flex-direction: column; }
            .search-box input { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="auth-screen">
        <h1>Pufutara Cloud</h1>
        <p class="subtitle">Gunakan akun Pufutara Chat kamu</p>
        
        <input type="email" id="emailIn" placeholder="Email">
        <input type="password" id="passIn" placeholder="Password">
        <button class="btn-black" onclick="handleAuth()">Masuk</button>
        
        <p id="authErr" style="color:#dc2626; font-size:0.85rem; margin-top: 16px; display:none;"></p>
    </div>

    <!-- DRIVE SCREEN -->
    <div id="driveScreen">
        <!-- Header -->
        <div class="header">
            <h2>Pufutara Cloud</h2>
            <div class="header-right">
                <span id="userSubtitle"></span>
                <button onclick="logout()" id="logoutBtn">Logout</button>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="drive-toolbar">
            <div class="drive-title">Ruang File Pribadi</div>
            <div class="toolbar-actions">
                <!-- Search Box -->
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Cari nama file..." onkeyup="searchFiles()">
                </div>

                <!-- Upload -->
                <input type="file" id="fileUpload" style="display:none;" onchange="uploadFile()">
                <button class="btn-upload" id="btnUpload" onclick="document.getElementById('fileUpload').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Upload File
                </button>
            </div>
        </div>
        
        <!-- File Grid -->
        <div id="fileGrid" class="file-grid">
            <!-- Files akan di-render di sini -->
        </div>
    </div>

    <script>
        // Konfigurasi Supabase
        const _CONFIG = {
            URL: 'https://puywjdopumlzvmzbcudr.supabase.co',
            KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc'
        };

        const _client = window.supabase.createClient(_CONFIG.URL, _CONFIG.KEY);
        const BUCKET_NAME = 'pufutara_files';
        
        let _userEmail = '';
        let _userFolder = '';
        let _allFiles = []; // Menyimpan semua daftar file untuk proses Search

        // --- Ikon SVG Premium ---
        const icons = {
            rename: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
            download: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`,
            trash: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
            document: `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>`
        };

        // --- AUTH ---
        async function handleAuth() {
            const email = document.getElementById('emailIn').value;
            const password = document.getElementById('passIn').value;
            const errBox = document.getElementById('authErr');
            
            errBox.style.display = 'block';
            errBox.style.color = '#555';
            errBox.innerText = "Membuka brankas...";

            const { data, error } = await _client.auth.signInWithPassword({ email, password });
            if (error) {
                errBox.style.color = '#dc2626';
                errBox.innerText = error.message;
            } else { 
                _userEmail = data.user.email; 
                enterDrive(); 
            }
        }

        async function logout() { await _client.auth.signOut(); location.reload(); }

        function enterDrive() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('driveScreen').style.display = 'flex';
            
            _userFolder = _userEmail.split('@')[0]; 
            document.getElementById('userSubtitle').innerText = _userEmail;
            
            loadFiles();
        }

        // --- LOAD FILES ---
        async function loadFiles() {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = '<div class="empty-state">Memuat file...</div>';

            const { data, error } = await _client.storage.from(BUCKET_NAME).list(_userFolder + '/');

            if (error) {
                grid.innerHTML = `<div class="empty-state" style="color:red;">Gagal memuat: ${error.message}</div>`;
                return;
            }

            _allFiles = data.filter(f => f.name !== '.emptyFolderPlaceholder');
            
            // Reset search bar ketika file dimuat ulang
            document.getElementById('searchInput').value = '';
            
            renderFileList(_allFiles);
        }

        // --- RENDER LIST ---
        function renderFileList(filesArray) {
            const grid = document.getElementById('fileGrid');
            
            if (filesArray.length === 0) {
                if (_allFiles.length === 0) {
                    grid.innerHTML = '<div class="empty-state">Drive masih kosong.<br><br>Klik <b>Upload File</b> di kanan atas.</div>';
                } else {
                    grid.innerHTML = '<div class="empty-state">File yang kamu cari tidak ditemukan.</div>';
                }
                return;
            }

            grid.innerHTML = ''; 
            filesArray.forEach(file => renderFileCard(file));
        }

        // --- SEARCH FILES ---
        function searchFiles() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filteredFiles = _allFiles.filter(f => f.name.toLowerCase().includes(term));
            renderFileList(filteredFiles);
        }

        function renderFileCard(file) {
            const grid = document.getElementById('fileGrid');
            const card = document.createElement('div');
            card.className = 'file-card';

            const filePath = `${_userFolder}/${file.name}`;
            const { data: publicUrlData } = _client.storage.from(BUCKET_NAME).getPublicUrl(filePath);
            const fileUrl = publicUrlData.publicUrl;

            const isImage = file.metadata.mimetype && file.metadata.mimetype.startsWith('image/');
            let visualHtml = '';

            if (isImage) {
                visualHtml = `<img src="${fileUrl}" class="file-preview" alt="preview">`;
            } else {
                visualHtml = `<div class="file-icon">${icons.document}</div>`;
            }

            const sizeKB = file.metadata.size / 1024;
            const sizeText = sizeKB > 1024 ? (sizeKB / 1024).toFixed(2) + ' MB' : sizeKB.toFixed(0) + ' KB';

            card.innerHTML = `
                <div class="file-click-area" onclick="window.open('${fileUrl}', '_blank')">
                    ${visualHtml}
                    <div class="file-info">
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <div class="file-size">${sizeText}</div>
                    </div>
                </div>
                <div class="card-actions">
                    <button class="action-btn" onclick="renameFile('${file.name}', event)" title="Ubah Nama">${icons.rename}</button>
                    <button class="action-btn" onclick="actionDownload('${file.name}', event)" title="Download">${icons.download}</button>
                    <button class="action-btn del" onclick="deleteFile('${file.name}', event)" title="Hapus">${icons.trash}</button>
                </div>
            `;

            grid.appendChild(card);
        }

        // --- UPLOAD FILE ---
        async function uploadFile() {
            const input = document.getElementById('fileUpload');
            const file = input.files[0];
            if (!file) return;

            if (file.size > 15 * 1024 * 1024) {
                alert("Maksimal ukuran file 15MB ya Bang!");
                input.value = ''; return;
            }

            const btn = document.getElementById('btnUpload');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Mengunggah...';
            btn.disabled = true;

            try {
                const originalName = file.name.replace(/\s+/g, '_');
                const filePath = `${_userFolder}/${originalName}`;

                const { error } = await _client.storage.from(BUCKET_NAME).upload(filePath, file, { upsert: true });
                if (error) throw error;
                
                loadFiles();
            } catch (err) {
                alert("Gagal upload: " + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                input.value = '';
            }
        }

        // --- RENAME FILE ---
        async function renameFile(oldName, event) {
            event.stopPropagation();
            const ext = oldName.split('.').pop();
            const newName = prompt(`Masukkan nama baru (jangan lupa ekstensinya .${ext}):`, oldName);
            
            if (!newName || newName === oldName) return;

            const oldPath = `${_userFolder}/${oldName}`;
            const newPath = `${_userFolder}/${newName.replace(/\s+/g, '_')}`;

            const { error } = await _client.storage.from(BUCKET_NAME).move(oldPath, newPath);
            
            if (error) alert("Gagal ubah nama: " + error.message);
            else loadFiles();
        }

        // --- DOWNLOAD FILE ---
        async function actionDownload(fileName, event) {
            event.stopPropagation();
            
            const btn = event.currentTarget;
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '⏳'; // Loading indicator
            
            try {
                const filePath = `${_userFolder}/${fileName}`;
                // Mengambil file sebagai blob secara langsung dari supabase
                const { data, error } = await _client.storage.from(BUCKET_NAME).download(filePath);
                
                if (error) throw error;
                
                // Trigger download
                const blobUrl = URL.createObjectURL(data);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName; // Memaksa browser mengunduh dengan nama asli
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);

            } catch(err) {
                alert("Gagal mengunduh file: " + err.message);
            } finally {
                btn.innerHTML = originalIcon;
            }
        }

        // --- DELETE FILE ---
        async function deleteFile(fileName, event) {
            event.stopPropagation(); 
            if(confirm(`Yakin mau menghapus permanen file "${fileName}"?`)) {
                const filePath = `${_userFolder}/${fileName}`;
                const { error } = await _client.storage.from(BUCKET_NAME).remove([filePath]);
                if (error) alert("Gagal menghapus: " + error.message);
                else loadFiles(); 
            }
        }

        // Auto Login Session Check
        _client.auth.getSession().then(({data}) => {
            if(data.session) { 
                _userEmail = data.session.user.email; 
                enterDrive(); 
            } else {
                document.getElementById('authScreen').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
