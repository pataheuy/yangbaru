<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Prestasi Literasi - Supabase Cloud</title>
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kls: { brown: '#5D4037', darkBrown: '#3E2723', yellow: '#FBC02D' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #f9fafb; font-family: 'Inter', sans-serif; }
        .header-gradient { background: linear-gradient(135deg, #3E2723 0%, #5D4037 100%); }
        .animate-fade { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased text-gray-900">

    <!-- Navbar -->
    <nav class="header-gradient text-white py-4 px-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-kls-yellow rounded-full flex items-center justify-center text-kls-darkBrown shadow-inner">
                    <i class="fas fa-database text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">Database Prestasi</h1>
                    <p class="text-[10px] text-kls-yellow uppercase tracking-widest font-semibold">Cloud Sync Aktif</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-4">
                <button id="btnTambah" onclick="openModal()" class="hidden bg-kls-yellow text-kls-darkBrown px-4 py-2 rounded-lg font-bold text-sm shadow-md hover:scale-105 transition-transform flex items-center">
                    <i class="fas fa-plus mr-2"></i> Tambah Data
                </button>
                <button onclick="handleAdminAuth()" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center hover:bg-white/20 transition-all border border-white/20">
                    <i class="fas fa-user-shield"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-7xl mx-auto p-6 md:p-8">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border-l-4 border-kls-yellow shadow-sm">
                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">Total Capaian</p>
                <h3 id="statTotal" class="text-3xl font-bold text-kls-darkBrown">0</h3>
            </div>
            <div id="loadingIndicator" class="md:col-span-2 flex items-center text-kls-brown italic animate-pulse">
                <i class="fas fa-circle-notch fa-spin mr-2"></i> Sinkronisasi dengan Supabase...
            </div>
        </div>

        <!-- Tabel -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="font-bold text-gray-800 flex items-center">
                    <i class="fas fa-list-ul mr-2 text-kls-yellow"></i> Log Prestasi Siswa
                </h2>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama siswa..." class="px-4 py-2 border rounded-lg w-full md:w-64 focus:ring-2 focus:ring-kls-brown outline-none text-sm">
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wider">
                        <tr>
                            <th class="px-6 py-4">Siswa</th>
                            <th class="px-6 py-4">Prestasi</th>
                            <th class="px-6 py-4">Tingkat</th>
                            <th class="px-6 py-4">Reward</th>
                            <th class="hidden admin-col px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100">
                        <!-- Data Masuk Sini -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 z-[60] hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden">
            <div class="header-gradient p-6 text-white flex justify-between items-center">
                <h3 class="font-bold text-xl">Kelola Prestasi</h3>
                <button onclick="closeModal()" class="text-white/50 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="prestasiForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Nama Siswa</label>
                        <input type="text" id="fNama" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-kls-brown outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Kelas</label>
                        <input type="text" id="fKelas" required class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Tingkat</label>
                        <select id="fTingkat" class="w-full px-4 py-2 border rounded-lg">
                            <option value="Sekolah">Sekolah</option>
                            <option value="Kabupaten/Kota">Kabupaten</option>
                            <option value="Nasional">Nasional</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Lomba</label>
                    <input type="text" id="fLomba" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Acara</label>
                    <input type="text" id="fAcara" required class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Reward</label>
                    <input type="text" id="fReward" class="w-full px-4 py-2 border rounded-lg">
                </div>
                <button type="submit" id="btnSubmit" class="w-full py-3 bg-kls-brown text-white rounded-xl font-bold hover:bg-kls-darkBrown transition-all shadow-lg">Simpan ke Cloud</button>
            </form>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SB_URL = 'https://puywjdopumlzvmzbcudr.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc';
        
        // Menggunakan nama variabel yang unik agar tidak konflik dengan global 'supabase' dari SDK
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let achievements = [];
        let isAdmin = false;
        let adminClickCount = 0;

        // Inisialisasi
        async function init() {
            await fetchData();
        }

        async function fetchData() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            const { data, error } = await supabaseClient
                .from('prestasi')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                alert('Gagal mengambil data dari Supabase');
            } else {
                achievements = data;
                renderTable();
            }
            document.getElementById('loadingIndicator').classList.add('hidden');
        }

        function renderTable() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            
            achievements.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-50 transition-all animate-fade';
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <a href="detail_prestasi.html?uuid=${item.id}" class="flex items-center group">
                            <div class="w-8 h-8 rounded-full bg-kls-brown text-white flex items-center justify-center font-bold mr-3 group-hover:bg-kls-yellow group-hover:text-kls-darkBrown transition-all">
                                ${item.nama.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div class="text-sm font-bold text-gray-800 group-hover:text-kls-brown underline decoration-transparent group-hover:decoration-kls-yellow">${item.nama}</div>
                                <div class="text-[10px] text-gray-400">ID: ${item.id.substring(0,8)}...</div>
                            </div>
                        </a>
                    </td>
                    <td class="px-6 py-4">
                        <div class="text-xs font-semibold text-gray-700">${item.lomba}</div>
                        <div class="text-[10px] text-gray-400">${item.acara}</div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded text-[9px] font-bold uppercase bg-gray-100 text-gray-600">${item.tingkat}</span>
                    </td>
                    <td class="px-6 py-4 text-xs italic text-gray-500">
                        ${item.reward || '-'}
                    </td>
                    <td class="hidden admin-col px-6 py-4 text-center">
                        <div class="flex justify-center space-x-2">
                            <button onclick="editData('${item.id}')" class="text-blue-500 hover:text-blue-700"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteData('${item.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                `;
                body.appendChild(row);
            });
            
            document.getElementById('statTotal').innerText = achievements.length;
            if (isAdmin) document.querySelectorAll('.admin-col').forEach(el => el.classList.remove('hidden'));
        }

        // --- CRUD OPERATIONS ---

        document.getElementById('prestasiForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Memproses...';

            const id = document.getElementById('editId').value;
            const payload = {
                nama: document.getElementById('fNama').value,
                kelas: document.getElementById('fKelas').value,
                tingkat: document.getElementById('fTingkat').value,
                lomba: document.getElementById('fLomba').value,
                acara: document.getElementById('fAcara').value,
                reward: document.getElementById('fReward').value
            };

            let res;
            if (id) {
                res = await supabaseClient.from('prestasi').update(payload).eq('id', id);
            } else {
                res = await supabaseClient.from('prestasi').insert([payload]);
            }

            if (res.error) {
                alert('Gagal menyimpan data');
            } else {
                closeModal();
                fetchData();
            }
            btn.disabled = false;
            btn.innerHTML = 'Simpan ke Cloud';
        });

        async function deleteData(id) {
            if (confirm('Hapus data prestasi ini dari database cloud?')) {
                const { error } = await supabaseClient.from('prestasi').delete().eq('id', id);
                if (error) alert('Gagal menghapus');
                else fetchData();
            }
        }

        function editData(id) {
            const item = achievements.find(a => a.id === id);
            if (!item) return;
            document.getElementById('editId').value = item.id;
            document.getElementById('fNama').value = item.nama;
            document.getElementById('fKelas').value = item.kelas;
            document.getElementById('fTingkat').value = item.tingkat;
            document.getElementById('fLomba').value = item.lomba;
            document.getElementById('fAcara').value = item.acara;
            document.getElementById('fReward').value = item.reward;
            openModal();
        }

        // --- UI HELPERS ---

        function handleAdminAuth() {
            adminClickCount++;
            if (adminClickCount >= 5) {
                isAdmin = !isAdmin;
                document.getElementById('btnTambah').classList.toggle('hidden', !isAdmin);
                document.querySelectorAll('.admin-col').forEach(el => el.classList.toggle('hidden', !isAdmin));
                alert(isAdmin ? "Mode Admin Aktif" : "Mode Admin Nonaktif");
                adminClickCount = 0;
            }
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('prestasiForm').reset();
            document.getElementById('editId').value = '';
        }

        function filterTable() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        }

        window.onload = init;
    </script>
</body>
</html>
