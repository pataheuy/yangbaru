<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Capaian Literasi - SMPIT As-Syifa</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kls: {
                            brown: '#5D4037',
                            darkBrown: '#3E2723',
                            lightBrown: '#EFEBE9',
                            yellow: '#FBC02D',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                        cinzel: ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #1A1A1A;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .cert-border {
            border: 15px solid #3E2723;
            outline: 2px solid #FBC02D;
            outline-offset: -10px;
            position: relative;
        }
        .cert-corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid #FBC02D;
            z-index: 10;
        }
        .top-left { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .top-right { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .bottom-right { bottom: 10px; right: 10px; border-left: none; border-top: none; }
        
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .cert-container { box-shadow: none; border: 5px solid #3E2723; }
        }
    </style>
</head>
<body>

    <div class="max-w-4xl w-full">
        <!-- Action Buttons -->
        <div class="no-print flex justify-between mb-6">
            <a href="prestasi_literasi.html" class="text-white/70 hover:text-white flex items-center transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> Kembali ke Daftar
            </a>
            <button onclick="window.print()" class="bg-kls-yellow text-kls-darkBrown px-5 py-2 rounded-full font-bold shadow-lg hover:scale-105 transition-transform flex items-center">
                <i class="fas fa-print mr-2"></i> Cetak / Simpan PDF
            </button>
        </div>

        <!-- Certificate Content -->
        <div class="bg-white cert-container shadow-2xl overflow-hidden relative cert-border p-12 md:p-20 text-center animate-fade">
            
            <!-- Ornamental Corners -->
            <div class="cert-corner top-left"></div>
            <div class="cert-corner top-right"></div>
            <div class="cert-corner bottom-left"></div>
            <div class="cert-corner bottom-right"></div>

            <!-- Content -->
            <div class="relative z-20">
                <div class="flex justify-center mb-6">
                    <div class="w-20 h-20 bg-kls-darkBrown rounded-full flex items-center justify-center text-kls-yellow text-4xl border-4 border-kls-yellow shadow-xl">
                        <i class="fas fa-award"></i>
                    </div>
                </div>

                <h1 class="font-cinzel text-kls-darkBrown text-2xl md:text-4xl mb-2 tracking-widest">SERTIFIKAT APRESIASI</h1>
                <p class="font-serif italic text-gray-500 mb-10 tracking-widest">Diberikan secara bangga kepada:</p>

                <h2 id="displayNama" class="font-serif font-bold text-3xl md:text-5xl text-kls-brown mb-2 border-b-2 border-kls-yellow inline-block px-10 pb-2">
                    NAMA SISWA
                </h2>
                <p id="displayKelas" class="text-lg text-gray-600 font-semibold mb-10 tracking-widest uppercase">KELAS</p>

                <div class="max-w-2xl mx-auto space-y-6">
                    <p class="text-gray-700 leading-relaxed italic">
                        Atas pencapaian luar biasa dalam bidang literasi sebagai:
                    </p>
                    <div class="bg-kls-lightBrown/50 p-6 rounded-lg border border-kls-yellow/20">
                        <h3 id="displayLomba" class="text-xl md:text-2xl font-bold text-kls-darkBrown uppercase tracking-wide">
                            LOMBA
                        </h3>
                        <p id="displayAcara" class="text-kls-brown font-medium mt-1 italic">Acara Penyelenggara</p>
                        <div class="mt-4 inline-block bg-kls-darkBrown text-white px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">
                            TINGKAT <span id="displayTingkat">WILAYAH</span>
                        </div>
                    </div>
                </div>

                <div class="mt-16 grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
                    <div class="text-left">
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Reward yang diperoleh:</p>
                        <p id="displayReward" class="text-sm font-bold text-kls-brown italic bg-kls-yellow/10 px-3 py-1 rounded border-l-2 border-kls-yellow inline-block">Reward Siswa</p>
                    </div>
                    <div class="text-right hidden md:block">
                        <div class="w-24 h-24 ml-auto mb-2 opacity-5">
                            <i class="fas fa-feather-alt text-7xl"></i>
                        </div>
                        <p class="font-serif text-kls-darkBrown font-bold">Komunitas Literasi Sekolah</p>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest">SMPIT As-Syifa Boarding School</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function loadData() {
            const index = getQueryParam('id');
            const localData = JSON.parse(localStorage.getItem('kls_prestasi_v2')) || [];
            
            // Default data jika tidak ada yang dipilih (untuk preview)
            let item = {
                nama: "Siswa Literasi",
                kelas: "VIII",
                lomba: "Capaian Prestasi",
                acara: "Kegiatan Sekolah",
                tingkat: "Sekolah",
                reward: "Apresiasi"
            };

            if (index !== null && localData[index]) {
                item = localData[index];
            }

            document.getElementById('displayNama').innerText = item.nama.toUpperCase();
            document.getElementById('displayKelas').innerText = `KELAS ${item.kelas.toUpperCase()}`;
            document.getElementById('displayLomba').innerText = item.lomba.toUpperCase();
            document.getElementById('displayAcara').innerText = item.acara;
            document.getElementById('displayTingkat').innerText = item.tingkat.toUpperCase();
            document.getElementById('displayReward').innerText = item.reward || "Apresiasi Piagam";
            
            document.title = `Sertifikat - ${item.nama}`;
        }

        window.onload = loadData;
    </script>
</body>
</html>
