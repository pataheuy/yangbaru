<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pufutara Global Call</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            user-select: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4ade80;
            display: inline-block;
            margin-right: 6px;
        }

        #setup-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- Layar Setup (Langkah demi Langkah) -->
    <div id="setup-overlay">
        <div class="w-full max-w-xs text-center">
            <div class="mb-8">
                <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center border border-white/20 mx-auto">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 016 0v6a3 3 0 01-3 3z"></path></svg>
                </div>
            </div>
            
            <h1 class="text-2xl font-bold mb-2">Konfigurasi Audio</h1>
            <p id="setup-instruction" class="text-zinc-500 text-sm mb-8">Klik tombol di bawah untuk meminta akses mikrofon dan mengaktifkan suara.</p>
            
            <button id="permission-btn" onclick="startSetupSequence()" class="w-full bg-white text-black py-4 rounded-2xl font-bold hover:bg-zinc-200 transition-colors mb-4">
                Izinkan Mikrofon & Suara
            </button>
            
            <p id="error-log" class="text-red-400 text-[10px] mt-4 uppercase tracking-widest hidden"></p>
        </div>
    </div>

    <!-- Elemen Suara -->
    <audio id="call-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <!-- UI Utama -->
    <div id="app-ui" class="w-full max-w-sm px-6 text-center opacity-0 transition-opacity duration-700">
        <div class="mb-12">
            <div class="flex items-center justify-center text-xs text-zinc-500 tracking-widest uppercase mb-4">
                <span id="network-dot" class="status-dot"></span> <span id="network-text">Menghubungkan...</span>
            </div>
            <div class="relative inline-block">
                <div class="w-32 h-32 rounded-full bg-zinc-800 flex items-center justify-center mb-6 mx-auto border-2 border-zinc-700">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="absolute -inset-1 border border-white/20 rounded-full pulse-animation"></div>
            </div>
            <h2 class="text-3xl font-light mb-1" id="caller-id">User-0000</h2>
            <p id="call-status" class="text-zinc-500 font-light italic text-sm">Siap menerima sinyal</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="toggleMute()" class="flex flex-col items-center justify-center glass-panel aspect-square rounded-3xl transition-all active:scale-95">
                <div class="mb-2">
                    <svg id="mic-icon" class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
                </div>
                <span id="mute-label" class="text-xs uppercase text-zinc-400">Mic On</span>
            </button>
            <button onclick="registerCall()" class="flex flex-col items-center justify-center glass-panel aspect-square rounded-3xl transition-all active:scale-95 hover:bg-white hover:text-black">
                <div class="mb-2">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </div>
                <span class="text-xs uppercase text-zinc-400">Panggil</span>
            </button>
        </div>

        <button onclick="resetCall()" class="w-20 h-20 mx-auto rounded-full bg-red-600 flex items-center justify-center shadow-lg active:scale-90 transition-transform">
            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="23" y1="1" x2="1" y2="23"></line></svg>
        </button>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-2 rounded-full text-xs font-bold opacity-0 transition-all pointer-events-none uppercase">...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://puywjdopumlzvmzbcudr.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc";

        let _supabase;
        let lastId = null;
        let isMuted = false;
        let audioContext;
        const myId = "User-" + Math.floor(Math.random() * 8999 + 1000);

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            t.style.bottom = '40px';
            setTimeout(() => { t.style.opacity = '0'; t.style.bottom = '10px'; }, 2500);
        }

        async function startSetupSequence() {
            const btn = document.getElementById('permission-btn');
            const log = document.getElementById('error-log');
            
            btn.disabled = true;
            btn.innerText = "Meminta Izin...";

            try {
                // 1. Minta Izin Mic secara eksplisit (Pasti memicu pop-up jika HTTPS)
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(t => t.stop()); // Matikan mic setelah dapat izin
                } else {
                    throw new Error("Browser tidak mendukung Mikrofon");
                }

                // 2. Aktifkan Audio Context
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                if (audioContext.state === 'suspended') await audioContext.resume();

                // 3. Tes Putar Audio (Unmute Browser)
                const sound = document.getElementById('call-sound');
                await sound.play();
                sound.pause();
                sound.currentTime = 0;

                // 4. Masuk ke UI
                document.getElementById('setup-overlay').style.display = 'none';
                document.getElementById('app-ui').style.opacity = '1';
                initApp();
            } catch (err) {
                console.error(err);
                log.innerText = err.message || "Izin Ditolak";
                log.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Coba Lagi";
                
                // Fallback masuk tanpa mic jika dipaksa
                setTimeout(() => {
                    if (confirm("Izin mic gagal. Masuk hanya dengan fitur Speaker?")) {
                        document.getElementById('setup-overlay').style.display = 'none';
                        document.getElementById('app-ui').style.opacity = '1';
                        initApp();
                    }
                }, 1000);
            }
        }

        async function initApp() {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            document.getElementById('caller-id').innerText = myId;
            document.getElementById('network-text').innerText = "Online";
            
            const { data } = await _supabase.from('panggilan').select('id').order('created_at', { ascending: false }).limit(1);
            if (data && data.length > 0) lastId = data[0].id;

            setInterval(checkCalls, 3000);
            showToast("Sistem Terkoneksi");
        }

        async function checkCalls() {
            if (!_supabase) return;
            const { data, error } = await _supabase.from('panggilan').select('*').neq('pengirim', myId).order('created_at', { ascending: false }).limit(1);

            if (!error && data && data.length > 0) {
                if (data[0].id !== lastId) {
                    lastId = data[0].id;
                    document.getElementById('call-status').innerText = "Incoming Call...";
                    const s = document.getElementById('call-sound');
                    s.currentTime = 0;
                    s.play().catch(() => showToast("Klik layar untuk audio"));
                }
            }
        }

        async function registerCall() {
            if (!_supabase) return;
            showToast("Mengirim Sinyal...");
            await _supabase.from('panggilan').insert([{ pengirim: myId, status: 'calling' }]);
        }

        function resetCall() {
            document.getElementById('call-status').innerText = "Siap menerima sinyal";
            showToast("Panggilan Selesai");
        }

        function toggleMute() {
            isMuted = !isMuted;
            const icon = document.getElementById('mic-icon');
            const label = document.getElementById('mute-label');
            label.innerText = isMuted ? "Mic Off" : "Mic On";
            label.className = isMuted ? "text-xs uppercase text-red-500" : "text-xs uppercase text-zinc-400";
            showToast(isMuted ? "Muted" : "Unmuted");
        }
    </script>
</body>
</html>
