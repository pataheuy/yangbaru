<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PufutaraTube</title>
    <link rel="icon" href="foto/archive.jfif" type="iconweb">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- RESET & GLOBAL (BLACK & WHITE THEME) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #ffffff; color: #000000; }

        /* --- HEADER --- */
        .navbar { background: #ffffff; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; cursor: pointer; color: #000; display: flex; align-items: center; flex-shrink: 0; }
        .logo-text { font-weight: 800; letter-spacing: -1px; }
        .tube-badge { background: #000; color: #fff; padding: 3px 10px; border-radius: 8px; font-weight: 700; margin-left: 2px; font-size: 1.4rem; letter-spacing: -1.5px; }
        
        /* --- SEARCH BAR --- */
        .search-container { display: flex; align-items: center; flex: 1; max-width: 500px; height: 42px; margin: 0 20px; border: 1px solid #d0d0d0; border-radius: 40px; overflow: hidden; background: #ffffff; transition: border-color 0.2s; }
        .search-container:focus-within { border-color: #000000; }
        .search-input { flex: 1; border: none; padding: 0 20px; font-size: 0.95rem; outline: none; background: transparent; height: 100%; color: #000; }
        .search-input::placeholder { color: #888; }
        .search-btn { background: #f9f9f9; border: none; border-left: 1px solid #d0d0d0; padding: 0 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 100%; transition: 0.2s; }
        .search-btn:hover { background: #eaeaea; }

        /* --- NAV RIGHT --- */
        .nav-right { display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
        .btn-upload-head { background: #ffffff; color: #000; border: 1px solid #000; padding: 9px 20px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
        .btn-upload-head:hover { background: #000; color: #fff; }
        .profile-area { display: flex; align-items: center; gap: 14px; padding-left: 20px; border-left: 1px solid #eaeaea; }
        .avatar { width: 38px; height: 38px; background: #000; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; cursor: pointer;}
        
        .btn-logout { color: #000; font-weight: 600; cursor: pointer; font-size: 0.9rem; background: #fff; border: 1px solid #000; padding: 8px 18px; border-radius: 20px; transition: 0.2s; }
        .btn-logout:hover { background: #000; color: #fff; }
        
        .btn-login-green { color: #fff; font-weight: 600; cursor: pointer; font-size: 0.9rem; background: #000; border: 1px solid #000; padding: 8px 18px; border-radius: 20px; transition: 0.2s; }
        .btn-login-green:hover { background: #fff; color: #000; }

        /* --- SCREENS --- */
        .screen { display: none; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .active { display: block; }

        /* --- LOGIN SCREEN --- */
        #screenAuth { background-color: #ffffff; align-items: center; justify-content: center; height: 75vh; padding: 0; }
        #screenAuth.active { display: flex; }
        .auth-card { background: #ffffff; padding: 50px 40px; border-radius: 24px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: center; border: 1px solid #eaeaea; }
        .auth-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; color: #000; }
        .auth-card p { color: #666; font-size: 14px; margin-bottom: 35px; }
        .auth-input { width: 100%; padding: 16px 20px; margin-bottom: 15px; border: 1px solid #d0d0d0; background: #fafafa; border-radius: 12px; outline: none; font-size: 15px; transition: 0.2s; }
        .auth-input:focus { border-color: #000; background: #fff; }
        .btn-login-black { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 15px; margin-top: 10px; transition: 0.2s; }
        .btn-login-black:hover { background: #333; }

        /* --- VIDEO GRID & CARDS --- */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; row-gap: 35px; }
        .v-card { cursor: pointer; background: #ffffff; border-radius: 12px; transition: transform 0.2s ease, box-shadow 0.2s ease; padding-bottom: 10px; display: flex; flex-direction: column; }
        .v-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .v-thumb { width: 100%; height: 180px; object-fit: cover; background: #111; border-radius: 12px; transition: 0.2s; border: 1px solid #eaeaea; }
        .v-card:hover .v-thumb { border-radius: 12px 12px 0 0; }
        .v-info-row { display: flex; gap: 12px; margin-top: 12px; padding: 0 5px; }
        .v-ava { width: 36px; height: 36px; border-radius: 50%; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
        .v-info { flex: 1; }
        .v-title { font-weight: 700; font-size: 1.05rem; color: #000; margin-bottom: 6px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-meta { font-size: 0.85rem; color: #666; }
        .v-meta span:hover { color: #000; text-decoration: underline; }

        /* --- WATCH PAGE --- */
        .watch-layout { display: flex; gap: 24px; align-items: flex-start; }
        .watch-main { flex: 1; min-width: 0; }
        .watch-sidebar { width: 400px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        @media (max-width: 1000px) { .watch-layout { flex-direction: column; } .watch-sidebar { width: 100%; } }
        
        #playerBox { width: 100%; border-radius: 12px; background: #000; aspect-ratio: 16/9; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        .v-header-row { margin-top: 15px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 15px; }
        
        /* Modern Buttons */
        .btn-action { padding: 9px 18px; border-radius: 30px; border: 1px solid #d0d0d0; background: #f9f9f9; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #000; transition: 0.2s; }
        .btn-action:hover { background: #eaeaea; }
        .btn-sub { background: #000; color: #fff; border: 1px solid #000; padding: 10px 20px; }
        .btn-sub:hover { background: #333; }
        .btn-sub.is-sub { background: #f9f9f9; color: #000; border: 1px solid #d0d0d0; }

        .vote-container { display:flex; background:#f9f9f9; border:1px solid #d0d0d0; border-radius:30px; overflow:hidden; }
        .vote-btn { border: none; background: transparent; padding: 9px 16px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 600; transition: 0.2s; color: #000; }
        .vote-btn:hover { background: #eaeaea; }
        .vote-divider { width: 1px; background: #d0d0d0; margin: 6px 0; }

        /* Mini Card */
        .mini-card { display: flex; gap: 10px; cursor: pointer; padding: 5px; border-radius: 12px; transition: 0.2s; }
        .mini-card:hover { background: #f9f9f9; }
        .mini-thumb { width: 168px; height: 94px; object-fit: cover; border-radius: 8px; background: #111; flex-shrink: 0; border: 1px solid #eaeaea; }
        .mini-info { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .mini-title { font-weight: 600; font-size: 0.95rem; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #000; }
        .mini-meta { font-size: 0.8rem; color: #666; line-height: 1.4; }

        /* --- CHANNEL PAGE --- */
        .channel-header { margin-bottom: 30px; border-bottom: 1px solid #eaeaea; padding-bottom: 30px; }
        .channel-banner { width: 100%; height: 200px; background: linear-gradient(45deg, #111, #444); border-radius: 16px; margin-bottom: 25px; }
        .channel-info-row { display: flex; align-items: center; gap: 24px; }
        .channel-avatar { width: 130px; height: 130px; border-radius: 50%; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; font-weight: bold; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .channel-details { flex: 1; }
        .channel-name { font-size: 2rem; font-weight: 800; margin-bottom: 5px; color: #000; }
        .channel-stats { color: #666; margin-bottom: 15px; font-size: 0.95rem; }

        /* --- MODALS & MISC --- */
        .btn-primary { width: 100%; padding: 15px; background: #000; color: #fff; border: 1px solid #000; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-primary:hover { background: #333; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: #fff; padding: 35px; border-radius: 20px; width: 90%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: 1px solid #eaeaea; }
        input[type="text"] { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #d0d0d0; border-radius: 12px; outline: none; font-size: 1rem; background: #fafafa; transition: 0.2s; }
        input[type="text"]:focus { border-color: #000; background: #fff; }
        
        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; }
        .comment-ava { width: 36px; height: 36px; border-radius: 50%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 0.9rem; }
        
        .btn-danger { background: #fff; color: #000; border: 1px solid #000; }
        .btn-danger:hover { background: #000; color: #fff; }
    </style>
</head>
<body>

    <div class="navbar" id="uiHeader" style="display:none;">
        <div class="logo" onclick="goHome()">
            <span class="logo-text">Pufutara</span><span class="tube-badge">Tube</span>
        </div>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Telusuri video..." onkeypress="if(event.key === 'Enter') doSearch()">
            <button class="search-btn" onclick="doSearch()" title="Cari">
                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#000" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
        </div>

        <div class="nav-right">
            <button class="btn-upload-head" onclick="checkUpload()">+ Upload</button>
            <div class="profile-area">
                <div class="avatar" id="avaCircle" onclick="openChannel(_me.email)" style="display:none;">P</div>
                <button class="btn-logout" id="authBtn" onclick="logout()">Keluar</button>
            </div>
        </div>
    </div>

    <div id="screenAuth" class="screen">
        <div class="auth-card">
            <h1>Masuk PufutaraTube</h1>
            <p>Silakan masuk untuk berinteraksi dan upload video</p>
            <input type="email" id="email" class="auth-input" placeholder="Alamat Email">
            <input type="password" id="password" class="auth-input" placeholder="Kata Sandi">
            <button class="btn-login-black" onclick="handleAuth()">Login / Daftar</button>
        </div>
    </div>

    <div id="screenHome" class="screen active">
        <h2 id="homeTitle" style="margin-bottom:25px; font-weight:800; font-size:1.5rem;">Eksplorasi Video</h2>
        <div class="video-grid" id="mainGrid"></div>
    </div>

    <div id="screenChannel" class="screen">
        <div class="channel-header">
            <div class="channel-banner"></div>
            <div class="channel-info-row">
                <div class="channel-avatar" id="chAva">U</div>
                <div class="channel-details">
                    <h1 class="channel-name" id="chName">Nama Channel</h1>
                    <p class="channel-stats">
                        <span id="chEmail" style="font-weight:600; color:#000;">@username</span> • 
                        <span id="chSubCount">0</span> subscriber
                    </p>
                    <button class="btn-action btn-sub" id="chSubBtn" onclick="toggleSubChannel()" style="display:none;">Subscribe</button>
                </div>
            </div>
        </div>
        <h3 style="margin-bottom: 20px; font-size: 1.2rem; font-weight:700;">Upload Terbaru</h3>
        <div class="video-grid" id="channelGrid"></div>
    </div>

    <div id="screenWatch" class="screen">
        <div class="watch-layout">
            <div class="watch-main">
                <div id="playerBox"></div>
                <div style="margin-top: 15px;">
                    <h1 id="vTitle" style="font-size:1.4rem; font-weight:800; margin-bottom:10px; color:#000;">Judul Video</h1>
                    <div class="v-header-row">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div class="v-ava" id="vAva" style="width:42px; height:42px; cursor:pointer;" onclick="openChannel(_vid.uploader)">U</div>
                            <div>
                                <div style="font-weight:700; font-size:1.05rem; cursor:pointer;" id="vUser" onclick="openChannel(_vid.uploader)">User</div>
                                <div style="font-size:0.8rem; color:#666;"><span id="vSubCount">0</span> subscriber</div>
                            </div>
                            <button class="btn-action btn-sub" id="wSubBtn" onclick="toggleSubWatch()" style="margin-left:15px;">Subscribe</button>
                        </div>
                        <div style="display:flex; gap:12px;">
                            <div class="vote-container">
                                <button class="vote-btn" onclick="doVote('likes')" title="Suka">
                                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
                                    <span id="vLikes">0</span>
                                </button>
                                <div class="vote-divider"></div>
                                <button class="vote-btn" onclick="doVote('unlikes')" title="Tidak Suka">
                                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-3"></path></svg>
                                </button>
                            </div>
                            <button class="btn-action">
                                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                                Bagikan
                            </button>
                        </div>
                    </div>
                    <div style="background:#f9f9f9; padding:15px; border-radius:12px; margin-top:15px; font-size:0.9rem; border:1px solid #eaeaea;">
                        <b id="vViews">0</b> ditonton
                    </div>
                </div>

                <hr style="border:0; border-top:1px solid #eaeaea; margin:25px 0;">
                
                <h3 style="font-weight:700;">Komentar</h3>
                <div style="display:flex; gap:15px; margin:20px 0;">
                    <div class="comment-ava" id="myKomenAva">?</div>
                    <div style="flex:1; display:flex; gap:10px;">
                        <input type="text" id="commText" placeholder="Tambahkan komentar..." style="margin:0; border:none; border-bottom:1px solid #000; border-radius:0; padding:8px 0; background:transparent;">
                        <button onclick="addComm()" class="btn-action" style="border-radius:12px;">Kirim</button>
                    </div>
                </div>
                <div id="commBox"></div>
                
                <button id="delBtn" class="btn-primary btn-danger" style="display:none; margin-top:40px;" onclick="delVideo()">🗑️ Hapus Video</button>
            </div>
            <div class="watch-sidebar" id="recomGrid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="uploadModal">
        <div class="modal-box">
            <h2 style="margin-bottom:25px; font-weight:800;">Upload Video</h2>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button id="tFile" class="btn-primary" onclick="upMode('file')" style="flex:1;">File Lokal</button>
                <button id="tLink" class="btn-primary" onclick="upMode('link')" style="flex:1; background:#fff; color:#000; border-color:#d0d0d0;">Link URL</button>
            </div>
            <input type="text" id="inTitle" placeholder="Judul Video...">
            <div id="areaFile" style="margin:10px 0; padding:15px; border:1px dashed #000; border-radius:12px;">
                <input type="file" id="inFile" accept="video/*" style="border:none; padding:0; width:100%;">
            </div>
            <div id="areaLink" style="display:none;">
                <input type="text" id="inUrl" placeholder="Link YouTube atau Link .mp4">
            </div>
            <button class="btn-primary" id="btnRunUpload" onclick="runUpload()" style="margin-top:20px;">Upload Sekarang</button>
            <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; cursor:pointer; color:#666; font-weight:600; transition:0.2s;">Batal</button>
        </div>
    </div>

    <script>
        const _URL = 'https://puywjdopumlzvmzbcudr.supabase.co';
        const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1eXdqZG9wdW1senZtemJjdWRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDE3MTksImV4cCI6MjA4NzkxNzcxOX0.vvThyjtK2SlA9oA9Mr_XOmt1R_tNZk-ib3PO9XpiiSc';
        const _sb = supabase.createClient(_URL, _KEY);

        let _me = null, _vid = null, _uType = 'file';
        let _currentChannel = null;

        // FUNGSI UNTUK MENGACAK ARRAY (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function getYTId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function handleAuth() {
            const email = document.getElementById('email').value, pass = document.getElementById('password').value;
            const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
            if (error) { await _sb.auth.signUp({ email, password: pass }); alert("Daftar berhasil! Silakan klik Login lagi."); }
            else { location.reload(); }
        }
        async function logout() { await _sb.auth.signOut(); location.reload(); }

        function requireLogin() {
            if (!_me) { nav('screenAuth'); return false; }
            return true;
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
            if(id !== 'screenWatch') document.getElementById('playerBox').innerHTML = ''; 
        }
        
        function goHome() { 
            document.getElementById('searchInput').value = '';
            document.getElementById('homeTitle').innerText = 'Eksplorasi Video';
            nav('screenHome'); 
            getFeed('mainGrid'); 
        }
        
        function doSearch() {
            const term = document.getElementById('searchInput').value.trim();
            if (!term) return goHome();
            nav('screenHome');
            document.getElementById('homeTitle').innerText = 'Hasil Pencarian: "' + term + '"';
            getFeed('mainGrid', null, term);
        }

        async function getFeed(containerId, uploaderEmail = null, searchTerm = null) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = '<p style="color:#777;">Memuat video...</p>';
            let q = _sb.from('pufutaratube_videos').select('*').order('id', {ascending:false});
            if(uploaderEmail) q = q.eq('uploader', uploaderEmail);
            if(searchTerm) q = q.ilike('title', `%${searchTerm}%`);
            
            let { data } = await q;
            grid.innerHTML = '';
            if(!data || data.length === 0) { grid.innerHTML = '<p style="color:#999; grid-column:1/-1;">Video tidak ditemukan.</p>'; return; }

            // MENGACAK TATA LETAK VIDEO
            data = shuffleArray(data);

            data.forEach(v => {
                const username = v.uploader.split('@')[0];
                const ytId = getYTId(v.video_url);
                const thumbMedia = ytId 
                    ? `<img class="v-thumb" src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg">` 
                    : `<video class="v-thumb" src="${v.video_url}#t=0.5" preload="metadata"></video>`;

                const c = document.createElement('div');
                c.className = 'v-card';
                c.onclick = () => openWatch(v);
                c.innerHTML = `
                    ${thumbMedia}
                    <div class="v-info-row">
                        <div class="v-ava">${username[0].toUpperCase()}</div>
                        <div class="v-info">
                            <div class="v-title">${v.title}</div>
                            <div class="v-meta">
                                <span onclick="event.stopPropagation(); openChannel('${v.uploader}')">${username}</span><br>
                                ${v.views || 0} ditonton
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(c);
            });
        }

        async function openChannel(email) {
            if(!email) return; 
            _currentChannel = email;
            const username = email.split('@')[0];
            
            document.getElementById('chAva').innerText = username[0].toUpperCase();
            document.getElementById('chName').innerText = username;
            document.getElementById('chEmail').innerText = "@" + username.toLowerCase();
            
            const btn = document.getElementById('chSubBtn');
            if (_me?.email === email) { btn.style.display = 'none'; } 
            else { btn.style.display = 'block'; await updateSubButtonUI(email, 'chSubBtn'); }

            const { count } = await _sb.from('pufutaratube_subs').select('*', { count: 'exact', head: true }).eq('target_uploader', email);
            document.getElementById('chSubCount').innerText = count || 0;

            nav('screenChannel');
            getFeed('channelGrid', email); // Video dichannel juga akan tampil acak
        }

        async function openWatch(v) {
            _vid = v; 
            nav('screenWatch');
            
            const pBox = document.getElementById('playerBox');
            const ytId = getYTId(v.video_url);
            
            if (ytId) { pBox.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1" style="width:100%; height:100%; border:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>`; } 
            else { pBox.innerHTML = `<video src="${v.video_url}" style="width:100%; height:100%; object-fit:contain;" controls autoplay></video>`; }

            const username = v.uploader.split('@')[0];
            document.getElementById('vTitle').innerText = v.title;
            document.getElementById('vUser').innerText = username;
            document.getElementById('vAva').innerText = username[0].toUpperCase();
            document.getElementById('vViews').innerText = (v.views || 0) + 1;
            document.getElementById('vLikes').innerText = v.likes || 0;
            
            document.getElementById('delBtn').style.display = (_me?.email === v.uploader) ? 'block' : 'none';
            
            const btn = document.getElementById('wSubBtn');
            if (_me?.email === v.uploader) { btn.style.display = 'none'; } 
            else { btn.style.display = 'block'; await updateSubButtonUI(v.uploader, 'wSubBtn'); }

            await _sb.from('pufutaratube_videos').update({ views: (v.views || 0) + 1 }).eq('id', v.id);
            
            const { count } = await _sb.from('pufutaratube_subs').select('*', { count: 'exact', head: true }).eq('target_uploader', v.uploader);
            document.getElementById('vSubCount').innerText = count || 0;

            loadComments();
            loadRecommendations(v.id);
        }

        async function loadRecommendations(currentVidId) {
            const grid = document.getElementById('recomGrid');
            grid.innerHTML = '';
            // Ambil data, hindari video yg sedang ditonton
            let { data } = await _sb.from('pufutaratube_videos').select('*').neq('id', currentVidId);
            
            if(data) {
                // ACAK REKOMENDASI LALU AMBIL 10 SAJA
                data = shuffleArray(data).slice(0, 10);
                
                data.forEach(v => {
                    const ytId = getYTId(v.video_url);
                    const thumbMedia = ytId 
                        ? `<img class="mini-thumb" src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg">` 
                        : `<video class="mini-thumb" src="${v.video_url}#t=0.5" preload="metadata"></video>`;

                    const c = document.createElement('div');
                    c.className = 'mini-card';
                    c.onclick = () => openWatch(v);
                    c.innerHTML = `
                        ${thumbMedia}
                        <div class="mini-info">
                            <div class="mini-title">${v.title}</div>
                            <div class="mini-meta">${v.uploader.split('@')[0]}<br>${v.views || 0} ditonton</div>
                        </div>
                    `;
                    grid.appendChild(c);
                });
            }
        }

        async function updateSubButtonUI(targetEmail, btnId) {
            const btn = document.getElementById(btnId);
            if (!_me) { btn.innerText = "Subscribe"; btn.classList.remove('is-sub'); return; }
            const { data } = await _sb.from('pufutaratube_subs').select('*').eq('target_uploader', targetEmail).eq('follower_email', _me.email);
            if (data && data.length > 0) { btn.innerText = "Disubscribe"; btn.classList.add('is-sub'); } 
            else { btn.innerText = "Subscribe"; btn.classList.remove('is-sub'); }
        }

        async function toggleSubLogic(targetEmail) {
            const { data } = await _sb.from('pufutaratube_subs').select('*').eq('target_uploader', targetEmail).eq('follower_email', _me.email);
            if (data && data.length > 0) { await _sb.from('pufutaratube_subs').delete().match({ follower_email: _me.email, target_uploader: targetEmail }); } 
            else { await _sb.from('pufutaratube_subs').insert({ follower_email: _me.email, target_uploader: targetEmail }); }
        }

        async function toggleSubWatch() {
            if(!requireLogin()) return;
            await toggleSubLogic(_vid.uploader); await updateSubButtonUI(_vid.uploader, 'wSubBtn');
            const { count } = await _sb.from('pufutaratube_subs').select('*', { count: 'exact', head: true }).eq('target_uploader', _vid.uploader);
            document.getElementById('vSubCount').innerText = count || 0;
        }

        async function toggleSubChannel() {
            if(!requireLogin()) return;
            await toggleSubLogic(_currentChannel); await updateSubButtonUI(_currentChannel, 'chSubBtn');
            const { count } = await _sb.from('pufutaratube_subs').select('*', { count: 'exact', head: true }).eq('target_uploader', _currentChannel);
            document.getElementById('chSubCount').innerText = count || 0;
        }

        // FUNGSI LIKE / DISLIKE
        async function doVote(t) {
            if(!requireLogin()) return;
            _vid[t] = (_vid[t] || 0) + 1;
            if(t === 'likes') document.getElementById('vLikes').innerText = _vid[t];
            await _sb.from('pufutaratube_videos').update({ [t]: _vid[t] }).eq('id', _vid.id);
        }

        async function addComm() {
            if(!requireLogin()) return;
            const val = document.getElementById('commText').value.trim();
            if(!val) return;
            await _sb.from('pufutaratube_comments').insert({ video_id: _vid.id, comment: val, uploader: _me.email });
            document.getElementById('commText').value = ''; loadComments();
        }

        async function loadComments() {
            const { data } = await _sb.from('pufutaratube_comments').select('*').eq('video_id', _vid.id).order('id',{ascending:false});
            document.getElementById('commBox').innerHTML = data.map(c => {
                const uname = c.uploader.split('@')[0];
                return `
                <div class="comment-item">
                    <div class="comment-ava" style="cursor:pointer;" onclick="openChannel('${c.uploader}')">${uname[0].toUpperCase()}</div>
                    <div>
                        <b style="font-size:0.9rem; cursor:pointer;" onclick="openChannel('${c.uploader}')">@${uname}</b>
                        <p style="font-size:0.95rem; margin-top:3px; color:#000;">${c.comment}</p>
                    </div>
                </div>`;
            }).join('');
        }

        function checkUpload() {
            if(!requireLogin()) return;
            openModal();
        }
        function openModal() { document.getElementById('uploadModal').style.display='flex'; }
        function closeModal() { document.getElementById('uploadModal').style.display='none'; }
        function upMode(m) {
            _uType = m;
            document.getElementById('tFile').style.background = m === 'file' ? '#000' : '#fff';
            document.getElementById('tFile').style.color = m === 'file' ? '#fff' : '#000';
            document.getElementById('tFile').style.borderColor = m === 'file' ? '#000' : '#d0d0d0';
            
            document.getElementById('tLink').style.background = m === 'link' ? '#000' : '#fff';
            document.getElementById('tLink').style.color = m === 'link' ? '#fff' : '#000';
            document.getElementById('tLink').style.borderColor = m === 'link' ? '#000' : '#d0d0d0';
            
            document.getElementById('areaFile').style.display = m === 'file' ? 'block' : 'none';
            document.getElementById('areaLink').style.display = m === 'link' ? 'block' : 'none';
        }

        async function runUpload() {
            const title = document.getElementById('inTitle').value;
            if(!title) return alert("Judul wajib diisi!");
            document.getElementById('btnRunUpload').innerText = "Sedang Memproses...";
            let url = "";
            if(_uType === 'file') {
                const f = document.getElementById('inFile').files[0];
                if(!f) { alert("Pilih file videonya!"); document.getElementById('btnRunUpload').innerText="Upload Sekarang"; return; }
                const path = Date.now() + "_" + f.name.replace(/\s+/g, '_');
                await _sb.storage.from('pufutaratube_videos').upload(path, f);
                url = _sb.storage.from('pufutaratube_videos').getPublicUrl(path).data.publicUrl;
            } else { 
                url = document.getElementById('inUrl').value; 
                if(!url) { alert("Masukkan URL!"); document.getElementById('btnRunUpload').innerText="Upload Sekarang"; return;}
            }
            
            await _sb.from('pufutaratube_videos').insert({ title, video_url: url, uploader: _me.email });
            location.reload();
        }

        async function delVideo() {
            if(confirm("Yakin ingin menghapus video ini selamanya?")) {
                await _sb.from('pufutaratube_videos').delete().eq('id', _vid.id);
                goHome();
            }
        }

        _sb.auth.getSession().then(({data}) => {
            document.getElementById('uiHeader').style.display = 'flex';
            const authBtn = document.getElementById('authBtn');
            const ava = document.getElementById('avaCircle');
            const komenAva = document.getElementById('myKomenAva');

            if(data.session) {
                _me = data.session.user;
                const myUname = _me.email.split('@')[0];
                ava.innerText = myUname[0].toUpperCase();
                ava.style.display = 'flex';
                komenAva.innerText = myUname[0].toUpperCase();
                
                authBtn.innerText = 'Keluar';
                authBtn.className = 'btn-logout';
                authBtn.onclick = logout;
            } else {
                _me = null;
                ava.style.display = 'none';
                komenAva.innerText = '?';
                
                authBtn.innerText = 'Login';
                authBtn.className = 'btn-login-green';
                authBtn.onclick = () => {
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                    nav('screenAuth');
                };
            }
            goHome();
        });
    </script>
</body>
</html>
